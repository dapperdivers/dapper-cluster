---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

set: [pipefail]

tasks:
  browse-pvc:
    desc: Mount a PVC to an temp container [NS=default] [CLAIM=required]
    interactive: true
    cmd: kubectl browse-pvc --namespace {{.NS}} --image docker.io/library/alpine:latest {{.CLAIM}}
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [CLAIM]
    preconditions:
      - kubectl --namespace {{.NS}} get persistentvolumeclaims {{.CLAIM}}
      - kubectl browse-pvc --version
      - which kubectl

  node-shell:
    desc: Open a shell to a node [NODE=required]
    interactive: true
    cmd: kubectl node-shell -n kube-system -x {{.NODE}}
    requires:
      vars: [NODE]
    preconditions:
      - kubectl get nodes {{.NODE}}
      - kubectl node-shell --version
      - which kubectl

  sync-secrets:
    desc: Sync all ExternalSecrets
    cmds:
      - for: { var: SECRETS, split: "\n" }
        cmd: kubectl --namespace {{splitList "," .ITEM | first}} annotate externalsecret {{splitList "," .ITEM | last}} force-sync="{{now | unixEpoch}}" --overwrite
    vars:
      SECRETS:
        sh: kubectl get externalsecret --all-namespaces --no-headers --output=jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name}{"\n"}{end}'
    preconditions:
      - which kubectl

  view-secret:
    desc: Decode a Secret to plaintext [NS=default] [SECRET=required] [KEY=optional]
    cmd: |
      kubectl --namespace {{.NS}} get secret {{.SECRET}} --output json \
        | jq -r '.data | {{if .KEY}}."{{.KEY}}" | @base64d{{else}}to_entries[] | "\(.key)=\(.value | @base64d)"{{end}}'
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [SECRET]
    preconditions:
      - kubectl --namespace {{.NS}} get secret {{.SECRET}}
      - which kubectl jq

  cleanse-pods:
    desc: Cleanse pods with a Failed/Pending/Succeeded phase
    cmds:
      - for:
          matrix:
            PHASE: [Failed, Pending, Succeeded]
        cmd: kubectl delete pods --all-namespaces --field-selector status.phase={{.ITEM.PHASE}} --ignore-not-found=true
    preconditions:
      - which kubectl

  restart-helmrelease:
    desc: Reinstall a HelmRelease by uninstalling and reconciling it [NS=default] [HR=required]
    cmds:
      - helm --namespace {{.NS}} uninstall {{.HR}}
      - flux --namespace {{.NS}} reconcile helmrelease {{.HR}}
      - echo "HelmRelease {{.HR}} reinstalled — monitor with kubectl get pods -n {{.NS}} -w"
    vars:
      NS: '{{.NS | default "default"}}'
    requires:
      vars: [HR]
    preconditions:
      - flux --namespace {{.NS}} get helmrelease {{.HR}}
      - which flux helm

  # https://docs.github.com/en/enterprise-cloud@latest/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller/deploying-runner-scale-sets-with-actions-runner-controller#upgrading-arc
  upgrade-arc:
    desc: Upgrade the ARC
    cmds:
      - helm -n actions-runner-system uninstall dapper-cluster-runner
      - helm -n actions-runner-system uninstall chelonianlabs-runner
      - helm -n actions-runner-system uninstall actions-runner-controller
      - sleep 5
      - flux -n actions-runner-system reconcile hr actions-runner-controller
      - flux -n actions-runner-system reconcile hr dapper-cluster-runner
      - flux -n actions-runner-system reconcile hr chelonianlabs-runner
    preconditions:
      - which flux helm
