---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

set: [pipefail]

tasks:
  download:
    desc: Download a file from a running pod [NS=default] [APP=required] [FILE_PATH=required] [OUTPUT_FILE=optional]
    summary: |
      Download a file from a running Kubernetes pod (found via the
      app.kubernetes.io/name label).

      Usage:
        task pod-logs:download APP=kometa NS=media FILE_PATH=/config/logs/meta.log
        task pod-logs:download APP=sonarr NS=media FILE_PATH=/config/logs/sonarr.txt OUTPUT_FILE=./sonarr.log
    cmd: |
      POD=$(kubectl get pods --namespace {{.NS}} -l app.kubernetes.io/name={{.APP}} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

      if [ -z "$POD" ]; then
        echo "❌ No running pod found for app '{{.APP}}' in namespace '{{.NS}}'"
        echo "Available pods in namespace {{.NS}}:"
        kubectl get pods --namespace {{.NS}}
        exit 1
      fi

      echo "📥 Downloading {{.FILE_PATH}} from pod $POD ({{.APP}}) in namespace {{.NS}}"
      echo "💾 Saving to {{.OUTPUT_FILE}}"

      kubectl cp {{.NS}}/$POD:{{.FILE_PATH}} {{.OUTPUT_FILE}}
      echo "✅ File downloaded to {{.OUTPUT_FILE}} ($(du -h {{.OUTPUT_FILE}} | cut -f1))"
    vars:
      NS: '{{.NS | default "default"}}'
      OUTPUT_FILE: '{{.OUTPUT_FILE | default (printf "./%s-log.txt" .APP)}}'
    requires:
      vars: [APP, FILE_PATH]
    preconditions:
      - sh: kubectl auth can-i get pods --namespace {{.NS}}
        msg: No permissions to access pods in namespace {{.NS}}
      - which kubectl

  kometa-meta:
    desc: Download kometa meta.log file
    cmd: task pod-logs:download APP=kometa NS=media FILE_PATH=/config/logs/meta.log OUTPUT_FILE=./kometa-meta.log

  list-pods:
    desc: List all pods in a namespace [NS=default]
    cmd: kubectl get pods --namespace {{.NS}} -o wide
    vars:
      NS: '{{.NS | default "default"}}'
    preconditions:
      - which kubectl
