---
name: Round Table Chain Guardrails

on:
  pull_request:
    branches: ["main"]
    paths:
      - kubernetes/apps/roundtable/chains/app/**
      - scripts/**
      - .github/workflows/roundtable-chain-guardrails.yaml
  push:
    branches: ["main"]
    paths:
      - kubernetes/apps/roundtable/chains/app/**
      - scripts/**
      - .github/workflows/roundtable-chain-guardrails.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    name: Chain Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Audit chain workspace dependencies
        run: python3 scripts/audit-chain-workspace-deps.py

      - name: Audit morning briefing guardrails
        run: python3 scripts/audit-morning-briefing-chain.py
