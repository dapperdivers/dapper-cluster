---
# Gateway API: unifi serves HTTPS with a self-signed cert on 8443. Route to it via
# an EG Backend with insecureSkipVerify (mirrors nginx backend-protocol: HTTPS).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: unifi
  namespace: selfhosted
spec:
  endpoints:
    - fqdn:
        hostname: unifi.selfhosted.svc.cluster.local
        port: 8443
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: unifi
  namespace: selfhosted
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["unifi.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: unifi
