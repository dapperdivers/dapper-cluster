---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      actual:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 150
            fsGroup: 150
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: 26.7.0
            env:
              ACTUAL_PORT: &httpPort 5006
              # OpenID Connect via Authentik (replaces header/proxy auth)
              ACTUAL_OPENID_SERVER_HOSTNAME: "https://actual.${SECRET_DOMAIN}"
              ACTUAL_OPENID_DISCOVERY_URL: "https://sso.${SECRET_DOMAIN}/application/o/actual/"
              # auto-create the user on first OIDC login (first user becomes owner)
              ACTUAL_USER_CREATION_MODE: "login"
            envFrom:
              - secretRef:
                  name: actual-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M

    service:
      app:
        controller: actual
        ports:
          http:
            port: *httpPort

    # Gateway API (TLS terminates at the Gateway)
    route:
      app:
        hostnames: ["actual.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network

    persistence:
      data:
        existingClaim: actual
        advancedMounts:
          actual:
            app:
              - path: /data
