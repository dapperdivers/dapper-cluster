---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: atuin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-postgres
  target:
    name: atuin-secret
    template:
      engineVersion: v2
      data:
        # DB creation + super-creds are handled by the Kyverno postgres-init
        # automation (atuin-postgres-init secret + injected init container).
        # This secret only supplies the app's connection string.
        ATUIN_DB_URI: postgres://{{ .ATUIN_POSTGRES_USER }}:{{ .ATUIN_POSTGRES_PASSWORD }}@postgres-rw.database.svc.cluster.local/atuin
  dataFrom:
    - find:
        name:
          regexp: ^ATUIN_POSTGRES_(USER|PASSWORD)$
