---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: konflate-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # GitHub App identity (reuses the DUNCE_BOT app) — authenticates reads
        # and mints short-lived installation tokens for write-back (PR comments
        # + status checks). No standing PAT needed.
        KONFLATE_APP_CLIENT_ID: "{{ .DUNCE_BOT_APP_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .DUNCE_BOT_APP_PRIVATE_KEY }}"
  data:
    - secretKey: DUNCE_BOT_APP_CLIENT_ID
      remoteRef:
        key: DUNCE_BOT_APP_CLIENT_ID
    - secretKey: DUNCE_BOT_APP_PRIVATE_KEY
      remoteRef:
        key: DUNCE_BOT_APP_PRIVATE_KEY
