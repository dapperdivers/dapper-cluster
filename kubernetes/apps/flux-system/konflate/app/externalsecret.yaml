---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: konflate-secret
    template:
      engineVersion: v2
      data:
        # GitHub App identity (reuses the DUNCE_BOT app) — authenticates reads
        # and mints short-lived installation tokens for write-back (PR comments
        # + status checks). No standing PAT needed.
        KONFLATE_APP_CLIENT_ID: "{{ .DUNCE_BOT_APP_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .DUNCE_BOT_APP_PRIVATE_KEY }}"
  dataFrom:
    - find:
        name:
          regexp: ^DUNCE_BOT_APP_CLIENT_ID$
    - find:
        name:
          regexp: ^DUNCE_BOT_APP_PRIVATE_KEY$
