---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: konflate
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    config:
      repo: github://dapperdivers/dapper-cluster
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.${SECRET_DOMAIN}
      mcp: true
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      parentRefs:
        - name: internal
          namespace: network
      hostnames:
        - konflate.${SECRET_DOMAIN}
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 2Gi
