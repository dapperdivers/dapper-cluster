---
instance:
  cluster:
    networkPolicy: false
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  sync:
    kind: GitRepository
    url: "https://github.com/DapperDivers/dapper-cluster.git"
    ref: "refs/heads/main"
    path: kubernetes/flux/cluster
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux
  kustomize:
    patches:
      - # Add Sops decryption to 'flux-system' Kustomization
        patch: |
          - op: add
            path: /spec/decryption
            value:
              provider: sops
              secretRef:
                name: sops-age
        target:
          group: kustomize.toolkit.fluxcd.io
          kind: Kustomization
      - # Worker concurrency (base for all controllers; kustomize-controller is
        # raised separately below). Kept low to flatten the per-push reconcile
        # burst against Ceph-RBD-backed etcd rather than maximize throughput.
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --concurrent=4
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=30s
        target:
          kind: Deployment
          name: (kustomize-controller|helm-controller|source-controller)
      - # Increase the memory limits (base)
        patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: all
          spec:
            template:
              spec:
                containers:
                  - name: manager
                    resources:
                      limits:
                        memory: 2Gi
        target:
          kind: Deployment
          name: (helm-controller|source-controller)
      - # Kustomize controller needs more memory (in-memory builds + large cluster)
        patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: all
          spec:
            template:
              spec:
                containers:
                  - name: manager
                    resources:
                      limits:
                        memory: 4Gi
        target:
          kind: Deployment
          name: kustomize-controller
      - # Enable in-memory kustomize builds + kustomize-controller concurrency.
        # Overrides the base --concurrent=4 above; the single GitRepository source
        # fans out to ~116 Kustomizations on every push, so this caps how wide
        # that burst applies in parallel (lower = gentler on etcd, slower sync).
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --concurrent=5
          - op: replace
            path: /spec/template/spec/volumes/0
            value:
              name: temp
              emptyDir:
                medium: Memory
        target:
          kind: Deployment
          name: kustomize-controller
      - # Disable strict postBuild substitution (default true since Flux 2.x).
        # Grafana dashboards and app config templates (e.g. posterizarr) embed
        # dollar-brace template vars meant for downstream consumers, not Flux;
        # strict mode false-positives on them. Follow-up: escape those files so
        # the gate can be re-enabled. (Comment kept free of dollar-brace on
        # purpose: this configmap is itself postBuild-substituted.)
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --feature-gates=StrictPostBuildSubstitutions=false
        target:
          kind: Deployment
          name: kustomize-controller
      - # Enable Helm repositories caching
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --helm-cache-max-size=10
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --helm-cache-ttl=60m
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --helm-cache-purge-interval=5m
        target:
          kind: Deployment
          name: source-controller
      - # Flux near OOM detection for Helm
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --feature-gates=OOMWatch=true
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --oom-watch-memory-threshold=95
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --oom-watch-interval=500ms
        target:
          kind: Deployment
          name: helm-controller
