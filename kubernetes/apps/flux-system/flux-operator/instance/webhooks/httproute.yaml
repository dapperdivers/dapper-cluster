---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-webhook
  namespace: flux-system
  annotations:
    external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
    # The receiver returns 404 on GET, so a default [STATUS]==200 probe would
    # false-alarm. The central gatus config monitors it with the right condition.
    gatus.home-operations.com/enabled: "false"
spec:
  parentRefs:
    - name: external
      namespace: network
  hostnames: ["flux-webhook.${SECRET_DOMAIN}"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: /hook/ }
      backendRefs:
        - name: webhook-receiver
          port: 80
