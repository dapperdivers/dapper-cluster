---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: httproute-authentik-forward-auth
  annotations:
    policies.kyverno.io/title: HTTPRoute Authentik forward-auth
    policies.kyverno.io/subject: HTTPRoute, SecurityPolicy
    policies.kyverno.io/description: >-
      Generates an Envoy Gateway SecurityPolicy (ext-auth via the Authentik
      embedded outpost) for any HTTPRoute annotated
      authentik.home.arpa/forward-auth: "true". The Gateway-API equivalent of
      the nginx auth-url annotation injection. The outpost selects the provider
      by Host. The generated SecurityPolicy is kept in sync and removed when the
      HTTPRoute is deleted or the annotation is cleared (synchronize: true).
spec:
  webhookConfiguration:
    failurePolicy: Ignore
  # Generate for HTTPRoutes that already exist (not just on create/update).
  generateExisting: true
  rules:
    - name: generate-forward-auth-securitypolicy
      match:
        any:
          - resources:
              kinds: ["HTTPRoute"]
              annotations:
                authentik.home.arpa/forward-auth: "true"
      generate:
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: SecurityPolicy
        name: "{{ request.object.metadata.name }}-forward-auth"
        namespace: "{{ request.object.metadata.namespace }}"
        synchronize: true
        data:
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ request.object.metadata.name }}"
            extAuth:
              failOpen: false
              # Forward the client headers the outpost needs: cookie (session/state
              # validation on callback) + x-forwarded-* (correct https scheme/host).
              # Without these the OAuth callback fails with HTTP 400. NOTE: this field
              # is at spec.extAuth level, NOT under .http.
              headersToExtAuth:
                - host
                - cookie
                - x-forwarded-proto
                - x-forwarded-host
                - x-forwarded-for
              http:
                backendRefs:
                  - name: ak-outpost-authentik-embedded-outpost
                    namespace: security
                    port: 9000
                path: /outpost.goauthentik.io/auth/envoy
                headersToBackend:
                  - set-cookie
                  - x-authentik-username
                  - x-authentik-email
                  - x-authentik-groups
                  - x-authentik-uid
                  - x-authentik-name
    # Namespaceless auth: the SecurityPolicy lives in the app namespace but its
    # ext-auth backendRef points at the outpost Service in `security`. That
    # cross-namespace ref needs a ReferenceGrant. ReferenceGrant has no namespace
    # wildcard, so instead of maintaining a hand-written allowlist we generate one
    # grant per source namespace on demand. synchronize: false keeps it sticky (a
    # grant orphaned when the last annotated route in a ns is removed is harmless).
    - name: generate-outpost-referencegrant
      match:
        any:
          - resources:
              kinds: ["HTTPRoute"]
              annotations:
                authentik.home.arpa/forward-auth: "true"
      generate:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: ReferenceGrant
        name: "securitypolicy-to-outpost-{{ request.object.metadata.namespace }}"
        namespace: security
        synchronize: false
        data:
          spec:
            from:
              - group: gateway.envoyproxy.io
                kind: SecurityPolicy
                namespace: "{{ request.object.metadata.namespace }}"
            to:
              - group: ""
                kind: Service
                name: ak-outpost-authentik-embedded-outpost
