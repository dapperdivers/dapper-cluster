---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: turtle-track-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-chelonian
  target:
    name: turtle-track-secret
    template:
      engineVersion: v2
      data:
        NEXTAUTH_SECRET: "{{ .TURTLE_TRACK_NEXTAUTH_SECRET }}"
        NEXTAUTH_URL: "https://turtle-track.chelonianlabs.com"
        DATABASE_URL: "postgres://{{ .TURTLE_TRACK_DB_USER }}:{{ .TURTLE_TRACK_DB_PASS }}@postgres-rw.database.svc:5432/turtle_track"
        INIT_POSTGRES_HOST: "postgres-rw.database.svc"
        INIT_POSTGRES_SUPER_USER: "postgres"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_DBNAME: "turtle_track"
        INIT_POSTGRES_USER: "{{ .TURTLE_TRACK_DB_USER }}"
        INIT_POSTGRES_PASS: "{{ .TURTLE_TRACK_DB_PASS }}"
        GOOGLE_CLIENT_ID: "{{ .TURTLE_TRACK_GOOGLE_CLIENT_ID }}"
        GOOGLE_CLIENT_SECRET: "{{ .TURTLE_TRACK_GOOGLE_CLIENT_SECRET }}"
        GITHUB_CLIENT_ID: "{{ .TURTLE_TRACK_GITHUB_CLIENT_ID }}"
        GITHUB_CLIENT_SECRET: "{{ .TURTLE_TRACK_GITHUB_CLIENT_SECRET }}"
  dataFrom:
    - find:
        name:
          regexp: ^(TURTLE_TRACK|POSTGRES_SUPER).*
