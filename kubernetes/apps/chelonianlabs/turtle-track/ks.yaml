---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: turtle-track
  namespace: chelonianlabs
spec:
  targetNamespace: chelonianlabs
  commonMetadata:
    labels:
      app.kubernetes.io/name: turtle-track
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
  path: ./kubernetes/apps/chelonianlabs/turtle-track/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
