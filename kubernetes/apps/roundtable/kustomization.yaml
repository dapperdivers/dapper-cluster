---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: roundtable
components:
  - ../../flux/components/common
resources:
  - ./namespace.yaml
  - ./infrastructure/ks.yaml   # RBAC, secrets, shared vault PV/PVC
  - ./operator/ks.yaml         # Roundtable operator (manages Knight CRDs)
  - ./knights/ks.yaml          # Personal RoundTable + 10 Knight CRs + per-knight secrets
  - ./chains/ks.yaml           # Chain CRs (morning briefing, pentest, etc.)
  - ./chelonian/ks.yaml        # ChelonianLabs finance app development table
  - ./juice-shop/ks.yaml       # OWASP Juice Shop — vulnerable test target for pentest autoresearch
