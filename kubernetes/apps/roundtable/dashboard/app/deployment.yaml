---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundtable-dashboard
  namespace: roundtable
  labels:
    app.kubernetes.io/name: roundtable-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: roundtable-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roundtable-dashboard
    spec:
      serviceAccountName: roundtable-dashboard
      containers:
        - name: dashboard
          image: ghcr.io/dapperdivers/roundtable-ui:e4b2c298ec0d026ff124d3ec539a8b4c3ff13c2e
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NATS_URL
              value: "nats://nats.database.svc:4222"
            - name: NAMESPACE
              value: "roundtable"
            - name: VAULT_PATH
              value: "/vault"
          volumeMounts:
            - name: vault
              mountPath: /vault
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: roundtable-vault
---
apiVersion: v1
kind: Service
metadata:
  name: roundtable-dashboard
  namespace: roundtable
spec:
  selector:
    app.kubernetes.io/name: roundtable-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundtable-dashboard
  namespace: roundtable
  annotations:
    external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
spec:
  ingressClassName: internal
  rules:
    - host: "roundtable.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundtable-dashboard
                port:
                  name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: roundtable-dashboard
  namespace: roundtable
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: roundtable-dashboard
  namespace: roundtable
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: roundtable-dashboard
  namespace: roundtable
subjects:
  - kind: ServiceAccount
    name: roundtable-dashboard
    namespace: roundtable
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: roundtable-dashboard
