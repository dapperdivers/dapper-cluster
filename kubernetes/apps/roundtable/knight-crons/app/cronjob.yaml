# ── Gawain Morning Briefing Synthesis ──────────────────────────────
# Runs 50 minutes after the first knight, reads vault files written by
# all 6 domain knights, and produces a cross-referenced daily briefing.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: morning-briefing-synthesis
  namespace: roundtable
spec:
  schedule: "50 11 * * *"  # 5:50 AM CST — after all knights finish
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: nats-pub
              image: natsio/nats-box:0.19.3
              command:
                - /bin/sh
                - -c
                - |
                  TODAY=$$(date +%Y-%m-%d)
                  DOW=$$(date +%u)
                  VAULT_PATH="/vault/Briefings/Daily/$${TODAY}.md"
                  SOURCES="Security: /vault/Briefings/Security/$${TODAY}.md | Intel: /vault/Briefings/Intel/$${TODAY}.md | HomeLab: /vault/Briefings/HomeLab/$${TODAY}.md | Finance: /vault/Briefings/Finance/$${TODAY}.md | Career: /vault/Briefings/Career/$${TODAY}.md | Home: /vault/Briefings/Home/$${TODAY}.md"
                  nats pub \
                    --server=nats://nats.database.svc:4222 \
                    "fleet-a.tasks.orchestration.morning-briefing-$${TODAY}" \
                    "{\"from\":\"cron\",\"task_id\":\"morning-briefing-$${TODAY}\",\"domain\":\"orchestration\",\"task\":\"MORNING BRIEFING SYNTHESIS — You are assembling today's Daily Briefing from 6 knight reports. Read each vault file and produce a cross-referenced synthesis. SOURCE FILES: $${SOURCES} — INSTRUCTIONS: 1) Read each source file that exists. Skip any that are missing (note which knights didn't report). 2) Extract the TOP 3 action items across ALL domains. Lead with these. 3) Cross-reference findings: Does a security CVE affect our infrastructure? Does a financial deadline impact family plans? Connect the dots between domains. 4) Flag any items that need Tim or Derek's immediate attention. 5) Write the synthesis to $${VAULT_PATH} with sections: ## Action Items, ## Cross-Domain Connections, ## Domain Summaries (one paragraph each), ## Missing Reports, ## Cost Summary. 6) Keep it under 500 lines. This is a BRIEFING not a novel. 7) Your final message should be: Briefing written to $${VAULT_PATH}. Today is $${TODAY}.\",\"run_id\":\"daily-$${TODAY}\",\"metadata\":{\"type\":\"scheduled\",\"schedule\":\"synthesis\",\"timeout_ms\":900000}}"
