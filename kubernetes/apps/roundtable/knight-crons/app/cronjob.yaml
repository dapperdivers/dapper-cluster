---
# Daily CronJobs for the Knights of the Round Table
# Each knight publishes a NATS message at 5:00 AM CST (11:00 UTC) to trigger their daily report.
# Knights: Galahad (security), Kay (research), Bedivere (home),
#          Tristan (infra), Percival (finance), Lancelot (career)
#
# OUTPUT CONTRACT: All knights MUST output JSON conforming to shared/daily-reports contract.
# The Briefing Collector (11:45 UTC) parses these structured results.
#
# Galahad has day-of-week aware scheduling:
#   Mon: Weekend review (72h lookback)
#   Tue-Thu: Standard daily brief (24h)
#   Fri: Weekly summary with trend analysis
#   Sat-Sun: Light weekend scan (critical-only)
#
# NOTE: $${VAR} syntax is required because Flux postBuild substitutions
# would otherwise consume ${VAR} before the shell sees it.

# --- Shared task suffix injected into every knight's task description ---
# This enforces the daily-reports JSON contract across all knights.
# CONTRACT_SUFFIX is defined inline per-knight since CronJob doesn't support shared env.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-galahad
  namespace: roundtable
spec:
  schedule: "0 11 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: nats-pub
              image: natsio/nats-box:0.19.3
              command:
                - /bin/sh
                - -c
                - |
                  TODAY=$$(date +%Y-%m-%d)
                  DOW=$$(date +%u)
                  CONTRACT="IMPORTANT: Follow your daily-security-report skill. Your output MUST be valid JSON conforming to the shared/daily-reports contract schema. Include: knight, run_id (daily-$${TODAY}), report_type (daily-briefing), timestamp, summary, sections array (each with title/priority/content/data_sources/confidence), highlights array (3-5 bullets), follow_up_needed, follow_up_questions. Also render the markdown template to /vault/Briefings/Security/$${TODAY}.md"
                  case $$DOW in
                    1) MODE="weekend-review"; TIMEOUT=3600000; DESC="Generate a WEEKEND REVIEW covering the last 72 hours. Focus on attacks launched over the weekend, Friday evening vulnerability dumps, and Monday-morning-relevant advisories. Use your opencti-intel scripts at /skills/security/opencti-intel/scripts/." ;;
                    5) MODE="weekly-summary"; TIMEOUT=3600000; DESC="Generate a WEEKLY SUMMARY with trend analysis. Review the full week of threat intelligence. Include platform growth stats, top CVEs by severity, most active threat feeds, and whether threat volume is increasing or decreasing. Use your opencti-intel scripts at /skills/security/opencti-intel/scripts/." ;;
                    6|7) MODE="weekend-scan"; TIMEOUT=600000; DESC="WEEKEND SCAN - light touch, critical items only. Quick check of OpenCTI for any critical CVEs or active exploitation. Keep it brief." ;;
                    *) MODE="daily-brief"; TIMEOUT=1800000; DESC="Generate your daily threat intelligence briefing. Cover the last 24 hours of OpenCTI data including new indicators, vulnerabilities, malware, and reports. Use your opencti-intel scripts at /skills/security/opencti-intel/scripts/." ;;
                  esac
                  nats pub \
                    --server=nats://nats.database.svc:4222 \
                    "fleet-a.tasks.security.daily-$${TODAY}-galahad" \
                    "{\"from\":\"cron\",\"task_id\":\"daily-$${TODAY}-galahad\",\"domain\":\"security\",\"task\":\"$${DESC} $${CONTRACT} Today is $${TODAY}.\",\"run_id\":\"daily-$${TODAY}\",\"metadata\":{\"type\":\"scheduled\",\"schedule\":\"$${MODE}\",\"timeout_ms\":$${TIMEOUT}}}"
---
