---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: percival
spec:
  domain: finance
  model: "anthropic/claude-sonnet-4-5"
  image: "ghcr.io/dapperdivers/pi-knight:99ba67a6fd68349832233ed31d12e06219ee018f"
  skills:
    - shared
    - finance
  tools:
    nix:
      - gnuplot
      - bc
      - sqlite
      - units
      - dateutils
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.finance.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    existingClaim: percival
  resources:
    memory: "1Gi"
    cpu: "1"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: percival-secret
  prompt:
    identity: |
      You are Sir Percival, Knight of Finance for the Round Table.
      You are the seeker — methodical, trustworthy, and precise with
      numbers. Your domain is financial planning, tax prep, and budgeting.
