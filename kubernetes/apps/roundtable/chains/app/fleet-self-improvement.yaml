---
apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: fleet-self-improvement
  namespace: roundtable
spec:
  roundTableRef: personal
  description: "Weekly fleet self-improvement — knights report tool/skill gaps, Gawain PRs the fixes"
  schedule: "0 14 * * 1"
  timeout: 3600
  outputKnight: gawain
  retryPolicy:
    maxRetries: 1
    backoffSeconds: 60
  steps:
    # Phase 1 — Each knight self-assesses (parallel, no dependencies)
    # IMPORTANT: Each knight MUST respond with ONLY valid YAML. No prose, no markdown, no explanations.
    - name: galahad_assess
      knightRef: galahad
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir GALAHAD, domain: security.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.

        Check what's actually installed: run `which trivy semgrep gosec nikto nuclei kubectl` and `ls /data/skills/`.

        OUTPUT FORMAT — respond with ONLY this YAML, nothing else:
        ```yaml
        knight: galahad
        domain: security
        tools_verified:
          - name: tool_name
            status: installed|missing|broken
        missing_tools:
          - name: tool_name
            reason: "one line"
            nix_package: "nixpkgs.package_name"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools:
          - name: tool_name
            error: "what happens"
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. NO EXPLANATIONS. YAML ONLY.

    - name: tristan_assess
      knightRef: tristan
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir TRISTAN, domain: infra.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.

        Check what's installed: run `which kubectl flux kustomize helm trivy popeye crane` and `ls /data/skills/`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: tristan
        domain: infra
        tools_verified:
          - name: tool_name
            status: installed|missing|broken
        missing_tools:
          - name: tool_name
            reason: "one line"
            nix_package: "nixpkgs.package_name"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools:
          - name: tool_name
            error: "what happens"
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: kay_assess
      knightRef: kay
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir KAY, domain: research.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.

        Check what's installed: `ls /data/skills/` and `which curl jq yq`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: kay
        domain: research
        tools_verified:
          - name: tool_name
            status: installed|missing|broken
        missing_tools:
          - name: tool_name
            reason: "one line"
            nix_package: "nixpkgs.package_name"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools:
          - name: tool_name
            error: "what happens"
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: bedivere_assess
      knightRef: bedivere
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir BEDIVERE, domain: home.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check: `ls /data/skills/` and `ls /vault/`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: bedivere
        domain: home
        tools_verified: []
        missing_tools:
          - name: tool_name
            reason: "one line"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: percival_assess
      knightRef: percival
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir PERCIVAL, domain: finance. Your knight name is "percival" — use that in output.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check: `ls /data/skills/` and `ls /vault/`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: percival
        domain: finance
        tools_verified: []
        missing_tools:
          - name: tool_name
            reason: "one line"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: lancelot_assess
      knightRef: lancelot
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir LANCELOT, domain: career.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check: `ls /data/skills/` and `ls /vault/`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: lancelot
        domain: career
        tools_verified: []
        missing_tools:
          - name: tool_name
            reason: "one line"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY. Do not write an essay. Do not narrate. Just the YAML.

    - name: agravain_assess
      knightRef: agravain
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir AGRAVAIN, domain: pentest.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check what's installed: `which nmap gobuster nikto sqlmap ffuf nuclei feroxbuster` and `ls /data/skills/`.

        DIAGNOSTIC: Also run `echo "AGRAVAIN_ALIVE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"` and include the timestamp.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: agravain
        domain: pentest
        diagnostic: "AGRAVAIN_ALIVE=<timestamp>"
        tools_verified:
          - name: tool_name
            status: installed|missing|broken
        missing_tools:
          - name: tool_name
            reason: "one line"
            nix_package: "nixpkgs.package_name"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: gareth_assess
      knightRef: gareth
      continueOnFailure: true
      timeout: 600
      task: |
        You are Sir GARETH, domain: wellness. NOT Bedivere. You are GARETH.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check: `ls /data/skills/` and `ls /vault/`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: gareth
        domain: wellness
        tools_verified: []
        missing_tools:
          - name: tool_name
            reason: "one line"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    - name: patsy_assess
      knightRef: patsy
      continueOnFailure: true
      timeout: 600
      task: |
        You are PATSY, domain: vault.

        SELF-IMPROVEMENT ASSESSMENT — Review your tools and recent tasks.
        Check: `ls /data/skills/` and `which rg fd yq jq`.

        OUTPUT FORMAT — respond with ONLY YAML:
        ```yaml
        knight: patsy
        domain: vault
        tools_verified:
          - name: tool_name
            status: installed|missing|broken
        missing_tools:
          - name: tool_name
            reason: "one line"
        missing_skills:
          - name: skill_name
            description: "one line"
        broken_tools: []
        efficiency_gaps:
          - description: "one line"
        ```
        NO PROSE. YAML ONLY.

    # Phase 2 — Gawain aggregates and creates PR
    - name: aggregate_and_pr
      knightRef: gawain
      outputPath: "/vault/Roundtable/Improvement-Requests/{{ .Date }}.md"
      dependsOn:
        - galahad_assess
        - tristan_assess
        - kay_assess
        - bedivere_assess
        - percival_assess
        - lancelot_assess
        - agravain_assess
        - gareth_assess
        - patsy_assess
      timeout: 600
      task: |
        FLEET SELF-IMPROVEMENT AGGREGATION

        Knight self-assessments (some may be empty if a knight timed out):

        Galahad (security): {{ .Steps.galahad_assess.Output }}
        Tristan (infra): {{ .Steps.tristan_assess.Output }}
        Kay (research): {{ .Steps.kay_assess.Output }}
        Bedivere (home): {{ .Steps.bedivere_assess.Output }}
        Percival (finance): {{ .Steps.percival_assess.Output }}
        Lancelot (career): {{ .Steps.lancelot_assess.Output }}
        Agravain (pentest): {{ .Steps.agravain_assess.Output }}
        Gareth (wellness): {{ .Steps.gareth_assess.Output }}
        Patsy (vault): {{ .Steps.patsy_assess.Output }}

        INSTRUCTIONS:
        1) Parse all YAML responses. Aggregate across knights.
        2) Deduplicate — if multiple knights request the same tool, note that.
        3) Prioritize by impact (tools requested by multiple knights > single requests).
        4) For each APPROVED change, prepare the actual update:
           - **Nix tools**: Update the Knight CR YAML in dapper-cluster
           - **Skills**: Note what needs to be created in roundtable-arsenal
        5) Create a PR to `dapperdivers/dapper-cluster` with the Knight CR changes.
           Use `gh` CLI. Branch name: `fleet-improvement/YYYY-MM-DD`.
           Target: the Knight YAML files under `kubernetes/apps/roundtable/knights/`.
        6) Before creating ANY issue on `dapperdivers/roundtable-arsenal`:
           - Run `gh issue list --repo dapperdivers/roundtable-arsenal --state open --limit 50`
           - Search for existing issues covering the same topic
           - If an existing issue already covers this need, SKIP creating a new one
           - Only create issues for genuinely NEW skill/tool gaps not already tracked
           - Reference existing issue numbers in your summary if relevant

        IMPORTANT:
        - Only add tools that are real Nix packages (verify with `nix-env -qaP | grep`)
        - Don't remove existing tools — only ADD
        - Don't change domains, models, or NATS config
        - Keep PRs focused — one PR per improvement cycle
        - **NEVER include PII in PRs or commits** — no real names, account numbers, balances,
          addresses, or personal financial data. Config files are TEMPLATES only.
          Real data belongs in the vault (mounted at runtime), not in git repos.

        Return a markdown summary of:
        - What changes were made (PR link if created)
        - What was deferred and why
        - Total requests vs approved
        - Any new arsenal issues created
