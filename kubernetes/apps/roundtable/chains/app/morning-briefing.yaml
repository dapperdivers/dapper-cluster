---
apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: morning-briefing
  namespace: roundtable
spec:
  roundTableRef: personal
  description: "Daily morning mission briefing — full domain reports, cross-referenced synthesis"
  schedule: "0 11 * * *"
  timeout: 2400
  retryPolicy:
    maxRetries: 1
    backoffSeconds: 60
  outputKnight: gawain
  steps:
    # Phase 1 — Domain knights run in parallel (no dependencies)
    # Each writes a full report to /vault/Briefings/<domain>/
    # and returns a concise NATS summary for Gawain
    - name: security_intel
      knightRef: galahad
      continueOnFailure: true
      task: |
        Generate your daily security briefing.
        Check /vault/Briefings/Security/ for yesterday's report and note deltas.
        Review cluster security posture: expiring certs, failed security pods,
        Kyverno violations, CVEs in running images.
        Write your full report to /vault/Briefings/Security/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-8 bullet points MAX, action items only).
        If nothing changed since yesterday, say "No significant changes."
      timeout: 900

    - name: intel_digest
      knightRef: kay
      continueOnFailure: true
      task: |
        Generate today's intelligence digest. Research current events, technology news,
        and anything relevant to Derek's interests (security, AI, homelab, career).
        Write your full report to /vault/Briefings/Intel/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-10 bullet points, key findings only).
      timeout: 900

    - name: infra_status
      knightRef: tristan
      continueOnFailure: true
      task: |
        Generate today's infrastructure report. Check cluster health, node status,
        failing pods, resource pressure, Flux reconciliation state, and any deployment issues.
        Write your full report to /vault/Briefings/HomeLab/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-10 bullet points, key findings and action items).
      timeout: 900

    - name: home_tasks
      knightRef: bedivere
      continueOnFailure: true
      task: |
        Generate today's household briefing. Check family calendar, upcoming events,
        nursery prep status, baby countdown, and any home tasks needing attention.
        Write your full report to /vault/Briefings/Home/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-10 bullet points).
      timeout: 900

    - name: finance_check
      knightRef: percival
      continueOnFailure: true
      task: |
        Generate today's financial briefing. Check tax deadlines, bill due dates,
        budget status, investment updates, and any items needing immediate attention.
        Write your full report to /vault/Briefings/Finance/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-10 bullet points).
      timeout: 900

    - name: career_update
      knightRef: lancelot
      continueOnFailure: true
      task: |
        Generate today's career briefing. Check pending applications, interview feedback,
        job market updates, and any action items.
        Write your full report to /vault/Briefings/Career/YYYY-MM-DD.md (use today's date, e.g. 2026-03-13.md).
        FILENAME MUST be exactly YYYY-MM-DD.md — no prefixes, no suffixes, no variations.
        Return a concise summary via NATS (5-10 bullet points).
      timeout: 900

    - name: wellness_check
      knightRef: gareth
      continueOnFailure: true
      task: |
        Generate today's wellness briefing. Emma's due date is April 29, 2026.
        Calculate the current pregnancy week. Report on:
        - Current week milestones and baby development
        - Nutrition focus for this week
        - Any upcoming appointments or prep tasks
        Read /vault/Personal/Family/Emma.md and /vault/Briefings/Home/ for context.
        Write your full report to /vault/Briefings/Home/wellness-YYYY-MM-DD.md (e.g. wellness-2026-03-13.md)
        Return a concise summary via NATS (3-5 bullet points).
      timeout: 600

    # Phase 2 — Gawain synthesizes all reports
    - name: synthesize
      knightRef: gawain
      outputPath: "/vault/Briefings/Daily/{{ .Date }}.md"
      dependsOn:
        - security_intel
        - intel_digest
        - infra_status
        - home_tasks
        - finance_check
        - career_update
        - wellness_check
      task: |
        MORNING BRIEFING SYNTHESIS — Assemble today's Daily Briefing.

        Knight summaries (some may be empty if a knight timed out — note missing reports):
        Security (Galahad): {{ .Steps.security_intel.Output }}
        Intel (Kay): {{ .Steps.intel_digest.Output }}
        Infrastructure (Tristan): {{ .Steps.infra_status.Output }}
        Home (Bedivere): {{ .Steps.home_tasks.Output }}
        Finance (Percival): {{ .Steps.finance_check.Output }}
        Career (Lancelot): {{ .Steps.career_update.Output }}
        Wellness (Gareth): {{ .Steps.wellness_check.Output }}

        HARD RULES — VIOLATION = FAILURE:
        1) DO NOT read vault reports. The NATS summaries above are your ONLY input.
        2) MAXIMUM 150 LINES. Count them. If you exceed 150, the briefing FAILS.
        3) DO NOT copy knight text verbatim — synthesize and connect dots.
        4) Only ACTION items. Zero informational filler.
        5) If a domain has no changes, give it ONE line: "🟢 No change."

        STRUCTURE (exactly this, no additions):

        # Daily Briefing — YYYY-MM-DD

        ## 🚨 TOP 3 ACTION ITEMS
        Each: what + why + deadline. MAX 3 lines per item. Total: ~12 lines.

        ## 🔗 CROSS-DOMAIN CONNECTIONS
        2-3 connections where domains intersect. 2 lines each. Total: ~8 lines.

        ## 📊 DOMAIN SNAPSHOTS
        One line per domain with status emoji. Expand ONLY if action needed (3 bullets max).
        Static domains get one line. Total: ~30 lines.

        ## ❌ MISSING REPORTS
        List timeouts. Skip if all reported. Total: ~3 lines.

        NO cost summary. NO week preview. NO calendar. NO essays. NO padding.
        Target: 80-120 lines. 2-minute read. Return as NATS response.
      timeout: 600
