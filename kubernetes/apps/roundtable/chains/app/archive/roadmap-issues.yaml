---
apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: roadmap-issues
  namespace: roundtable
spec:
  roundTableRef: personal
  timeout: 3600
  suspended: true
  steps:
    - name: draft_issues
      knightRef: kay
      timeout: 600
      task: |
        Draft 9 GitHub issues for the Round Table operator roadmap as a JSON array.
        Output ONLY valid JSON.
    - name: create_issues
      knightRef: coder-1
      timeout: 600
      dependsOn:
        - draft_issues
      task: |
        Read the previous step output and create GitHub issues from the JSON array.
        Report: CREATED: #NUMBER — TITLE for each issue.
