---
apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: phase3a-crd-types
  namespace: roundtable
spec:
  roundTableRef: personal
  description: "Phase 3a PR2: Add CRD type changes for dynamic missions (Issue #17)"
  timeout: 3600
  outputKnight: gawain
  retryPolicy:
    maxRetries: 0
  steps:
    # ═══════════════════════════════════════════════════════
    # PHASE 1 — Research + Setup (PARALLEL, no dependencies)
    # ═══════════════════════════════════════════════════════

    - name: research_design
      knightRef: kay
      timeout: 300
      continueOnFailure: false
      task: |
        TASK: Extract the exact CRD changes needed from the Phase 3 design doc.

        Read /vault/Projects/Round Table/Phase 3 - Dynamic Mission Tables.md
        Focus on Section 3 "CRD Changes" — extract EVERY new field, type, and enum.

        Write a structured spec to /shared/chains/phase3a-crd-types/design-spec.md:
        ```
        ## mission_types.go
        ### New Phase Constants
        - Pending, Provisioning
        ### New Fields on MissionSpec
        - fieldName: type // description
        ### New Types
        - TypeName { fields... }
        ## roundtable_types.go
        ### New Fields
        - ...
        ## chain_types.go
        ### New Fields
        - ...
        ```

    - name: read_current_types
      knightRef: tristan
      timeout: 300
      continueOnFailure: false
      task: |
        TASK: Copy the current CRD type files from the shared repo for reference.

        The repo is pre-cloned at /shared/repos/roundtable. Run:
        ```bash
        cd /shared/repos/roundtable && git pull
        mkdir -p /shared/chains/phase3a-crd-types/current
        cp api/v1alpha1/mission_types.go /shared/chains/phase3a-crd-types/current/
        cp api/v1alpha1/roundtable_types.go /shared/chains/phase3a-crd-types/current/
        cp api/v1alpha1/chain_types.go /shared/chains/phase3a-crd-types/current/
        cp api/v1alpha1/knight_types.go /shared/chains/phase3a-crd-types/current/
        ```

        Also create the working branch:
        ```bash
        cd /shared/repos/roundtable
        git checkout -b phase3a/crd-type-changes main
        ```

        OUTPUT: List the files copied and current HEAD sha.

    # ═══════════════════════════════════════════════════════
    # PHASE 2 — Code Generation (after both Phase 1 steps)
    # ═══════════════════════════════════════════════════════

    - name: generate_code
      knightRef: gawain
      timeout: 600
      dependsOn:
        - research_design
        - read_current_types
      task: |
        TASK: Implement the CRD type changes for Phase 3 dynamic missions.

        INPUTS:
        - Design spec: /shared/chains/phase3a-crd-types/design-spec.md
        - Current types: /shared/chains/phase3a-crd-types/current/*.go

        WORK DIRECTLY in the repo at /shared/repos/roundtable (branch phase3a/crd-type-changes).
        Edit the files IN PLACE:
        - api/v1alpha1/mission_types.go
        - api/v1alpha1/roundtable_types.go
        - api/v1alpha1/chain_types.go

        RULES:
        1. ALL changes are ADDITIVE — do NOT remove or modify existing fields
        2. Use proper kubebuilder markers (+kubebuilder:validation, +optional, +kubebuilder:default)
        3. Add godoc comments on every new field and type
        4. Follow existing code style exactly
        5. After editing, run: `cd /shared/repos/roundtable && go build ./...`
        6. If build fails, FIX the errors and try again
        7. Commit your changes: `git add -A && git commit -m "feat(api): add Phase 3 dynamic mission types"`

        OUTPUT: The `go build` output (should be clean) and `git diff --stat` of changes.

    # ═══════════════════════════════════════════════════════
    # PHASE 3 — Review + Test (PARALLEL, both need Phase 2)
    # ═══════════════════════════════════════════════════════

    - name: security_review
      knightRef: galahad
      timeout: 300
      continueOnFailure: true
      dependsOn:
        - generate_code
      task: |
        TASK: Security review of the CRD type changes.

        Review the changes in /shared/repos/roundtable (branch phase3a/crd-type-changes).
        Run: `cd /shared/repos/roundtable && git diff main..HEAD`

        Check for:
        1. Fields enabling privilege escalation (secret refs, SA names, resource overrides)
        2. Missing validation markers (unbounded strings, missing min/max)
        3. Unsafe defaults (e.g., overly permissive booleans)
        4. RBAC implications

        Write findings to /shared/chains/phase3a-crd-types/security-review.md
        Mark issues as CRITICAL / HIGH / MEDIUM / LOW.

    - name: generate_manifests
      knightRef: tristan
      timeout: 300
      continueOnFailure: true
      dependsOn:
        - generate_code
      task: |
        TASK: Generate CRD manifests and run validation.

        ```bash
        cd /shared/repos/roundtable
        # Generate CRD YAML from Go types
        make manifests
        # Copy CRDs to chart
        cp config/crd/bases/ai.roundtable.io_*.yaml charts/roundtable-operator/crds/
        # Remove any stray kustomization.yaml (known gotcha!)
        rm -f charts/roundtable-operator/crds/kustomization.yaml
        # Verify build still clean
        go build ./...
        # Commit manifest changes
        git add -A && git commit -m "chore: regenerate CRD manifests" --allow-empty
        ```

        OUTPUT: List of updated CRD files and any warnings.

    # ═══════════════════════════════════════════════════════
    # PHASE 4 — Create PR (after review + manifests)
    # ═══════════════════════════════════════════════════════

    - name: create_pr
      knightRef: tristan
      timeout: 300
      dependsOn:
        - security_review
        - generate_manifests
      task: |
        TASK: Push the branch and create a PR.

        ```bash
        cd /shared/repos/roundtable

        # Apply any critical security fixes from Galahad's review
        REVIEW="/shared/chains/phase3a-crd-types/security-review.md"
        if [ -f "$REVIEW" ]; then
          echo "Security review exists — check for CRITICAL items"
          cat "$REVIEW"
        fi

        # Push branch
        git push origin phase3a/crd-type-changes --force

        # Create PR
        gh pr create \
          --title "feat(api): add Phase 3 dynamic mission types" \
          --body "## Summary
        Add CRD type changes for Phase 3 dynamic missions.

        All changes are additive (no breaking changes):
        - Mission: knightTemplates, costBudgetUSD, secrets, recruitExisting, roundTableTemplate, retainResults
        - Mission phases: Pending, Provisioning
        - RoundTable: ephemeral, missionRef
        - Chain: missionRef

        Closes #17

        ## Security Review
        $(cat /shared/chains/phase3a-crd-types/security-review.md 2>/dev/null | head -50 || echo 'No review available')
        " \
          --base main
        ```

        OUTPUT: The PR URL.
