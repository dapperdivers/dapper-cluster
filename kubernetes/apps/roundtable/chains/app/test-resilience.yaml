---
apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: test-resilience
  namespace: roundtable
spec:
  description: "Test chain resilience features: continueOnFailure, retry, and KV resume"
  timeout: 600
  suspended: true
  steps:
    # Step 1: Should succeed normally
    - name: step_success
      knightRef: gawain
      timeout: 120
      task: "Reply with exactly: STEP_1_OK"

    # Step 2: Will fail (references non-existent knight) but has continueOnFailure — chain should continue
    - name: step_fail_continue
      knightRef: ghost-knight-does-not-exist
      timeout: 15
      continueOnFailure: true
      dependsOn: ["step_success"]
      task: "This task is sent to a non-existent knight. It should time out and fail."

    # Step 3: Has retry configured — tests retry mechanism
    - name: step_with_retry
      knightRef: gawain
      timeout: 120
      dependsOn: ["step_fail_continue"]
      retry:
        maxAttempts: 2
        backoffSeconds: 10
      task: |
        Reply with exactly: RETRY_TEST_OK
        Previous step (which had continueOnFailure): {{ .Steps.step_fail_continue.Output }}

    # Step 4: Final step — proves chain continued past the failure
    - name: step_final
      knightRef: gawain
      timeout: 120
      dependsOn: ["step_with_retry"]
      task: |
        This is the final step of the resilience test chain.
        Step 1 output: {{ .Steps.step_success.Output }}
        Step 2 (failed with continueOnFailure): {{ .Steps.step_fail_continue.Output }}
        Step 3 (with retry): {{ .Steps.step_with_retry.Output }}

        Summarize what you received from each step. Reply with: RESILIENCE_TEST_COMPLETE
