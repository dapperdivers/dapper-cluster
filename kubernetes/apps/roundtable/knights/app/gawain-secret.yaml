# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gawain
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: gawain-secret
    template:
      engineVersion: v2
      data:
        GH_TOKEN: "{{ .GAWAIN_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^GAWAIN_GITHUB.*
