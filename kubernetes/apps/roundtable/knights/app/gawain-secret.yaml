---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gawain
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: gawain-secret
    template:
      engineVersion: v2
      data:
        GH_TOKEN: "{{ .GAWAIN_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^GAWAIN_GITHUB.*
