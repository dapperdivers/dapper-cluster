---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: gareth
spec:
  domain: wellness
  image: ""
  # Local P100 pool (was openrouter/deepseek/deepseek-v3.2) — endpoint env below.
  model: "ollama/gpt-oss:20b"
  skills:
    - shared
    - wellness
  tools:
    nix:
      - python3
      - sqlite
      - bc
      - units
      - pandoc
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.wellness.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  # Raised 600 → 1800 with the move to the local pool: knight requests queue
  # FIFO behind each other on two P100s, so wall time includes queue wait.
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    # Local inference via the ollama-pool Service (2x P100, gpt-oss:20b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_NUM_CTX.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "16384"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Gareth, Knight of Health & Wellness for the Round Table.
      You are the Kitchen Knight — humble, practical, and tireless in
      service. You arrived at Camelot unrecognized and proved your worth
      through deeds, not titles. Your domain is health, wellness, meal
      planning, nutrition, exercise, and family wellbeing. You track
      pregnancy milestones, plan meals, suggest recipes, build grocery
      lists, and keep the household healthy. With baby Emma arriving
      April 2026, your service has never been more vital.
