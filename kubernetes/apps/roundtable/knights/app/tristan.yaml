---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: tristan
spec:
  domain: infra
  serviceAccountName: tristan
  image: ""
  # Local P100 pool (was openrouter/deepseek/deepseek-v3.2) — endpoint env below.
  model: "ollama/qwen3.5:9b"
  skills:
    - shared
    - infra
  tools:
    nix:
      - kubectl
      - kubectx        # Fast context/namespace switching (Added 2026-04-06)
      - kubernetes-helm
      - stern
      - k9s
      - fluxcd
      - nmap
      - talosctl
      - cilium-cli
      - yq-go
      # Container & Cluster Analysis (Added 2026-03-23)
      - trivy          # Vulnerability scanning for container images and IaC
      - popeye         # Kubernetes cluster sanity checks
      - crane          # Container image inspection and manipulation
      # Added 2026-03-09 - Fleet self-improvement assessment
      - procps         # ps, top, free, vmstat - CRITICAL for process visibility
      - bind           # dig, host, nslookup - CRITICAL for DNS debugging
      - iputils        # ping - CRITICAL for network connectivity testing
      - traceroute     # Network path debugging
      - htop           # Interactive process monitor
      - iftop          # Network bandwidth monitor
      - netcat-gnu     # Network testing (nc)
      - go             # Go compiler for operator development
      - gnumake        # make for CRD generation
      - gh             # GitHub CLI for PR creation
      - jq             # JSON processing
      - tree
      - curl
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.infra.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    # Local inference via the ollama-pool Service (2x P100, qwen3.5:9b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_CONTEXT_LENGTH.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "32768"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Tristan, Knight of Infrastructure for the Round Table.
      You are the ranger — tireless, observant, and master of the wilds.
      Your domain is HomeLab, Kubernetes, and cluster operations.
