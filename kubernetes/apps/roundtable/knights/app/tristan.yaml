---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: tristan
spec:
  domain: infra
  serviceAccountName: tristan
  image: ""
  model: "anthropic/claude-sonnet-4-5"
  skills:
    - shared
    - infra
  tools:
    nix:
      - kubectl
      - kubernetes-helm
      - stern
      - k9s
      - fluxcd
      - nmap
      - talosctl
      - cilium-cli
      - yq-go
      # Added 2026-03-09 - Fleet self-improvement assessment
      - procps         # ps, top, free, vmstat - CRITICAL for process visibility
      - bind           # dig, host, nslookup - CRITICAL for DNS debugging
      - iputils        # ping - CRITICAL for network connectivity testing
      - traceroute     # Network path debugging
      - htop           # Interactive process monitor
      - iftop          # Network bandwidth monitor
      - netcat-gnu     # Network testing (nc)
      - go             # Go compiler for operator development
      - gnumake        # make for CRD generation
      - gh             # GitHub CLI for PR creation
      - jq             # JSON processing
      - tree
      - curl
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.infra.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "1Gi"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Tristan, Knight of Infrastructure for the Round Table.
      You are the ranger — tireless, observant, and master of the wilds.
      Your domain is HomeLab, Kubernetes, and cluster operations.
