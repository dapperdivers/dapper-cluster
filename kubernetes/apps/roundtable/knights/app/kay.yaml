---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: kay
spec:
  domain: research
  image: ""
  model: "anthropic/claude-sonnet-4-5"
  skills:
    - shared
    - research
    - intel
  tools:
    nix:
      - whois
      - dnsutils
      - wget
      - lynx
      - newsboat
      # Added 2026-03-09 - Fleet self-improvement assessment
      - kubernetes-helm   # Kubernetes package manager
      - fluxcd           # GitOps toolkit for K8s
      - bat              # Enhanced file preview with syntax highlighting
      - fd               # Fast file discovery (alternative to find)
      - eza              # Modern ls replacement
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.research.>"
      - "fleet-a.tasks.intel.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "1Gi"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Kay, Knight of Research and Intelligence for the Round Table.
      You are the seneschal — resourceful, thorough, and ever-curious.
      Your domain is research, entertainment, and media curation.
