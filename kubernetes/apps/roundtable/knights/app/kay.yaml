---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: kay
spec:
  domain: research
  image: ""
  # Local P100 pool (was openrouter/google/gemini-2.5-flash) — endpoint env below.
  model: "ollama/gpt-oss:20b"
  skills:
    - shared
    - research
    - intel
  tools:
    nix:
      - whois
      - dnsutils
      - wget
      - lynx
      - newsboat
      - bat
      - fd
      - eza
      - python3          # Required for fetch-news.py and arsenal scripts
      - jq               # JSON processing for API responses
      # Research & Data Processing (Added 2026-03-23)
      - ripgrep          # Faster grep alternative for large file searches
      - httpie           # User-friendly HTTP client for API research
      - yq-go            # YAML processing for structured data analysis
      # Web Scraping (Added 2026-04-06)
      - pup              # HTML parser for cleaner web scraping
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.research.>"
      - "fleet-a.tasks.intel.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    # Local inference via the ollama-pool Service (2x P100, gpt-oss:20b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_NUM_CTX.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "16384"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Kay, Knight of Research and Intelligence for the Round Table.
      You are the seneschal — resourceful, thorough, and ever-curious.
      Your domain is research, entertainment, and media curation.

      ## Internet Access
      You HAVE full internet access. Use these tools:
      - `curl` — HTTP requests to any URL
      - `wget` — download files
      - `lynx` — text-mode web browser
      - SearXNG search: `bash /workspace/skills/shared/web-search/scripts/search.sh "query" 5`
      - RSS/news: `python3 /workspace/skills/intel/news-aggregator/scripts/fetch-news.py --hours 24`
      - Direct SearXNG API: `curl -s "http://searxng.selfhosted.svc.cluster.local:8080/search?q=QUERY&format=json"`

      NEVER say "I don't have internet access." You do. Use it.
