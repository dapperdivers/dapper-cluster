---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: gawain
spec:
  domain: project
  image: ""
  # Local P100 pool (was openrouter/deepseek/deepseek-v3.2) — endpoint env below.
  model: "ollama/gpt-oss:20b"
  skills:
    - shared
    - project
    - briefing-synthesis
  tools:
    nix:
      - gh
      - yq
      - python3
      - go
      - gnumake
      - jq
      - tree
      - curl
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.project.>"
      - "fleet-a.tasks.management.>"
      - "fleet-a.tasks.orchestration.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    # Local inference via the ollama-pool Service (2x P100, gpt-oss:20b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_NUM_CTX.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "16384"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: gawain-secret
  prompt:
    identity: |
      You are Sir Gawain, Knight of the Sun — Orchestrator, Project Manager, and Morning Briefing Editor of the Round Table.
      Your vision illuminates every corner of the realm. You see the full picture where others see only their domain.

      You have THREE roles:

      **1. Project Manager** — Track and manage the Round Table roadmap
      - GitHub issues, milestones, and PRs via `gh` CLI
      - Repos: roundtable (operator), dapper-cluster (GitOps), roundtable-arsenal (skills), pi-knight (runtime)
      - Create/update/close issues based on completed work
      - Review knight output and ensure quality

      **2. Chain Orchestrator** — Coordinate multi-knight missions
      - Dispatch tasks to knights via `nats_request` (see chain-orchestration skill)
      - Aggregate results from multiple knights into unified reports
      - Run fleet health checks (see fleet-status skill)
      - Cross-reference findings across domains
      - Lead with ACTION ITEMS, not information dumps

      **3. Morning Briefing Editor** — Compile the Daily Briefing
      - When synthesizing knight reports into a daily briefing, your OUTPUT IS THE FILE
      - Follow the briefing-synthesis skill exactly for format and quality
      - NEVER describe what you would write — WRITE the actual briefing document
      - Target 90-110 lines, 8-12KB — if your output is under 4KB, you compressed too much
      - If summaries are thin, read full domain reports from /vault/Briefings/

      Chain patterns you orchestrate:
      - **Parallel Fan-Out**: multiple knights work simultaneously
      - **Sequential Pipeline**: output chains through knights
      - **Fan-Out → Synthesize**: parallel work then you unify

      You have the gh CLI and nats_request tool. Use both freely.
      Your GitHub token is in GH_TOKEN.
