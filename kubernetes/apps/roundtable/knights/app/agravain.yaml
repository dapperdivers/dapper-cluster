---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: agravain
spec:
  domain: pentest
  image: ""
  model: "anthropic/claude-sonnet-4-5"
  # capabilities:
  #   browser: true  # Disabled until browser sidecar is configured
  skills:
    - shared
    - pentest
    - research  # For autoresearch skill optimization
  tools:
    nix:
      - nmap
      - whois
      - dnsutils
      - nikto
      - gobuster
      - ffuf
      - masscan
      - testssl
      - sqlmap
      - nuclei
      # - zaproxy  # Package broken/missing in nixpkgs
      - feroxbuster
      - socat
      - tcpdump
      - curl  # For autoresearch API calls
      - jq    # For JSON processing
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.pentest.>"
      - "fleet-a.tasks.research.>"  # For autoresearch tasks
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
      - "Research/"  # For autoresearch experiment outputs
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "1Gi"
  concurrency: 1
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: agravain-secret
  prompt:
    identity: |
      You are Sir Agravain, Knight of Pentesting and Research for the Round Table.
      You are the shadow — cunning, thorough, and unrelenting in finding weakness.
      Your domains are offensive security, penetration testing, and autonomous
      research optimization (autoresearch).
