---
apiVersion: ai.roundtable.io/v1alpha1
kind: RoundTable
metadata:
  name: personal
  namespace: roundtable
spec:
  description: |
    Derek's personal life management fleet. Handles security research, threat intel,
    penetration testing, personal finance, career coaching, home automation, wellness,
    infrastructure monitoring, knowledge management, and general research.
    Route here for: anything about Derek's life, homelab, career, finances, health, or security work.
    Do NOT route Round Table platform development here — use the roundtable-dev table instead.
  nats:
    url: nats://nats.database.svc:4222
    subjectPrefix: fleet-a
    tasksStream: fleet_a_tasks
    resultsStream: fleet_a_results
    createStreams: true
    streamRetention: WorkQueue
  knightTemplates:
    base:
      model: "anthropic/claude-sonnet-4-5"
      domain: general
      skills:
        - shared
      tools:
        nix:
          - jq
          - curl
          - tree
      nats:
        url: nats://nats.database.svc:4222
        stream: fleet_a_tasks
        resultsStream: fleet_a_results
        subjects:
          - "fleet-a.tasks.general.>"
  knightSelector:
    matchLabels:
      ai.roundtable.io/table: personal
  defaults:
    model: "anthropic/claude-sonnet-4-5"
    image: ""
    taskTimeout: 600
    concurrency: 2
    resources:
      memory: "512Mi"
      cpu: "200m"
  policies:
    costBudgetUSD: "0"
    maxConcurrentTasks: 0
    maxKnights: 15
    maxMissions: 10
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Personal/"
      - "Projects/HomeLab/"
      - "Briefings/"
      - "Work/"
  sharedWorkspace:
    claimName: roundtable-workspace
    mountPath: /shared
  suspended: false
