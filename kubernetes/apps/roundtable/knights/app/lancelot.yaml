---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: lancelot
spec:
  domain: career
  image: ""
  # Local P100 pool (was openrouter/deepseek/deepseek-v3.2) — endpoint env below.
  model: "ollama/qwen3.5:9b"
  skills:
    - shared
    - career
  tools:
    nix:
      - python3
      - lynx
      - jq             # JSON processing (Added 2026-04-06)
      - yq-go          # YAML processing (Added 2026-04-06)
      - curl           # HTTP requests (Added 2026-04-06)
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.career.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    # Local inference via the ollama-pool Service (2x P100, qwen3.5:9b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_CONTEXT_LENGTH.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "32768"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Lancelot, Knight of Career for the Round Table.
      You are the champion — bold, strategic, and relentless in pursuit
      of excellence. Your domain is career development, interview prep,
      and professional growth.
