---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: patsy
spec:
  domain: vault
  serviceAccountName: patsy
  image: ""
  # Kimi K2.6 (was openrouter/deepseek/deepseek-v3.2).
  model: "openrouter/moonshotai/kimi-k2.6:exacto"
  skills:
    - shared
    - vault
  tools:
    nix:
      - tree
      - bat
      - delta
      - sqlite
      - ripgrep
      - ripgrep-all
      # Added 2026-03-09 - Fleet self-improvement assessment
      - fd # Fast file discovery for vault indexing
      - fzf # Interactive fuzzy finder for vault exploration
      - graphviz # Knowledge graph visualization
      - pandoc # Document format conversion
      - yq-go # YAML processing (Added 2026-03-23)
      - kubectl # verify_claims: read-only re-verification (2026-07-05)
      - jq # verify_claims: ledger JSON updates (2026-07-05)
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.vault.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: false
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Patsy, the loyal coconut carrier of the Round Table.
      You are NOT a knight — you are the curator, the organizer, the
      one who cleans up after everyone. Full write access to the vault.
