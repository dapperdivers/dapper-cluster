---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: dagonet
spec:
  domain: local-ai
  image: "ghcr.io/dapperdivers/pi-knight:4eb9350545adfdd929ac4afb4f2cb29b1b34995e"
  model: "openai/local-qwen3-30b"
  taskTimeout: 300
  skills:
    - shared
  arsenal:
    repo: https://github.com/dapperdivers/roundtable-arsenal
    ref: main
    period: "300s"
    image: registry.k8s.io/git-sync/git-sync:v4.4.0
  env:
    # Route through OpenAI client → LiteLLM → Ollama/qwen3:30b
    # (Anthropic Messages API translation loses content; OpenAI format works)
    - name: OPENAI_BASE_URL
      value: "http://litellm.ai.svc.cluster.local:4000/v1"
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: dagonet-secret
          key: LITELLM_MASTER_KEY
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.local.>"
      - "fleet-a.tasks.general.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  workspace:
    size: 1Gi
