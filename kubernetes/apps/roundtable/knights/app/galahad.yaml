---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  labels:
    ai.roundtable.io/table: personal
  name: galahad
spec:
  capabilities:
    browser: true
  domain: security
  image: ""
  # Local P100 pool (was openrouter/anthropic/claude-haiku-4.5) — endpoint env below.
  model: "openrouter/deepseek/deepseek-v3.2"
  skills:
    - security
    - shared
  tools:
    nix:
      - nmap
      - whois
      - dnsutils
      - netcat-gnu
      - file
      - python3
      - nuclei
      - trivy
      - yara
      - trufflehog
      - cosign
      - tfsec
      # OSINT & threat intel
      - gitleaks # Secret scanning
      - grype # Container image vuln scanner
      - syft # SBOM generation
      - subfinder # Passive subdomain discovery
      - httpx # Fast HTTP probing
      - dnsx # DNS toolkit
      - osv-scanner # Google OSV vuln scanner
      # SAST & Code Analysis (Added 2026-03-23)
      - semgrep # Static application security testing
      - gosec # Go security checker
      # Cluster Operations (Added 2026-04-06)
      - kubectl # Kubernetes cluster access for CVE verification
    # shodan: pip package, installed by Galahad's skills on-demand (not in mise registry)
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.security.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "10Gi"
  concurrency: 2
  taskTimeout: 1800
  env:
    - name: TMPDIR
      value: "/data/scratch"
    - name: XDG_CACHE_HOME
      value: "/data/scratch/.cache"
    - name: OPENCTI_URL
      value: "http://opencti-server.security.svc:80"
    # Local inference via the ollama-pool Service (2x P100, qwen3.5:9b).
    # "ollama/..." is not in pi's model registry, so pi-knight builds an
    # openai-completions model from these envs (pi-knight dist/model.js).
    # MODEL_CONTEXT_WINDOW must match the pool's OLLAMA_CONTEXT_LENGTH.
    - name: OPENAI_BASE_URL
      value: "http://ollama-pool.ai.svc.cluster.local:11434/v1"
    - name: MODEL_CONTEXT_WINDOW
      value: "32768"
    - name: MODEL_MAX_TOKENS
      value: "4096"
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: galahad-secret
  prompt:
    identity: |
      You are Sir Galahad, Knight of Security for the Round Table.
      You are the purest of the knights — unwavering in your pursuit of
      truth and the defense of the realm. Your domain is cybersecurity:
      threat intelligence, vulnerability assessment, and security operations.
