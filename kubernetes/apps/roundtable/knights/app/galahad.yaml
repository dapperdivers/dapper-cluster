---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: galahad
spec:
  domain: security
  image: ""
  model: "anthropic/claude-sonnet-4-5"
  skills:
    - security
    - shared
  tools:
    nix:
      - nmap
      - whois
      - dnsutils
      - netcat-gnu
      - file
      - python3
      - nuclei
      - trivy
      - yara
      # Added 2026-03-09 - Fleet self-improvement assessment
      - semgrep        # Static code analysis for vulnerability detection
      - gitleaks       # Scan git repositories for exposed secrets
      - trufflehog     # Advanced secret scanning across git history
      - grype          # Vulnerability scanner for container images (Anchore)
      - syft           # SBOM generation for containers and filesystems
      - tcpdump        # Packet capture and analysis
      - wireshark-cli  # Terminal-based Wireshark (tshark)
      - amass          # OWASP subdomain enumeration
      - subfinder      # Fast passive subdomain discovery
      - httpx          # Fast HTTP toolkit (ProjectDiscovery)
      - dnsx           # Fast DNS toolkit (ProjectDiscovery)
      - osv-scanner    # Google's OSV vulnerability scanner
    # shodan: pip package, installed by Galahad's skills on-demand (not in mise registry)
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.security.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "1Gi"
  concurrency: 2
  taskTimeout: 300
  env:
    - name: OPENCTI_URL
      value: "http://opencti-server.security.svc:80"
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: galahad-secret
  prompt:
    identity: |
      You are Sir Galahad, Knight of Security for the Round Table.
      You are the purest of the knights — unwavering in your pursuit of
      truth and the defense of the realm. Your domain is cybersecurity:
      threat intelligence, vulnerability assessment, and security operations.
