---
# Tristan — Cluster-wide read access for infrastructure monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tristan-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events", "nodes", "namespaces", "persistentvolumeclaims", "endpoints", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "helmrepositories", "ocirepositories", "helmcharts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  # CRDs — infrastructure diagnostics
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Ceph/Rook — storage health monitoring
  - apiGroups: ["ceph.rook.io"]
    resources: ["cephclusters", "cephblockpools", "cephfilesystems", "cephobjectstores"]
    verbs: ["get", "list", "watch"]
  # Cilium — network diagnostics
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumendpoints", "ciliumnodes"]
    verbs: ["get", "list", "watch"]
  # RoundTable CRDs
  - apiGroups: ["ai.roundtable.io"]
    resources: ["knights", "chains", "roundtables"]
    verbs: ["get", "list", "watch"]
  # Storage classes and volume attachments
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tristan-cluster-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: roundtable
roleRef:
  kind: ClusterRole
  name: tristan-cluster-reader
  apiGroup: rbac.authorization.k8s.io
