# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundtable
  namespace: roundtable
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: roundtable-secret
    template:
      engineVersion: v2
      data:
        ANTHROPIC_API_KEY: "{{ .OPENCLAW_ANTHROPIC_API_KEY }}"
        GH_TOKEN: "{{ .GAWAIN_GITHUB_TOKEN }}"
        GITHUB_TOKEN: "{{ .GAWAIN_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^(OPENCLAW|GAWAIN_GITHUB).*
