---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mordred
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    force: true
    remediation:
      strategy: uninstall
      retries: 1
  uninstall:
    keepHistory: false
  values:
    controllers:
      mordred:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # ── Workspace Seeder ────────────────────────────────────────
          seed-workspace:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: 436d0adefd2a383872a1d019be547957e6daebcf
              pullPolicy: Always
            command:
              - /bin/sh
              - -c
              - |
                set -e
                WORKSPACE=/data

                # Create directories
                mkdir -p "$WORKSPACE/memory"

                # Seed operational files from image defaults (only if missing on PVC)
                if [ -d /app/defaults ]; then
                  for f in /app/defaults/*.md; do
                    fname=$(basename "$f")
                    if [ ! -f "$WORKSPACE/$fname" ]; then
                      cp "$f" "$WORKSPACE/$fname"
                      echo "Seeded $fname from image defaults"
                    else
                      echo "$fname already exists on PVC, skipping"
                    fi
                  done
                fi

                # Seed personality files from ConfigMap (only if missing on PVC)
                for f in SOUL.md IDENTITY.md TOOLS.md; do
                  if [ ! -f "$WORKSPACE/$f" ] && [ -f "/config/$f" ]; then
                    cp "/config/$f" "$WORKSPACE/$f"
                    echo "Seeded $f from ConfigMap"
                  else
                    echo "$f already exists or not in ConfigMap, skipping"
                  fi
                done

                echo "Workspace ready"
          # ── Nix Tool Installer ─────────────────────────────────────
          nix-init:
            dependsOn: seed-workspace
            image:
              repository: nixos/nix
              tag: "2.24.12"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                set -e
                FLAKE_FILE="/config/flake.nix"
                NIX_ENV="/data/nix-env"
                HASH_FILE="/data/.nix-flake-hash"

                if [ ! -f "$FLAKE_FILE" ]; then
                  echo "No flake.nix found — skipping Nix tool install."
                  exit 0
                fi

                # Content-addressed caching — skip if unchanged
                NEW_HASH=$(sha256sum "$FLAKE_FILE" | cut -d' ' -f1)
                if [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE")" = "$NEW_HASH" ] && [ -d "$NIX_ENV/bin" ]; then
                  echo "Nix env cached ($(ls "$NIX_ENV/bin/" | wc -l) tools) — skipping."
                  exit 0
                fi

                echo "Building Nix tool environment..."
                FLAKE_DIR=$(mktemp -d)
                cp "$FLAKE_FILE" "$FLAKE_DIR/flake.nix"

                # IMPORTANT: must cd to flake dir — nix scans cwd and chokes on /dev/full
                cd "$FLAKE_DIR"

                # Build; separate stdout (store path) from stderr (progress)
                STORE_PATH=$(nix build \
                  --extra-experimental-features "nix-command flakes" \
                  --no-link --print-out-paths \
                  ".#default" 2>/tmp/nix-build.log) || {
                    echo "ERROR: Nix build failed:"
                    cat /tmp/nix-build.log
                    exit 1
                  }

                if [ -z "$STORE_PATH" ] || [ ! -d "$STORE_PATH/bin" ]; then
                  echo "ERROR: Build produced no bin/ at '$STORE_PATH'"
                  cat /tmp/nix-build.log 2>/dev/null
                  exit 1
                fi

                # Nix binaries have hardcoded RPATHs to /nix/store/xxx/lib.
                # We use patchelf to rewrite them, OR we mount the nix store
                # at the same path in the app container.
                #
                # Strategy: copy closure to /data/nix-store/ and create a
                # /nix → /data/nix-store symlink in the app container.
                # Since init runs as root, we can create /nix symlink.

                echo "  Copying Nix closure to PVC..."
                CLOSURE=$(nix-store --query --requisites "$STORE_PATH" 2>/dev/null)
                CLOSURE_COUNT=$(echo "$CLOSURE" | wc -l)
                echo "  Closure: $CLOSURE_COUNT store paths"

                # Preserve exact /nix/store paths on PVC
                rm -rf /data/nix-store
                mkdir -p /data/nix-store
                for p in $CLOSURE $STORE_PATH; do
                  BASENAME=$(basename "$p")
                  cp -a "$p" "/data/nix-store/$BASENAME"
                done

                # Create /data/nix-env with bin/ symlinks for PATH
                rm -rf "$NIX_ENV"
                mkdir -p "$NIX_ENV/bin"
                STORE_BASENAME=$(basename "$STORE_PATH")
                for bin in "/data/nix-store/$STORE_BASENAME/bin/"*; do
                  bname=$(basename "$bin")
                  ln -sf "$bin" "$NIX_ENV/bin/$bname"
                done
                # Copy share/ for nmap scripts etc
                if [ -d "/data/nix-store/$STORE_BASENAME/share" ]; then
                  cp -a "/data/nix-store/$STORE_BASENAME/share" "$NIX_ENV/share"
                fi

                CLOSURE_SIZE=$(du -sh /data/nix-store/ | cut -f1)
                echo "  Closure size: $CLOSURE_SIZE"

                echo "$NEW_HASH" > "$HASH_FILE"
                echo "Nix env ready: $(ls "$NIX_ENV/bin/" | wc -l) tools"
                ls "$NIX_ENV/bin/" | head -30
            securityContext:
              runAsUser: 0
              runAsGroup: 0
          # ── Nix Store Populator ────────────────────────────────────
          # Copies the Nix store from /data/nix-store (PVC) to the
          # nix-store emptyDir volume mounted at /nix/store in the
          # app container. This ensures RPATHs resolve correctly.
          nix-link:
            dependsOn: nix-init
            image:
              repository: alpine
              tag: "3.21"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                if [ -d /data/nix-store ] && [ "$(ls /data/nix-store/ 2>/dev/null | wc -l)" -gt 0 ]; then
                  echo "Populating /nix/store from PVC..."
                  cp -a /data/nix-store/* /nix/store/
                  echo "Done: $(ls /nix/store/ | wc -l) store paths"
                else
                  echo "No Nix store on PVC — skipping"
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
        containers:
          # ── Pi-Knight Agent ─────────────────────────────────────────
          app:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: 436d0adefd2a383872a1d019be547957e6daebcf
              pullPolicy: Always
            env:
              # ── Knight Identity ──
              KNIGHT_NAME: Mordred
              KNIGHT_MODEL: "anthropic/claude-sonnet-4-5"
              # ── NATS ──
              NATS_URL: nats://nats.database.svc:4222
              SUBSCRIBE_TOPICS: "fleet-a.tasks.pentest.>"
              # ── Runtime ──
              TASK_TIMEOUT_MS: "1800000"
              MAX_CONCURRENT_TASKS: "1"
              METRICS_PORT: "3000"
              LOG_LEVEL: info
              TZ: America/Chicago
              # Nix tool environment
              LD_LIBRARY_PATH: /data/nix-env/lib
              PERL5LIB: /data/nix-env/lib/perl5
              NMAP_DATADIR: /data/nix-env/share/nmap
            envFrom:
              - secretRef:
                  name: mordred-secret
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "4"
                memory: 8Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 15

          # ── Git-Sync Sidecar ────────────────────────────────────────
          git-sync:
            image:
              repository: registry.k8s.io/git-sync/git-sync
              tag: v4.4.0
            env:
              GITSYNC_REPO: https://github.com/dapperdivers/roundtable-arsenal
              GITSYNC_REF: main
              GITSYNC_ROOT: /arsenal
              GITSYNC_PERIOD: "300s"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

          # ── Skill Filter Sidecar ────────────────────────────────────
          skill-filter:
            image:
              repository: alpine
              tag: "3.21"
            env:
              SKILL_CATEGORIES: "shared pentest"
            command:
              - /bin/sh
              - -c
              - |
                ARSENAL="/arsenal/roundtable-arsenal"
                TARGET="/skills"
                echo "Skill filter starting: categories=$SKILL_CATEGORIES"
                LINKED=0
                EXPECTED=$(echo $SKILL_CATEGORIES | wc -w)
                while [ "$LINKED" -lt "$EXPECTED" ]; do
                  LINKED=0
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      if [ -d "$src" ] && [ ! -L "$dst" ]; then
                        ln -sf "$src" "$dst"
                        echo "Linked $cat"
                      fi
                      [ -L "$dst" ] && LINKED=$((LINKED + 1))
                    done
                  fi
                  [ "$LINKED" -lt "$EXPECTED" ] && sleep 2
                done
                echo "All categories linked ($LINKED/$EXPECTED)"
                while true; do
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      if [ -d "$src" ]; then
                        current=$(readlink "$dst" 2>/dev/null || echo "")
                        if [ "$current" != "$src" ]; then
                          ln -sf "$src" "$dst"
                          echo "Re-linked $cat"
                        fi
                      fi
                    done
                  fi
                  sleep 60
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 16Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: mordred
        ports:
          http:
            port: 3000

    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        className: internal
        hosts:
          - host: &host "mordred.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN/./-}-tls

    persistence:
      data:
        enabled: true
        existingClaim: mordred
        advancedMounts:
          mordred:
            seed-workspace:
              - path: /data
            nix-init:
              - path: /data
            app:
              - path: /data

      config:
        enabled: true
        type: configMap
        name: mordred-config
        advancedMounts:
          mordred:
            seed-workspace:
              - path: /config
                readOnly: true
            nix-init:
              - path: /config
                readOnly: true
            app:
              - path: /config
                readOnly: true

      arsenal:
        enabled: true
        type: emptyDir
        advancedMounts:
          mordred:
            git-sync:
              - path: /arsenal
            skill-filter:
              - path: /arsenal
                readOnly: true
            app:
              - path: /arsenal
                readOnly: true

      skills:
        enabled: true
        type: emptyDir
        advancedMounts:
          mordred:
            skill-filter:
              - path: /skills
            app:
              - path: /skills
                readOnly: true

      nix-store:
        enabled: true
        type: emptyDir
        sizeLimit: 2Gi
        advancedMounts:
          mordred:
            nix-link:
              - path: /nix/store
            app:
              - path: /nix/store
                readOnly: true

      vault:
        enabled: true
        existingClaim: roundtable-vault
        advancedMounts:
          mordred:
            app:
              - path: /vault
                readOnly: true
              - path: /vault/Briefings
                subPath: Briefings
                readOnly: false
              - path: /vault/Roundtable
                subPath: Roundtable
                readOnly: false
