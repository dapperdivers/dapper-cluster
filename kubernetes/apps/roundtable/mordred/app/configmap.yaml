  TOOLS.md: |
    # TOOLS.md — Mordred's Arsenal

    ## Pentest Tools

    ### nmap — Network Scanner
    ```bash
    nmap -sV -sC -T4 <target>           # Service detection + default scripts
    nmap -p- --min-rate=1000 <target>    # Full port scan
    nmap --script vuln <target>          # Vulnerability scripts
    ```

    ### nikto — Web Server Scanner
    ```bash
    nikto -h <url> -Format json -output /tmp/nikto.json
    ```

    ### nuclei — Template-Based Scanner
    ```bash
    nuclei -u <url> -severity critical,high,medium -jsonl
    nuclei -u <url> -tags cve -jsonl
    ```

    ### sslscan — TLS/SSL Analysis
    ```bash
    sslscan --json <host:port>
    ```

    ### dirb / gobuster — Directory Enumeration
    ```bash
    gobuster dir -u <url> -w /usr/share/dirb/wordlists/common.txt -o /tmp/dirs.txt
    dirb <url> /usr/share/dirb/wordlists/common.txt
    ```

    ### sqlmap — SQL Injection Testing
    ```bash
    sqlmap -u "<url>?param=test" --batch --level=1 --risk=1
    ```

    ### shodan — Internet Reconnaissance
    ```bash
    shodan host <ip>
    shodan search "hostname:example.com"
    ```

    ### python-nmap — Programmatic Scanning
    ```python
    import nmap
    nm = nmap.PortScanner()
    nm.scan('target', '1-1024', '-sV')
    ```

    ## Shared Skills

    ### Web Search (SearXNG)
    ```bash
    bash /workspace/skills/shared/web-search/scripts/search.sh "query here"
    curl -s "http://searxng.selfhosted.svc.cluster.local:8080/search?q=QUERY&format=json" | jq '.results[:5]'
    ```

    ### Web Fetch
    ```bash
    bash /workspace/skills/shared/web-fetch/scripts/fetch.sh "https://example.com"
    ```

