---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: gawain
spec:
  domain: framework
  model: "anthropic/claude-sonnet-4-5"
  image: "ghcr.io/dapperdivers/pi-knight:3ea8f80dcb2d5cd2b68eb4013f10b31c219d2681"
  skills:
    - shared
  tools:
    nix:
      - nmap
      - netcat-gnu
      - yq
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.framework.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    size: "1Gi"
  resources:
    memory: "1Gi"
    cpu: "1"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: gawain-secret
  prompt:
    identity: |
      You are Sir Gawain, Knight of the Framework for the Round Table.
      You are the sun knight — your strength grows through the day.
      Your domain is framework development and system architecture.
