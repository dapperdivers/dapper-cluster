---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gawain
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      gawain:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # ── Workspace Seeder ────────────────────────────────────────
          seed-workspace:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: fdf6f2fd63d6db23889415628d5f05a6c49906ed
              pullPolicy: Always
            command:
              - /bin/sh
              - -c
              - |
                set -e
                WORKSPACE=/data

                # Create directories
                mkdir -p "$WORKSPACE/memory"

                # Seed operational files from image defaults (only if missing on PVC)
                if [ -d /app/defaults ]; then
                  for f in /app/defaults/*.md; do
                    fname=$(basename "$f")
                    if [ ! -f "$WORKSPACE/$fname" ]; then
                      cp "$f" "$WORKSPACE/$fname"
                      echo "Seeded $fname from image defaults"
                    else
                      echo "$fname already exists on PVC, skipping"
                    fi
                  done
                fi

                # Seed personality files from ConfigMap (only if missing on PVC)
                for f in SOUL.md IDENTITY.md TOOLS.md; do
                  if [ ! -f "$WORKSPACE/$f" ] && [ -f "/config/$f" ]; then
                    cp "/config/$f" "$WORKSPACE/$f"
                    echo "Seeded $f from ConfigMap"
                  else
                    echo "$f already exists or not in ConfigMap, skipping"
                  fi
                done

                echo "Workspace ready"
        containers:
          # ── Pi-Knight Agent ─────────────────────────────────────────
          # Lightweight runtime: Pi SDK + native NATS
          app:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: fdf6f2fd63d6db23889415628d5f05a6c49906ed
              pullPolicy: Always
            env:
              # ── Knight Identity ──
              KNIGHT_NAME: Gawain
              KNIGHT_MODEL: "anthropic/claude-sonnet-4-5"
              KNIGHT_SKILLS: "security"
              # ── NATS ──
              NATS_URL: nats://nats.database.svc:4222
              SUBSCRIBE_TOPICS: "fleet-a.tasks.security-pi.>"
              # ── Runtime ──
              TASK_TIMEOUT_MS: "1800000"
              MAX_CONCURRENT_TASKS: "2"
              METRICS_PORT: "3000"
              LOG_LEVEL: info
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: gawain-secret
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 15

          # ── Git-Sync Sidecar ────────────────────────────────────────
          git-sync:
            image:
              repository: registry.k8s.io/git-sync/git-sync
              tag: v4.4.0
            env:
              GITSYNC_REPO: https://github.com/dapperdivers/roundtable-arsenal
              GITSYNC_REF: main
              GITSYNC_ROOT: /skills
              GITSYNC_PERIOD: "300s"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: gawain
        ports:
          http:
            port: 3000

    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        className: internal
        hosts:
          - host: &host "gawain.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN/./-}-tls

    persistence:
      # Knight workspace (persistent across restarts)
      data:
        enabled: true
        existingClaim: gawain
        advancedMounts:
          gawain:
            seed-workspace:
              - path: /data
            app:
              - path: /data

      # ConfigMap with personality files
      config:
        enabled: true
        type: configMap
        name: gawain-config
        advancedMounts:
          gawain:
            seed-workspace:
              - path: /config
                readOnly: true
            app:
              - path: /config
                readOnly: true

      # Git-synced skills from arsenal repo
      skills:
        enabled: true
        type: emptyDir
        advancedMounts:
          gawain:
            app:
              - path: /skills
                readOnly: true
            git-sync:
              - path: /skills

      # Shared Obsidian vault
      vault:
        enabled: true
        existingClaim: roundtable-vault
        advancedMounts:
          gawain:
            app:
              - path: /vault
                readOnly: true
              - path: /vault/Briefings
                subPath: Briefings
                readOnly: false
              - path: /vault/Roundtable
                subPath: Roundtable
                readOnly: false
