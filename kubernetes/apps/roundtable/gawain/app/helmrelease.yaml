---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gawain
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      gawain:
        annotations:
          reloader.stakater.com/auto: "true"
        # NO init containers — entrypoint handles bootstrap
        containers:
          # ── Pi-Knight Agent ─────────────────────────────────────────
          # Lightweight runtime: Pi SDK + native NATS
          app:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: 3ea8f80dcb2d5cd2b68eb4013f10b31c219d2681
              pullPolicy: Always
            env:
              # ── Knight Identity ──
              KNIGHT_NAME: Gawain
              KNIGHT_MODEL: "anthropic/claude-sonnet-4-5"
              # ── NATS ──
              NATS_URL: nats://nats.database.svc:4222
              SUBSCRIBE_TOPICS: "fleet-a.tasks.framework.>"
              # ── Runtime ──
              TASK_TIMEOUT_MS: "1800000"
              MAX_CONCURRENT_TASKS: "2"
              METRICS_PORT: "3000"
              LOG_LEVEL: info
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: gawain-secret
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 15

          # ── Git-Sync Sidecar ────────────────────────────────────────
          git-sync:
            image:
              repository: registry.k8s.io/git-sync/git-sync
              tag: v4.4.0
            env:
              GITSYNC_REPO: https://github.com/dapperdivers/roundtable-arsenal
              GITSYNC_REF: main
              GITSYNC_ROOT: /arsenal
              GITSYNC_PERIOD: "300s"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

          # ── Skill Filter Sidecar ────────────────────────────────────
          # Symlinks only the needed skill categories from the full
          # arsenal into /skills so Pi SDK only discovers relevant ones.
          skill-filter:
            image:
              repository: alpine
              tag: "3.21"
            env:
              SKILL_CATEGORIES: "shared"
            command:
              - /bin/sh
              - -c
              - |
                ARSENAL="/arsenal/roundtable-arsenal"
                TARGET="/skills"
                echo "Skill filter starting: categories=$SKILL_CATEGORIES"
                # Fast initial loop until all categories are linked
                LINKED=0
                EXPECTED=$(echo $SKILL_CATEGORIES | wc -w)
                while [ "$LINKED" -lt "$EXPECTED" ]; do
                  LINKED=0
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      if [ -d "$src" ] && [ ! -L "$dst" ]; then
                        ln -sf "$src" "$dst"
                        echo "Linked $cat"
                      fi
                      [ -L "$dst" ] && LINKED=$((LINKED + 1))
                    done
                  fi
                  [ "$LINKED" -lt "$EXPECTED" ] && sleep 2
                done
                echo "All categories linked ($LINKED/$EXPECTED)"
                # Slow maintenance loop — re-link if git-sync recreates worktree
                while true; do
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      # Re-link if symlink target changed (git-sync new worktree)
                      if [ -d "$src" ]; then
                        current=$(readlink "$dst" 2>/dev/null || echo "")
                        if [ "$current" != "$src" ]; then
                          ln -sf "$src" "$dst"
                          echo "Re-linked $cat"
                        fi
                      fi
                    done
                  fi
                  sleep 60
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 16Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: gawain
        ports:
          http:
            port: 3000

    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        className: internal
        hosts:
          - host: &host "gawain.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN/./-}-tls

    persistence:
      # Knight workspace (persistent across restarts)
      data:
        enabled: true
        existingClaim: gawain
        advancedMounts:
          gawain:
            app:
              - path: /data

      # ConfigMap with personality files
      config:
        enabled: true
        type: configMap
        name: gawain-config
        advancedMounts:
          gawain:
            app:
              - path: /config
                readOnly: true

      # Raw arsenal repo (git-sync writes here)
      arsenal:
        enabled: true
        type: emptyDir
        advancedMounts:
          gawain:
            git-sync:
              - path: /arsenal
            skill-filter:
              - path: /arsenal
                readOnly: true
            app:
              - path: /arsenal
                readOnly: true

      # Filtered skills (only categories this knight needs)
      skills:
        enabled: true
        type: emptyDir
        advancedMounts:
          gawain:
            skill-filter:
              - path: /skills
            app:
              - path: /skills
                readOnly: true

      # Shared Obsidian vault
      vault:
        enabled: true
        existingClaim: roundtable-vault
        readOnly: false
        advancedMounts:
          gawain:
            app:
              - path: /vault
                readOnly: true
              - path: /vault/Briefings
                subPath: Briefings
                readOnly: false
              - path: /vault/Roundtable
                subPath: Roundtable
                readOnly: false
