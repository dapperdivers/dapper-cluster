---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gawain
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: gawain-secret
    template:
      engineVersion: v2
      data:
        ANTHROPIC_API_KEY: "{{ .OPENCLAW_ANTHROPIC_API_KEY }}"
        OPENCTI_TOKEN: "{{ .OPENCTI_ADMIN_TOKEN }}"
        SHODAN_API_KEY: "{{ .SHODAN_API_KEY }}"
  dataFrom:
    - find:
        name:
          regexp: ^(OPENCLAW|OPENCTI|SHODAN).*
