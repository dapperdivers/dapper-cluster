---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: juice-shop
  namespace: roundtable
spec:
  targetNamespace: roundtable
  commonMetadata:
    labels:
      app.kubernetes.io/name: juice-shop
  path: ./kubernetes/apps/roundtable/juice-shop/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: roundtable-operator
