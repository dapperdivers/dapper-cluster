---
# GitRepository must be in flux-system (not subject to targetNamespace)
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: roundtable
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/dapperdivers/roundtable.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app roundtable-operator
  namespace: &namespace roundtable
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: nats
      namespace: database
  path: ./kubernetes/apps/roundtable/operator/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m
