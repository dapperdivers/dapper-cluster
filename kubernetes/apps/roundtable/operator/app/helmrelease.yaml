---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/roundtable-operator
      sourceRef:
        kind: GitRepository
        name: roundtable
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: f89d206aca42692773159e984855063600495b04
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: b8b9a3faa4f6c444ba4b6b78819fb7627e44bff9
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 1e2005fba740587085c3d77fafd6a6bd2dd63af0

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
