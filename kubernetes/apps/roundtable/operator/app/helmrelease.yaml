---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.6.1"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: ab415561fc638bed98bb9324e5645809bd6b690e
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: 7bc5c44eeddd8517d28dc6dd955c2c159090c764
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 184ee6e46a4f88b1e05b2c68f26cce5be124cb55

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
