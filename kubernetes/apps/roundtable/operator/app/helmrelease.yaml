---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/roundtable-operator
      sourceRef:
        kind: GitRepository
        name: roundtable
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: f89d206aca42692773159e984855063600495b04
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: 63affd54c0004f7282c62bc2c832d0dc9a2436e6
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 6bc6f4aba6e1e19db98b50f19e0aabecbe2a24e5

    # Dashboard — Round Table observability platform
    # DISABLED: GHCR package is private — Derek needs to make ghcr.io/dapperdivers/roundtable-ui public
    # or add imagePullSecret. Re-enable once image is accessible.
    dashboard:
      enabled: false
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
