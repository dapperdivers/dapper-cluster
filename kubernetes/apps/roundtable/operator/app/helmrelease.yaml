# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: 7739db667110a76f5ba21f53392f93cb32bd3d9b
      pullPolicy: Always

    # Persistent nix-daemon builder: a single root Deployment owns the shared
    # Nix store and builds knight tools dispatched via the roundtable-nix-buildqueue
    # PVC — replaces the per-knight build Jobs + global store lock.
    nixBuilder:
      enabled: true

    # Completion webhooks (chart 0.14.0): spec.notify on Chains/Missions posts
    # roundtable.notify/v1 to matching URLs only — this prefix list is the SSRF
    # guard, since anyone who can create a Chain controls notify.url. Keep it
    # pinned to molt's gateway hook endpoint.
    notify:
      allowedURLPrefixes:
        - http://molt-app.ai.svc.cluster.local:18789/hooks/

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Image tags (piKnight, dashboard) are pinned in the chart's values.yaml
    # as of chart 0.12.3 — bump them in the roundtable repo, not here.

    # Built-in planner knight — meta-mission planning
    planner:
      enabled: true
      domain: operator
      model: openrouter/moonshotai/kimi-k2.6:exacto
      skills:
        - operator
        - shared
      natsPrefix: fleet-a
      concurrency: 1
      taskTimeout: 600
      arsenal:
        repo: https://github.com/dapperdivers/roundtable-arsenal.git
        ref: main
        period: 5m
      envFrom:
        - secretRef:
            name: roundtable-secret

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      vault:
        enabled: true
        claimName: roundtable-vault
