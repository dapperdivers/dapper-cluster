# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: 57afcc5b381fc04c1ca4f0bf0129ac0f6c5d0b4d
      pullPolicy: Always

    # Persistent nix-daemon builder: a single root Deployment owns the shared
    # Nix store and builds knight tools dispatched via the roundtable-nix-buildqueue
    # PVC — replaces the per-knight build Jobs + global store lock.
    nixBuilder:
      enabled: true

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: 36aa86f97f23776686be01666d2ae2b8e4c69c5f
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 2dbd0af7d181e40f95a263104102b34290fc12dd

    # Built-in planner knight — meta-mission planning
    planner:
      enabled: true
      domain: operator
      model: openrouter/anthropic/claude-haiku-4.5
      skills:
        - operator
        - shared
      natsPrefix: fleet-a
      concurrency: 1
      taskTimeout: 600
      arsenal:
        repo: https://github.com/dapperdivers/roundtable-arsenal.git
        ref: main
        period: 5m
      envFrom:
        - secretRef:
            name: roundtable-secret

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
