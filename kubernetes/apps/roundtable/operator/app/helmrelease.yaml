---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.7.4"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: b03e1b40229426ffdc4d66cd7e6592a657266317
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: f05685a100d8fbc4dc39388071a2f9218973cc39
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 6ad1c714520d5c720b90c2cd450ab9f2796f52ca

    # Built-in planner knight — meta-mission planning
    planner:
      enabled: true
      domain: operator
      model: claude-sonnet-4-20250514
      skills:
        - operator
        - shared
      natsPrefix: fleet-a
      concurrency: 1
      taskTimeout: 600
      arsenal:
        repo: https://github.com/dapperdivers/roundtable-arsenal.git
        ref: main
        period: 5m
      envFrom:
        - secretRef:
            name: roundtable-secret

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
