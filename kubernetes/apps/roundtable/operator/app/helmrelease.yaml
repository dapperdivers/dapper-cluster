# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.12.3"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: 08a173cd9754386dbc1d399ae4533d2107c2cd7c
      pullPolicy: Always

    # Persistent nix-daemon builder: a single root Deployment owns the shared
    # Nix store and builds knight tools dispatched via the roundtable-nix-buildqueue
    # PVC — replaces the per-knight build Jobs + global store lock.
    nixBuilder:
      enabled: true

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Image tags (piKnight, dashboard) are pinned in the chart's values.yaml
    # as of chart 0.12.3 — bump them in the roundtable repo, not here.

    # Built-in planner knight — meta-mission planning
    planner:
      enabled: true
      domain: operator
      model: openrouter/anthropic/claude-haiku-4.5
      skills:
        - operator
        - shared
      natsPrefix: fleet-a
      concurrency: 1
      taskTimeout: 600
      arsenal:
        repo: https://github.com/dapperdivers/roundtable-arsenal.git
        ref: main
        period: 5m
      envFrom:
        - secretRef:
            name: roundtable-secret

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      vault:
        enabled: true
        claimName: roundtable-vault
