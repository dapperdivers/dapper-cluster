---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: roundtable-operator
      version: "0.6.4"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: 63c6069bb3ee5e789fa83367088509f2f409e392
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: 7bc5c44eeddd8517d28dc6dd955c2c159090c764
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 4bf24aa94108cdef044c3e46a05175a8d0235f7c

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
