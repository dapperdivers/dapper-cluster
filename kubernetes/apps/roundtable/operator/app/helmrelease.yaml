---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: roundtable-operator
      version: ">=0.2.0-0"
      sourceRef:
        kind: HelmRepository
        name: roundtable
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: a7599ad2d8ed4fcd0a9cf49e3d065d914980084e
      pullPolicy: Always

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Centralized image tags — bump here, everything updates
    images:
      piKnight:
        repository: ghcr.io/dapperdivers/pi-knight
        tag: 6554f1398ca9c403a0decb10ac91f8c593224147
      dashboard:
        repository: ghcr.io/dapperdivers/roundtable-ui
        tag: 1e2005fba740587085c3d77fafd6a6bd2dd63af0

    # Dashboard — Round Table observability platform
    dashboard:
      enabled: true
      ingress:
        enabled: true
        className: internal
        host: "roundtable.${SECRET_DOMAIN}"
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
      vault:
        enabled: true
        claimName: roundtable-vault
