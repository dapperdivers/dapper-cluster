---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: roundtable-operator
  namespace: roundtable
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["roundtable.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: roundtable-operator-dashboard
          port: 80
