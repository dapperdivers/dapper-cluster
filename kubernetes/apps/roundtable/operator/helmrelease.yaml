---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: roundtable-operator
  namespace: roundtable
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/roundtable-operator
      sourceRef:
        kind: GitRepository
        name: roundtable
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    image:
      repository: ghcr.io/dapperdivers/roundtable
      tag: latest

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # Test knight — remove after validation
    knights:
      sir-test:
        domain: testing
        model: claude-haiku-35-20241022
        skills:
          - shared
        nats:
          url: nats://nats.database.svc:4222
          subjects:
            - "fleet-a.tasks.testing.>"
          stream: fleet_a_tasks
          resultsStream: fleet_a_results
          maxDeliver: 1
        concurrency: 1
        taskTimeout: 60
        resources:
          memory: 128Mi
          cpu: 100m
