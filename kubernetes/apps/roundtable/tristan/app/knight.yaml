---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: tristan
spec:
  domain: infra
  model: "anthropic/claude-sonnet-4-5"
  image: "ghcr.io/dapperdivers/pi-knight:3ea8f80dcb2d5cd2b68eb4013f10b31c219d2681"
  skills:
    - shared
    - infra
  tools:
    nix:
      - kubectl
      - kubernetes-helm
      - stern
      - k9s
      - fluxcd
      - nmap
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.infra.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    existingClaim: tristan
  resources:
    memory: "1Gi"
    cpu: "1"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
  prompt:
    identity: |
      You are Sir Tristan, Knight of Infrastructure for the Round Table.
      You are the ranger — tireless, observant, and master of the wilds.
      Your domain is HomeLab, Kubernetes, and cluster operations.
