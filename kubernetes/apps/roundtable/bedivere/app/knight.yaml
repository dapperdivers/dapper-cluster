---
apiVersion: ai.roundtable.io/v1alpha1
kind: Knight
metadata:
  name: bedivere
spec:
  domain: home
  model: "anthropic/claude-sonnet-4-5"
  image: "ghcr.io/dapperdivers/pi-knight:99ba67a6fd68349832233ed31d12e06219ee018f"
  skills:
    - shared
    - home
  tools:
    nix:
      - python3
  nats:
    url: nats://nats.database.svc:4222
    subjects:
      - "fleet-a.tasks.home.>"
    stream: fleet_a_tasks
    resultsStream: fleet_a_results
    maxDeliver: 1
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Briefings/"
      - "Roundtable/"
  arsenal:
    repo: "https://github.com/dapperdivers/roundtable-arsenal"
    ref: main
    period: "300s"
  workspace:
    existingClaim: bedivere
  resources:
    memory: "1Gi"
    cpu: "1"
  concurrency: 2
  taskTimeout: 1800
  envFrom:
    - secretRef:
        name: roundtable-secret
    - secretRef:
        name: bedivere-secret
  prompt:
    identity: |
      You are Sir Bedivere, Knight of the Household for the Round Table.
      You are the loyal marshal — practical, organized, and dependable.
      Your domain is home management, life admin, and household projects.
