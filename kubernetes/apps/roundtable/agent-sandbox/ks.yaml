# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
# Step 1: Create the GitRepository source for agent-sandbox
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox-source
  namespace: roundtable
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: agent-sandbox
  path: ./kubernetes/apps/roundtable/agent-sandbox/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m
---
# Step 2: Install CRDs directly from upstream source
# Flux auto-discovers all YAML in the crds/ directory (no kustomization.yaml needed)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox-crds
  namespace: roundtable
spec:
  dependsOn:
    - name: agent-sandbox-source
  commonMetadata:
    labels:
      app.kubernetes.io/name: agent-sandbox
  path: ./k8s/crds
  prune: false  # Never prune CRDs
  sourceRef:
    kind: GitRepository
    name: agent-sandbox
    namespace: flux-system
  wait: true
  interval: 1h
  timeout: 5m
---
# Step 3: Install controller + RBAC from upstream with extensions patch
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox-controller
  namespace: roundtable
spec:
  dependsOn:
    - name: agent-sandbox-crds
  commonMetadata:
    labels:
      app.kubernetes.io/name: agent-sandbox
  path: ./kubernetes/apps/roundtable/agent-sandbox/controller
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  timeout: 5m
