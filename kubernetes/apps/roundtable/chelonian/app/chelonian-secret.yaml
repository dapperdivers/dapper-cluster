---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chelonian
  namespace: roundtable
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: chelonian-secret
    template:
      engineVersion: v2
      data:
        ANTHROPIC_API_KEY: "{{ .OPENCLAW_ANTHROPIC_API_KEY }}"
        GITHUB_TOKEN: "{{ .CHELONIANLABS_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^OPENCLAW.*
    - find:
        name:
          regexp: ^CHELONIANLABS.*
