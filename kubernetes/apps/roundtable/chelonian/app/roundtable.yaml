---
apiVersion: ai.roundtable.io/v1alpha1
kind: RoundTable
metadata:
  name: chelonian
  namespace: roundtable
spec:
  description: "Chelonian Labs — coding knights for personal finance application development"
  nats:
    url: nats://nats.database.svc:4222
    subjectPrefix: chelonian
    tasksStream: chelonian_tasks
    resultsStream: chelonian_results
    createStreams: true
    streamRetention: WorkQueue
  knightSelector:
    matchLabels:
      ai.roundtable.io/table: chelonian
  defaults:
    model: "anthropic/claude-sonnet-4-5"
    image: ""
    taskTimeout: 300
    concurrency: 2
  policies:
    costBudgetUSD: "25"
    costResetSchedule: "0 0 1 * *"
    maxKnights: 8
  vault:
    claimName: roundtable-vault
    readOnly: true
    writablePaths:
      - "Projects/Chelonian Labs/"
      - "Briefings/"
  suspended: false
