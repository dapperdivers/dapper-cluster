---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agravain
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      agravain:
        annotations:
          reloader.stakater.com/auto: "true"
        # ── NO init containers ──
        # Entrypoint handles workspace seeding + Nix bootstrap + flake build.
        # First boot: ~2-3min | Subsequent: ~5s
        containers:
          # ── Pi-Knight Agent ─────────────────────────────────────────
          app:
            image:
              repository: ghcr.io/dapperdivers/pi-knight
              tag: 0f8be779abb2e98e0c11ca80b2bf9d603776fe03
              pullPolicy: Always
            env:
              # ── Knight Identity ──
              KNIGHT_NAME: Agravain
              KNIGHT_MODEL: "anthropic/claude-sonnet-4-5"
              # ── NATS ──
              NATS_URL: nats://nats.database.svc:4222
              SUBSCRIBE_TOPICS: "fleet-a.tasks.pentest.>"
              # ── Runtime ──
              TASK_TIMEOUT_MS: "1800000"
              MAX_CONCURRENT_TASKS: "1"
              METRICS_PORT: "3000"
              LOG_LEVEL: info
              TZ: America/Chicago
              # Nix tool environment
              LD_LIBRARY_PATH: /data/nix-env/lib
              PERL5LIB: /data/nix-env/lib/perl5
              NMAP_DATADIR: /data/nix-env/share/nmap
            envFrom:
              - secretRef:
                  name: agravain-secret
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "4"
                memory: 8Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 180
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ready
                    port: 3000
                  initialDelaySeconds: 120
                  periodSeconds: 15

          # ── Git-Sync Sidecar ────────────────────────────────────────
          git-sync:
            image:
              repository: registry.k8s.io/git-sync/git-sync
              tag: v4.4.0
            env:
              GITSYNC_REPO: https://github.com/dapperdivers/roundtable-arsenal
              GITSYNC_REF: main
              GITSYNC_ROOT: /arsenal
              GITSYNC_PERIOD: "300s"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

          # ── Skill Filter Sidecar ────────────────────────────────────
          skill-filter:
            image:
              repository: alpine
              tag: "3.21"
            env:
              SKILL_CATEGORIES: "shared pentest"
            command:
              - /bin/sh
              - -c
              - |
                ARSENAL="/arsenal/roundtable-arsenal"
                TARGET="/skills"
                echo "Skill filter starting: categories=$SKILL_CATEGORIES"
                LINKED=0
                EXPECTED=$(echo $SKILL_CATEGORIES | wc -w)
                while [ "$LINKED" -lt "$EXPECTED" ]; do
                  LINKED=0
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      if [ -d "$src" ] && [ ! -L "$dst" ]; then
                        ln -sf "$src" "$dst"
                        echo "Linked $cat"
                      fi
                      [ -L "$dst" ] && LINKED=$((LINKED + 1))
                    done
                  fi
                  [ "$LINKED" -lt "$EXPECTED" ] && sleep 2
                done
                echo "All categories linked ($LINKED/$EXPECTED)"
                while true; do
                  if [ -d "$ARSENAL" ]; then
                    for cat in $SKILL_CATEGORIES; do
                      src="$ARSENAL/$cat"
                      dst="$TARGET/$cat"
                      if [ -d "$src" ]; then
                        current=$(readlink "$dst" 2>/dev/null || echo "")
                        if [ "$current" != "$src" ]; then
                          ln -sf "$src" "$dst"
                          echo "Re-linked $cat"
                        fi
                      fi
                    done
                  fi
                  sleep 60
                done
            resources:
              requests:
                cpu: 5m
                memory: 8Mi
              limits:
                memory: 16Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: agravain
        ports:
          http:
            port: 3000

    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        className: internal
        hosts:
          - host: &host "agravain.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN/./-}-tls

    persistence:
      # ── Nix store (dedicated PVC) ──────────────────────────────────
      # Entire /nix lives here. First boot bootstraps from cached tarball.
      nix:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          agravain:
            app:
              - path: /nix

      # ── Knight workspace ───────────────────────────────────────────
      data:
        enabled: true
        existingClaim: agravain
        advancedMounts:
          agravain:
            app:
              - path: /data

      config:
        enabled: true
        type: configMap
        name: agravain-config
        advancedMounts:
          agravain:
            app:
              - path: /config
                readOnly: true

      arsenal:
        enabled: true
        type: emptyDir
        advancedMounts:
          agravain:
            git-sync:
              - path: /arsenal
            skill-filter:
              - path: /arsenal
                readOnly: true
            app:
              - path: /arsenal
                readOnly: true

      skills:
        enabled: true
        type: emptyDir
        advancedMounts:
          agravain:
            skill-filter:
              - path: /skills
            app:
              - path: /skills
                readOnly: true

      vault:
        enabled: true
        existingClaim: roundtable-vault
        advancedMounts:
          agravain:
            app:
              - path: /vault
                readOnly: true
              - path: /vault/Briefings
                subPath: Briefings
                readOnly: false
              - path: /vault/Roundtable
                subPath: Roundtable
                readOnly: false
