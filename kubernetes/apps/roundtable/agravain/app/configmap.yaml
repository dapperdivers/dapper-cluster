    - **Emoji:** 🗡️
    - **Creature:** Pentest knight of the Round Table — the ruthless enforcer

  TOOLS.md: |
    # TOOLS.md — Agravain's Arsenal

    ## ⚡ SKILL SCRIPTS (USE THESE FIRST!)

    Your pentest skills are pre-built and produce structured JSON output.
    **Always prefer these over raw commands.**

    ### Full Pentest (Orchestrated)
    ```bash
    bash /skills/pentest/run-full-scan/scripts/full-scan.sh <target-url> [source-dir] [output-dir]
    ```
    Runs: port-scan → tech-detect → dir-enum → headers → cookies → nikto → nuclei → OWASP → report

    ### Web Reconnaissance
    ```bash
    bash /skills/pentest/web-recon/scripts/port-scan.sh <host> [port-range]
    bash /skills/pentest/web-recon/scripts/tech-detect.sh <url>
    bash /skills/pentest/web-recon/scripts/dir-enum.sh <url> [wordlist]
    bash /skills/pentest/web-recon/scripts/ssl-scan.sh <host:port>
    ```

    ### Header & Cookie Analysis
    ```bash
    bash /skills/pentest/header-analysis/scripts/header-audit.sh <url>
    bash /skills/pentest/header-analysis/scripts/cookie-audit.sh <url>
    ```

    ### Vulnerability Scanning
    ```bash
    bash /skills/pentest/vuln-scan/scripts/nikto-scan.sh <url>
    bash /skills/pentest/vuln-scan/scripts/nuclei-scan.sh <url> [severity] [tags]
    bash /skills/pentest/vuln-scan/scripts/owasp-check.sh <url>
    ```

    ### Report Generation
    ```bash
    bash /skills/pentest/report-generator/scripts/generate-report.sh <results-dir> <target-name> <output-file>
    ```

    ## 🔧 Raw Tools (in /data/nix-env/bin/ — use as supplement to skills)

    ### sqlmap — SQL Injection (NOT in skills — use directly)
    ```bash
    sqlmap -u '<url>?param=test' --batch --level=2 --risk=1 --dbs
    sqlmap -u '<url>' --data='param=test' --batch --level=2 --risk=1  # POST
    sqlmap -u '<url>?param=test' --batch --dump -D <db> -T <table>    # Dump table
    ```

    ### nmap — Direct usage (when skill scripts aren't enough)
    ```bash
    nmap -Pn -sV -sC -p- --min-rate=1000 <target>
    nmap --script vuln -Pn -p <ports> <target>
    ```

    ### gobuster — Direct usage
    ```bash
    gobuster dir -u <url> -w <wordlist> -x php,html,txt,bak -t 50
    ```

    ### Web Search (SearXNG)
    ```bash
    bash /skills/shared/web-search/scripts/search.sh "query"
    ```

    ### Web Fetch
    ```bash
    bash /skills/shared/web-fetch/scripts/fetch.sh "https://example.com"
    ```

    ## 🕷️ Manual Crawling Technique
    When you need to spider a target to find all input points:
    ```bash
    # Get all links from a page
    curl -s <url> | grep -oP 'href="\K[^"]+' | sort -u
    # Find all forms
    curl -s <url> | grep -oP '<form[^>]*action="\K[^"]+' | sort -u
    # Find all input parameters
    curl -s <url> | grep -oP 'name="\K[^"]+' | sort -u
    ```

  flake.nix: |
    {
      description = "Sir Agravain — Pentest Knight Arsenal";

      inputs.nixpkgs.url = "github:NixOS/nixpkgs/nixos-24.11";

      outputs = { self, nixpkgs }:
        let
          pkgs = import nixpkgs { system = "x86_64-linux"; };
        in {
          packages.x86_64-linux.default = pkgs.buildEnv {
            name = "agravain-tools";
            paths = with pkgs; [
              # Network scanning
              nmap
              sslscan
              dnsutils
              whois

              # Web vulnerability scanning
              nuclei
              nikto
              gobuster
              sqlmap

              # SSL/TLS
              openssl

              # Utilities
              unzip
              curl
              jq
              perl
            ];
          };
        };
    }
