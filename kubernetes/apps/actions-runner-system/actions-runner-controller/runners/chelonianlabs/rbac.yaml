---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chelonianlabs-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chelonianlabs-runner
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chelonianlabs-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chelonianlabs-runner
subjects:
  - kind: ServiceAccount
    name: chelonianlabs-runner
    namespace: actions-runner-system
