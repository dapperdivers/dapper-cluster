---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: cloudnative-pg
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: minio
      namespace: storage
    - name: rook-ceph-operator
      namespace: rook-ceph
  values:
    crds:
      create: true
    replicaCount: 2
    networkPolicy:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits: {}
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
