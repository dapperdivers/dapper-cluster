# yaml-language-server: $schema=https://kube-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 3
  # Dragonfly is a shared, passwordless cross-namespace cache (OpenCTI, paperless,
  # searxng, etc.). The operator's managed NetworkPolicy (v1.6.x) hardened the
  # client port 6379 to same-namespace-only, which severs every cross-namespace
  # tenant. Disable it to restore cluster-wide client access (prior behavior).
  networkPolicyEnabled: false
  args:
    # maxmemory is kept well below limits.memory: Dragonfly's RSS includes
    # connection buffers and snapshot/replication fork overhead on top of the
    # dataset, so setting maxmemory == the cgroup limit causes OOMKills under
    # bursts before eviction can kick in.
    # Sized for OpenCTI's event stream (stream.opencti) as the dominant tenant;
    # the stream is bounded by REDIS__TRIMMING in apps/security/opencti so it
    # stays well under this ceiling alongside the other shared-cache tenants.
    - --maxmemory=2560Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 3Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - mayastor-storage
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
