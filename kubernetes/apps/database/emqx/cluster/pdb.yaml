---
# The emqx-operator manages its own PDB during rolling updates but can leave it
# in a locked state (0 disruptions allowed) if the reconcile loop fails mid-update.
# We manage the PDB ourselves with a fixed maxUnavailable: 1 to ensure predictable
# rolling update behavior regardless of operator state.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: emqx-core
  namespace: database
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      apps.emqx.io/db-role: core
      apps.emqx.io/instance: emqx
      apps.emqx.io/managed-by: emqx-operator
