---
# The emqx-operator creates a PDB with no budget set, which allows 0 disruptions.
# This is because it relies on the EMQX Enterprise evacuation API to control drains.
# Since we run OSS EMQX, that API (load_rebalance/global_status) returns 404 and
# the operator gets stuck, never releasing disruptions. We manage the PDB ourselves.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: emqx-core
  namespace: database
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      apps.emqx.io/db-role: core
      apps.emqx.io/instance: emqx
      apps.emqx.io/managed-by: emqx-operator
