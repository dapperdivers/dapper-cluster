---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emqx
  namespace: database
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["emqx.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: emqx-dashboard
          port: 18083
