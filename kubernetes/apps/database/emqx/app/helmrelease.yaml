---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx
spec:
  interval: 30m
  chart:
    spec:
      chart: emqx-operator
      # Pinned at 2.2.29 - 2.3.0 crashes on /api/v5/load_rebalance/global_status (HTTP 404),
      # sets readiness gate apps.emqx.io/on-serving=False, drains emqx-listeners endpoints.
      # To roll back from a bad upgrade:
      #   1. Patch CRD stored versions: kubectl patch crd emqxes.apps.emqx.io --subresource=status --type=merge -p '{"status":{"storedVersions":["v2beta1"]}}'
      #   2. Reset Flux retries: flux reconcile helmrelease emqx -n database --reset
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: emqx
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    fullnameOverride: emqx-operator
    image:
      repository: ghcr.io/emqx/emqx-operator
