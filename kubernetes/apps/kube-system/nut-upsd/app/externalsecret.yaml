---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-upsd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nut-upsd-secret
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        API_PASSWORD: "{{ .NUT_API_PASSWORD }}"

  dataFrom:
    - find:
        path: NUT_API_PASSWORD
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-upsd-upsconf
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: nut-upsd-upsconf
    template:
      engineVersion: v2
      # Mounted at /etc/nut/local/ups.conf to override the env-generated config.
      # Keeps the read-only SNMP community out of Git. The two garage cards are
      # AP9631 NMC2 (SNMPv1 only) at 192.168.1.18/.19; the USB Smart-UPS 1500
      # section mirrors the DRIVER/SERIAL env on the container.
      data:
        ups.conf: |
          [ups]
              driver = usbhid-ups
              port = auto
              serial = "AS1324133052"
              desc = "Smart-UPS 1500 (USB)"

          [garage-a]
              driver = snmp-ups
              port = 192.168.1.18
              snmp_version = v1
              community = "{{ .UPS_SNMP_COMMUNITY }}"
              pollfreq = 30
              desc = "Smart-UPS 2200 RM (garage rack, apc-ups-a)"

          [garage-b]
              driver = snmp-ups
              port = 192.168.1.19
              snmp_version = v1
              community = "{{ .UPS_SNMP_COMMUNITY }}"
              pollfreq = 30
              desc = "Smart-UPS 2200 RM (garage rack, apc-ups-b)"
  dataFrom:
    - find:
        name:
          regexp: ^UPS_SNMP_COMMUNITY$
