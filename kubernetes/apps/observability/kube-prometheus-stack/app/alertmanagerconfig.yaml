---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy: ["alertname", "job"]
    groupInterval: 10m
    groupWait: 1m
    # Default (non-critical) -> ntfy. severity=critical is routed to pushover + ntfy below.
    receiver: ntfy
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: "null"
        matchers:
          - name: alertname
            value: PrometheusDuplicateTimestamps
            matchType: =
      # Dead man's switch: Watchdog fires ALWAYS by design — it exists to be a
      # heartbeat consumed OUTSIDE the cluster. Forward it to an UptimeRobot
      # heartbeat monitor, which alerts via its own channels when the heartbeat
      # STOPS. End-to-end pipeline death (Prometheus, Alertmanager, or egress
      # down) is the one failure this stack cannot report about itself.
      # UptimeRobot heartbeat interval: 15m (tolerates one missed 5m ping).
      - receiver: heartbeat
        groupWait: 0s
        groupInterval: 5m
        repeatInterval: 5m
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      # CPUThrottlingHigh (info severity) is unactionable noise here. The throttled
      # workloads are upstream operators/controllers (emqx-operator, infisical,
      # intel-device-plugin, silence-operator, flux controllers, roundtable-operator)
      # carrying small chart-default CPU limits. CFS throttling does NOT restart them
      # — observed restarts are synchronized leader-election exits tied to etcd
      # instability, not CPU starvation. Right-sizing is advisory only (Goldilocks
      # VPAs run updateMode:Off and recommend requests, not the limits that cause
      # throttling), so this alert has no action. Dropped from notifications; still
      # visible in the Alertmanager UI. Was previously scoped to the skill-filter
      # sidecar only; broadened to the whole alertname (1400+ fire/resolve cycles/7d).
      - receiver: "null"
        matchers:
          - name: alertname
            value: CPUThrottlingHigh
            matchType: =
      # Silence roundtable agent-sandbox churn: pods are ephemeral and restart/
      # crashloop/not-ready constantly by design, so warning/info pod-lifecycle alerts
      # there are expected noise. Drop all non-critical roundtable alerts; critical
      # still pages (this matcher requires severity warning|info, so critical falls through).
      - receiver: "null"
        matchers:
          - name: namespace
            value: roundtable
            matchType: =
          - name: severity
            value: "warning|info"
            matchType: =~
      # Roundtable-specific alerts that carry no namespace label (so the namespace
      # matcher above misses them) — silence by name.
      - receiver: "null"
        matchers:
          - name: alertname
            value: "KnightMetricsAbsent|RoundtablePodRestarting"
            matchType: =~
      # Break the pushover self-notify loop: when a pushover send fails it raises
      # Alertmanager(Cluster)FailedToSendAlerts (severity=critical), which would
      # otherwise route back to the failing pushover channel and amplify. Send these
      # to ntfy only. MUST precede the critical->pushover route (first match wins).
      - receiver: ntfy
        matchers:
          - name: alertname
            value: "Alertmanager(Cluster)?FailedToSendAlerts"
            matchType: =~
      # Critical -> pushover (loud phone push) AND ntfy (reliable, unlimited,
      # self-hosted failover). continue:true falls through to the ntfy critical
      # route below so criticals are still delivered when pushover is rate-limited
      # or over its monthly cap.
      - receiver: pushover
        continue: true
        matchers:
          - name: severity
            value: critical
            matchType: =
      - receiver: ntfy
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    - name: pushover
      pushoverConfigs:
        - html: true
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          sendResolved: true
          sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
            {{ .CommonLabels.alertname }}
          ttl: 86400s
          token:
            name: &secret alertmanager-secret
            key: ALERTMANAGER_PUSHOVER_TOKEN
          userKey:
            name: *secret
            key: PUSHOVER_USER_KEY
          urlTitle: View in Alertmanager
    - name: ntfy
      webhookConfigs:
        - sendResolved: true
          url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
    - name: heartbeat
      webhookConfigs:
        - sendResolved: false
          urlSecret:
            name: *secret
            key: UPTIMEROBOT_HEARTBEAT_URL
