---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.15.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  timeout: 15m
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-operator
      namespace: rook-ceph
  values:
    crds:
      enabled: false
    cleanPrometheusOperatorObjectNames: true
    defaultRules:
      disabled:
        # Stock etcd-mixin rule that fires when (in_use/total) < 0.5. Our etcd is
        # ~430MB of a 1024MB quota (~42%), and Cilium L2 lease churn makes the
        # ratio oscillate around 0.5 → ~9 firing/resolve cycles per member per
        # day with no actionable remedy. etcdExcessiveDatabaseGrowth and
        # etcdDatabaseQuotaLowSpace already cover the real "approaching quota"
        # risk, so disabling this loses no safety. See project_etcd_flapping.
        etcdDatabaseHighFragmentationRatio: true
        # Unactionable here (EEMUA gate: no response exists). The throttled
        # workloads are upstream operators/controllers carrying small
        # chart-default CPU limits; CFS throttling doesn't restart or break
        # them, and right-sizing is advisory-only (Goldilocks updateMode:Off).
        # Was null-routed in alertmanagerconfig since 2026-06-29, but kept
        # firing 10k+ flap-episodes/7d, polluting ALERTS metrics, inhibition
        # processing, and the bad-actor dashboard. Kill the evaluation, not
        # just the delivery.
        CPUThrottlingHigh: true
        # Known etcd-mixin false positive: grpc_code!="OK" counts normal
        # client cancellations (kube-apiserver watch streams are cancelled
        # constantly), so it flaps forever (~1.4k episodes/7d) with nothing
        # to fix. Real etcd failures surface via etcdMembersDown /
        # etcdInsufficientMembers / apiserver latency rules.
        etcdHighNumberOfFailedGRPCRequests: true
    alertmanager:
      alertmanagerSpec:
        # External hostname so notification "View in Alertmanager" links resolve
        # off the cluster (LAN/VPN) instead of the in-cluster .svc address.
        externalUrl: https://alertmanager.${SECRET_DOMAIN}
        # Apply the AlertmanagerConfig CRD cluster-wide instead of only to its own
        # namespace. Without this the operator auto-scopes the route to
        # namespace="observability", so alerts from every other namespace fall
        # through to the default "null" receiver and are silently dropped.
        alertmanagerConfigMatcherStrategy:
          type: None
        useExistingSecret: true
        configSecret: alertmanager-secret
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              resources:
                requests:
                  storage: 2Gi
    kubeApiServer:
      serviceMonitor:
        selector:
          k8s-app: kube-apiserver
    kubeScheduler:
      service:
        selector:
          k8s-app: kube-scheduler
    kubeControllerManager: &kubeControllerManager
      service:
        selector:
          k8s-app: kube-controller-manager
    kubeEtcd:
      <<: *kubeControllerManager # etcd runs on control plane nodes
    kubeProxy:
      enabled: false
    prometheus:
      prometheusSpec:
        # External hostname so each alert's generatorURL (the ntfy/pushover click
        # link) deep-links to a resolvable host instead of the in-cluster .svc address.
        externalUrl: https://prometheus.${SECRET_DOMAIN}
        replicas: 2
        scrapeInterval: 1m # Must match interval in Grafana Helm chart
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - auto-gomemlimit
          - memory-snapshot-on-shutdown
          - new-service-discovery-manager
        retention: 14d
        retentionSize: 70GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              resources:
                requests:
                  storage: 100Gi
    prometheus-node-exporter:
      fullnameOverride: node-exporter
      resources:
        requests:
          cpu: 50m
          memory: 260Mi
        limits:
          memory: 350Mi
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
    grafana:
      enabled: false
      forceDeployDashboards: true
      # Emit the bundled k8s-mixin dashboards (etcd, kubelet, scheduler,
      # compute-resources, proxy, ...) as grafana-operator GrafanaDashboard
      # CRs (configMapRef) instead of sidecar-labeled configmaps, so the
      # grafana-operator instance picks them up. Targets the Grafana CR via
      # its `dashboards: grafana` label.
      operator:
        dashboardsConfigMapRefEnabled: true
        folder: Kubernetes
        matchLabels:
          dashboards: grafana
