---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app peanut
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      peanut:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: brandawg93/peanut
              tag: 6.0.0
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
            env:
              NUT_HOST: nut-upsd.kube-system.svc.cluster.local
              NUT_PORT: 3493
              WEB_PORT: &httpPort 8080
            envFrom:
              - secretRef:
                  name: peanut-secret
    service:
      app:
        controller: peanut
        ports:
          http:
            port: *httpPort

    route:
      app:
        hostnames: ["ups.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https-main
