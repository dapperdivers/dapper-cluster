---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    # Upstream Gatus container. Config vars (${...}) are expanded by Gatus at
    # runtime from these env vars + the gatus-secret; the chart injects
    # GATUS_CONFIG_PATH and GATUS_WEB_PORT itself.
    gatus:
      port: 8080
      delayStartSeconds: "5"
      env:
        TZ: "${TIME_ZONE}"
        SECRET_DOMAIN: "${SECRET_DOMAIN}"
        SECRET_DOMAIN_MEDIA: "${SECRET_DOMAIN_MEDIA}"
      envFrom:
        - secretRef:
            name: gatus-secret
    # gatus-sidecar: auto-discover every HTTPRoute on the external/internal
    # Gateways; base config (group, guarded, alerts) is inherited from each
    # Gateway's gatus.home-operations.com/endpoint annotation.
    sidecar:
      gatewayNames:
        - external
        - internal
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: false
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    # Match the legacy pod identity so the existing VolSync-backed sqlite DB
    # (owned 1000:150) stays readable.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 150
      fsGroup: 140
      fsGroupChangePolicy: OnRootMismatch
    persistence:
      enabled: true
      existingClaim: gatus
    monitoring:
      serviceMonitor:
        enabled: true
    httpRoute:
      enabled: true
      annotations:
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        # Don't self-monitor the status page.
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - "status.${SECRET_DOMAIN}"
      parentRefs:
        - name: external
          namespace: network
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 512Mi
