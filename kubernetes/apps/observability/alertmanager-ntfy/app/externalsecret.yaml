---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-ntfy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: alertmanager-ntfy-secret
    template:
      engineVersion: v2
      data:
        # Merged at startup with the plain config.yml (--configs a,b). Keeps the
        # ntfy access token out of the ConfigMap.
        auth.yml: |
          ntfy:
            auth:
              token: "{{ .NTFY_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^NTFY_TOKEN$
