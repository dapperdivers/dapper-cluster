---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app goldilocks
spec:
  interval: 30m
  chart:
    spec:
      interval: 15m
      chart: goldilocks
      version: 10.4.1
      sourceRef:
        kind: HelmRepository
        name: fairwinds
        namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controller:
      resources:
        requests:
          memory: 105M
        limits:
          memory: 105M
    image:
      repository: us-docker.pkg.dev/fairwinds-ops/oss/goldilocks
      tag: v4.15.1@sha256:244b52b53aa4bb56b53c50f5b6b617612619a8f76571bd1e21d7d8157b3aee9e
      pullPolicy: Always
    vpa:
      enabled: true
      recommender:
        # Advisory-only (all VPAs are updateMode: Off) — no need for minute-fresh
        # recommendations. An hourly loop alone cuts status + checkpoint writes to
        # ~0.1/s (171 objects/hour), so default checkpoint storage is fine; the
        # Prometheus history backend was dropped (its queries assume the old
        # cadvisor label schema and error against kube-prometheus-stack).
        extraArgs:
          recommender-interval: 1h
    dashboard:
      enabled: true
      resources:
        requests:
          memory: 105M
        limits:
          memory: 105M
