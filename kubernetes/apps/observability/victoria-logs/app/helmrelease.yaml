---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-operator
      namespace: rook-ceph
  values:
    fullnameOverride: victoria-logs
    server:
      persistentVolume:
        enabled: true
        storageClassName: ceph-rbd
        size: 20Gi
      retentionPeriod: 14d
      serviceMonitor:
        enabled: true
    # dashboards disabled — chart 0.11.29 has broken dashboard.yaml template
    # (wrong node kind: expected MappingNode but got ScalarNode)
    # Re-enable when upstream fixes: https://github.com/VictoriaMetrics/helm-charts
    dashboards:
      enabled: false
