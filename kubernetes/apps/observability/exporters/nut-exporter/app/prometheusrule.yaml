---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: network-ups-tools.rules
  namespace: monitoring
spec:
  groups:
    - name: nut-exporter.rules
      rules:
        - alert: NutExporterAbsent
          annotations:
            description: NUT Exporter has disappeared from Prometheus target discovery.
            summary: NUT Exporter is down.
          expr: |
            absent(up{job=~".*nut-exporter.*"} == 1)
          for: 5m
          labels:
            # A monitoring gap, not a power event — fix same-day, don't wake up.
            severity: warning
        - alert: UpsOnBattery
          annotations:
            description: UPS {{ $labels.ups }} has lost power and is running on battery.
            summary: UPS is running on battery.
          expr: |
            network_ups_tools_ups_status{flag="OB"} == 1
          for: 10s
          labels:
            severity: critical
        - alert: UpsLowBattery
          annotations:
            description: UPS {{ $labels.ups }} battery is low and the system is getting ready to shutdown.
            summary: UPS battery is low.
          expr: |
            network_ups_tools_ups_status{flag="LB"} == 1
          for: 5s
          labels:
            severity: critical
        - alert: UpsBatteryReplace
          annotations:
            description: UPS {{ $labels.ups }} battery needs to be replaced.
            summary: Replace UPS battery.
          expr: |
            network_ups_tools_ups_status{flag="RB"} == 1
          for: 10s
          labels:
            # Order a battery — an act-today task, not a 3am page.
            severity: warning
        - alert: UpsUnreachable
          annotations:
            description: >
              NUT can no longer read UPS {{ $labels.ups }} — its management card is
              likely offline (network/power) or the driver lost communication. We
              have no battery/status data or graceful-shutdown coverage for it until
              it returns. (NutExporterAbsent only covers the whole exporter dying.)
            summary: A UPS dropped off monitoring.
          expr: |
            up{job=~".*nut-exporter.*"} == 0
          for: 5m
          labels:
            # Lost visibility for one UPS, not an active power event — same-day fix.
            severity: warning
        - alert: UpsOverload
          annotations:
            description: >
              UPS {{ $labels.ups }} output load is {{ printf "%.0f" $value }}% —
              sustained high load cuts runtime and risks an overload trip. Rebalance
              the rack or move load to the other UPS.
            summary: UPS running near capacity.
          expr: |
            network_ups_tools_ups_load > 90
          for: 15m
          labels:
            severity: warning
