---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: snmp-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: snmp-exporter-secret
    template:
      engineVersion: v2
      data:
        # Mounted as an extra --config.file and merged with the image's bundled
        # snmp.yml at startup. Keeps the read-only SNMP community out of Git.
        # Defines a v2c auth named "ro_v2" referenced by the ServiceMonitor
        # params (auth: ["ro_v2"]).
        snmp-auth.yml: |
          auths:
            ro_v2:
              community: "{{ .SNMP_RO_COMMUNITY }}"
              version: 2
  dataFrom:
    - find:
        name:
          regexp: ^SNMP_RO_COMMUNITY$
