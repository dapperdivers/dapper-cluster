---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      version: 4.8.3
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: nvidia-device-plugin
      namespace: kube-system
  values:
    resources:
      requests:
        cpu: 50m
        memory: 365Mi
      limits:
        cpu: 500m
        memory: 512Mi
    image:
      repository: nvcr.io/nvidia/k8s/dcgm-exporter
      # Pinned to the image that ships with chart 4.8.2 (DCGM 4.5.3). The old
      # 3.1.7-3.1.4-ubuntu20.04 pin (2022) no longer starts on the current Talos
      # 6.18 kernel/runtime — containerd timed out creating the shim task
      # (RunContainerError, 1000+ restarts over ~47h). Pascal P100s lack DCGM
      # profiling (DCP) support, but the chart already defaults its arguments to
      # default-counters.csv (no DCGM_FI_PROF_* fields), so that limitation is
      # avoided — basic GPU telemetry (util/mem/temp/power/clocks) works on Pascal.
      tag: 4.5.3-4.8.2-distroless
    extraEnv:
      - name: NVIDIA_DRIVER_CAPABILITIES
        value: all
      - name: NVIDIA_VISIBLE_DEVICES
        value: all
    nodeSelector:
      nvidia.feature.node.kubernetes.io/gpu: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    runtimeClassName: nvidia
    serviceMonitor:
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
      capabilities:
        add:
          - SYS_ADMIN
