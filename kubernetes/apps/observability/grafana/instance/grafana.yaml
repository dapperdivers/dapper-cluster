---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth:
      disable_login_form: "false"
    auth.anonymous:
      enabled: "true"
      org_id: "1"
      org_name: Main Org.
      org_role: Viewer
    auth.generic_oauth:
      enabled: "true"
      name: Authentik
      icon: signin
      # client_id / client_secret come from env (GF_AUTH_GENERIC_OAUTH_*) so the
      # secret never lands in the rendered grafana.ini ConfigMap.
      scopes: openid email profile
      auth_url: https://sso.${SECRET_DOMAIN}/application/o/authorize/
      token_url: https://sso.${SECRET_DOMAIN}/application/o/token/
      api_url: https://sso.${SECRET_DOMAIN}/application/o/userinfo/
      # Authentik groups → Grafana roles; everyone else lands as Viewer.
      role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
      allow_assign_grafana_admin: "true"
      use_pkce: "true"
    date_formats:
      use_browser_locale: "true"
    explore:
      enabled: "true"
    feature_toggles:
      enable: publicDashboards
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      allow_loading_unsigned_plugins: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
    security:
      angular_support_enabled: "true"
      cookie_samesite: lax
    server:
      root_url: https://grafana.${SECRET_DOMAIN}
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_INSTALL_PLUGINS
                  value: grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel,natel-discrete-panel,pr0ps-trackmap-panel,victoriametrics-logs-datasource,vonage-status-panel
                # Admin user stays "admin" — the grafana-operator authenticates to
                # the instance API as "admin" over basic auth (which must stay
                # enabled). Only the password is overridden from our secret.
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: admin-password
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-secret
                      key: client-id
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-secret
                      key: client-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
