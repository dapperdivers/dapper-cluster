---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Admin credentials are owned by the grafana-operator (the auto-generated
# `grafana-admin-credentials` Secret), so no admin ExternalSecret here — see
# the note in grafana.yaml. Only OIDC client creds are sourced from Infisical.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: grafana-oidc-secret
    template:
      engineVersion: v2
      data:
        client-id: "{{ .GRAFANA_OIDC_CLIENT_ID }}"
        client-secret: "{{ .GRAFANA_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - find:
        name:
          regexp: ^GRAFANA_OIDC.*
