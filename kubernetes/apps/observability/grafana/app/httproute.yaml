---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
  annotations:
    # Dashboard discovery (Homepage) — preserved from the old ingress.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grafana
    gethomepage.dev/icon: si-grafana
    gethomepage.dev/group: Monitoring
spec:
  parentRefs:
    - name: internal
      namespace: network
  hostnames: ["grafana.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: grafana
          port: 80
