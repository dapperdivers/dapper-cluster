---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["grafana.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: grafana
          port: 80
