---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: finance-categorization-service
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      finance-categorization-service:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/chelonianlabs/finance-categorization-service
              tag: latest
              pullPolicy: Always
            env:
              HOST: "0.0.0.0"
              PORT: "8007"
              REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379"
              AI_SERVICE_URL: "http://finance-ai-service.chelonian.svc.cluster.local:8005"
              TRANSACTION_SERVICE_URL: "http://finance-transaction-service.chelonian.svc.cluster.local:8004"
              AUTH_SERVICE_URL: "http://finance-auth-service.chelonian.svc.cluster.local:8001"
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8007
                  initialDelaySeconds: 10
                  periodSeconds: 30
              liveness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      imagePullSecrets:
        - name: ghcr-chelonian
    service:
      app:
        controller: finance-categorization-service
        ports:
          http:
            port: 8007
