---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: chelonian-ghcr-pull-secret
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/apps/chelonian/ghcr-pull-secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: dapper-cluster
  wait: true
  dependsOn:
    - name: chelonian-namespace
    - name: external-secrets-stores
