---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turtle-track
  labels:
    app.kubernetes.io/name: turtle-track
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: turtle-track
  template:
    metadata:
      labels:
        app.kubernetes.io/name: turtle-track
    spec:
      containers:
        - name: turtle-track
          image: ghcr.io/chelonianlabs/turtle-track:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-chelonian
