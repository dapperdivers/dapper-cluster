---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app chelonian-turtle-track
  namespace: &namespace chelonian
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: chelonian-ghcr-pull-secret
      namespace: chelonian
  path: ./kubernetes/apps/chelonian/turtle-track/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 10m
