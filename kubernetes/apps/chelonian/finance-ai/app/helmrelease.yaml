---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: finance-ai-service
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      finance-ai-service:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/chelonianlabs/finance-ai-service
              tag: latest@sha256:fec2bfe47f0c8f9473df6b09c7a9cbbf436d3557c31821cf320444fbf42ea49d
              pullPolicy: Always
            env:
              HOST: "0.0.0.0"
              PORT: "8005"
              REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379"
              AUTH_SERVICE_URL: "http://finance-auth-service.chelonian.svc.cluster.local:8001"
              TRANSACTION_SERVICE_URL: "http://finance-transaction-service.chelonian.svc.cluster.local:8004"
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: finance-app-secret
                    key: OPENAI_API_KEY
              ANTHROPIC_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: finance-app-secret
                    key: ANTHROPIC_API_KEY
              API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: finance-app-secret
                    key: API_KEY
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8005
                  initialDelaySeconds: 10
                  periodSeconds: 30
              liveness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      imagePullSecrets:
        - name: ghcr-chelonian
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /app/categorization_results
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: finance-ai-service
        ports:
          http:
            port: 8005
