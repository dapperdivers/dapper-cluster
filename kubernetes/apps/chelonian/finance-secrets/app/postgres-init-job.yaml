---
apiVersion: batch/v1
kind: Job
metadata:
  name: finance-postgres-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          env:
            - name: INIT_POSTGRES_HOST
              value: postgres-rw.database.svc.cluster.local
            - name: INIT_POSTGRES_PORT
              value: "5432"
            - name: INIT_POSTGRES_SUPER_USER
              valueFrom:
                secretKeyRef:
                  name: finance-postgres-superuser
                  key: POSTGRES_SUPER_USER
            - name: INIT_POSTGRES_SUPER_PASS
              valueFrom:
                secretKeyRef:
                  name: finance-postgres-superuser
                  key: POSTGRES_SUPER_PASS
            - name: INIT_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: finance-app-secret
                  key: CHELONIAN_DB_USER
            - name: INIT_POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: finance-app-secret
                  key: CHELONIAN_DB_PASS
            - name: INIT_POSTGRES_DBNAME
              value: "finance_main finance_auth finance_user_org finance_file finance_transaction"
