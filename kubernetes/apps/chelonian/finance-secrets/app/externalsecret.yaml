---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: finance-app-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-chelonian
  target:
    name: finance-app-secret
    template:
      engineVersion: v2
      data:
        # Database
        CHELONIAN_DB_USER: "{{ .CHELONIAN_DB_USER }}"
        CHELONIAN_DB_PASS: "{{ .CHELONIAN_DB_PASS }}"
        # AI Keys
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        # Auth secrets
        JWT_SECRET_KEY: "{{ .CHELONIAN_JWT_SECRET }}"
        API_KEY: "{{ .CHELONIAN_API_KEY }}"
        # Database URLs (all services connect to CloudNativePG)
        MAIN_DATABASE_URL: "postgresql+asyncpg://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_main"
        AUTH_DATABASE_URL: "postgresql://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_auth"
        USER_ORG_DATABASE_URL: "postgresql://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_user_org"
        FILE_DATABASE_URL: "postgresql://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_file"
        TRANSACTION_DATABASE_URL: "postgresql://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_transaction"
        CATEGORIZATION_DATABASE_URL: "postgresql+asyncpg://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_categorization"
        AI_DATABASE_URL: "postgresql+asyncpg://{{ .CHELONIAN_DB_USER }}:{{ .CHELONIAN_DB_PASS }}@postgres-rw.database.svc.cluster.local:5432/finance_ai"
  dataFrom:
    - find:
        name:
          regexp: ^(CHELONIAN_|OPENAI_API_KEY|ANTHROPIC_API_KEY)
