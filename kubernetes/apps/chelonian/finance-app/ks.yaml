---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app chelonian-finance-secrets
  namespace: &namespace chelonian
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-stores
      namespace: external-secrets
    - name: chelonian-ghcr-pull-secret
      namespace: chelonian
  path: ./kubernetes/apps/chelonian/finance-app/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app chelonian-finance-app
  namespace: &namespace chelonian
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: chelonian-finance-secrets
      namespace: chelonian
    - name: cloudnative-pg-cluster
      namespace: database
  path: ./kubernetes/apps/chelonian/finance-app/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 10m
  retryInterval: 2m
  timeout: 10m
