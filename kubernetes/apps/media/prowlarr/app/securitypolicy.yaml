---
# Forward-auth via the Authentik embedded outpost (Envoy ext_authz endpoint).
# Replaces the old nginx auth-url annotation. Outpost picks the provider by host.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authentik-forward-auth
  namespace: media
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: prowlarr
  extAuth:
    failOpen: false
    http:
      backendRefs:
        - name: ak-outpost-authentik-embedded-outpost
          namespace: security
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - set-cookie
        - x-authentik-username
        - x-authentik-email
        - x-authentik-groups
        - x-authentik-uid
        - x-authentik-name
