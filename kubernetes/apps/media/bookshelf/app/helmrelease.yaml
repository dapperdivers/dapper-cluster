---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookshelf
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      bookshelf:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pennydreadful/bookshelf
              tag: hardcover
            env:
              TZ: ${TIME_ZONE}
              PUID: "1000"
              PGID: "150"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 1Gi

          calibre-server:
            image:
              repository: ghcr.io/linuxserver/calibre
              tag: 9.9.0
            env:
              TZ: ${TIME_ZONE}
              PUID: "1000"
              PGID: "150"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 150
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: bookshelf
        ports:
          http:
            port: 8787
      calibre-server:
        controller: bookshelf
        ports:
          desktop:
            port: 8080
          content-server:
            port: 8090
    route:
      app:
        hostnames: ["bookshelf.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https-media
        rules:
          - backendRefs:
              - identifier: app
                port: http
      calibre-server:
        hostnames: ["calibre.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https-media
        rules:
          - backendRefs:
              - identifier: calibre-server
                port: desktop
    persistence:
      config:
        existingClaim: bookshelf
        advancedMounts:
          bookshelf:
            app:
              - path: /config
            calibre-server:
              - path: /config
                subPath: calibre-config
      media:
        existingClaim: media-cephfs-pvc
        advancedMounts:
          bookshelf:
            app:
              - path: /media
            calibre-server:
              - path: /books
                subPath: books
      tmp:
        type: emptyDir
