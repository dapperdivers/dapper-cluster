---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: kometa-secret
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        KOMETA_TMDB_API_KEY: "{{ .TMDB_API_KEY }}"
        KOMETA_MDBLIST_API_KEY: "{{ .MDBLIST_API_KEY }}"
        KOMETA_OMDB_API_KEY: "{{ .OMDB_API_KEY }}"
        KOMETA_PLEX_API_KEY: "{{ .PLEX_BACKUP_TOKEN }}"
        KOMETA_TAUTULLI_API_KEY: "{{ .TAUTULLI_API_KEY }}"
        KOMETA_SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
        KOMETA_SONARR_UHD_API_KEY: "{{ .SONARR_UHD_API_KEY }}"
        KOMETA_RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        KOMETA_RADARR_UHD_API_KEY: "{{ .RADARR_UHD_API_KEY }}"
        # Trakt
        KOMETA_TRAKT_ACCESS_TOKEN: "{{ .TRAKT_ACCESS_TOKEN }}"
        KOMETA_TRAKT_CREATED_AT: "{{ .TRAKT_CREATED_AT }}"
        KOMETA_TRAKT_CLIENT_ID: "{{ .TRAKT_CLIENT_ID }}"
        KOMETA_TRAKT_CLIENT_SECRET: "{{ .TRAKT_CLIENT_SECRET }}"
        KOMETA_TRAKT_EXPIRES_IN: "{{ .TRAKT_EXPIRES_IN }}"
        KOMETA_TRAKT_REFRESH_TOKEN: "{{ .TRAKT_REFRESH_TOKEN }}"
        # ntfy run notifications — reuses the shared NTFY_TOKEN (carport user, all topics)
        KOMETA_NTFY_TOKEN: "{{ .NTFY_TOKEN }}"

  # One folder-scoped recursive find (all the Kometa keys live in /Downloads)
  # instead of 15 separate root-level finds — one ListSecrets call against a small
  # folder. The shared NTFY_TOKEN lives outside that folder, so it gets its own
  # name-scoped find (mirrors alertmanager-ntfy). The template above selects keys.
  dataFrom:
    - find:
        path: /Downloads
    - find:
        name:
          regexp: ^NTFY_TOKEN$
