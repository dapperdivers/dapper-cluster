---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tautulli
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      tautulli:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Tautulli >=2.15 refuses to run scripts from a mounted path
          # ("Script folder is on a mounted path which is not allowed"), which
          # silently broke the posterizarr trigger when the check landed. Stage
          # the configMap-sourced script onto the config PVC (/config/scripts,
          # beside the jbops add-ons and notify_newip.py) where Tautulli allows it.
          stage-posterizarr-script:
            image:
              repository: mirror.gcr.io/library/busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /config/scripts
                cp /src/posterizarr.py /config/scripts/posterizarr.py
                chmod 0755 /config/scripts/posterizarr.py
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/tautulli
              tag: 2.17.2@sha256:7592e192e2dd5297054a80c0f1e8b2593f7675af75c5020806b30c712e159406
            env:
              TZ: ${TIME_ZONE}
              TAUTULLI__PORT: &port 8181
              # Tautulli v2.15.3+ maps TAUTULLI_<UPPER_KEY> env vars onto config.ini
              # settings, so general settings can be GitOps-declared instead of clicked
              # in the GUI. Enables TheMovieDB metadata lookup (API key already present).
              TAUTULLI_THEMOVIEDB_LOOKUP: "1"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
          jbops:
            image:
              repository: registry.k8s.io/git-sync/git-sync
              tag: v4.7.1@sha256:c5e1976da735bf0b53979f079a07475d77174c51863cd084e928ff6074480717
            env:
              GITSYNC_REPO: https://github.com/blacktwin/JBOPS
              GITSYNC_REF: master
              GITSYNC_PERIOD: 24h
              GITSYNC_ROOT: /add-ons
            securityContext: *securityContext
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 140
        fsGroup: 150
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: tautulli
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          authentik.home.arpa/forward-auth: "true"
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
    persistence:
      config:
        existingClaim: tautulli
      # JBOPS must live inside Tautulli's data dir (/config): Tautulli >=2.15
      # refuses to execute scripts from mounted paths outside it
      # ("Script folder is on a mounted path which is not allowed").
      # git-sync writes to a subPath of the config PVC, which the app
      # container sees at /config/add-ons via its existing /config mount.
      add-ons:
        existingClaim: tautulli
        advancedMounts:
          tautulli:
            jbops:
              - path: /add-ons
                subPath: add-ons
      cache:
        existingClaim: tautulli-cache
        globalMounts:
          - path: /config/cache
      posterizarr-watcher:
        existingClaim: posterizarr-watcher
        globalMounts:
          - path: /posterizarr/watcher
      # configMap source for the watcher script; only the init container needs
      # it — it stages the file onto /config/scripts (a mounted /scripts path
      # on the app itself is exactly what Tautulli now rejects).
      posterizarr-watcher-script:
        type: configMap
        name: posterizarr-watcher
        advancedMounts:
          tautulli:
            stage-posterizarr-script:
              - path: /src
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
      tmp:
        type: emptyDir
