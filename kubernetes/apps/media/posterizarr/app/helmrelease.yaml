# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app posterizarr # redeploy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      posterizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/mikefarah/yq
              tag: 4.52.1@sha256:c0f7a8a84f1dbfb7a19530683788dde8fc41227c7a2446a9d89d1e7eb9bad0a5
            command:
              - "/bin/sh"
            args:
              - "/app/config-file/init-config.sh"
            envFrom:
              - secretRef:
                  name: posterizarr-secret
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/fscorrupt/posterizarr
              tag: 3.1.3@sha256:7fb8d115226aedbee60e986c44e57d667f0c4bf93680038601c178d06c1967fb
            env:
              TZ: ${TIME_ZONE}
              # Nightly full-library sweep (local time); Start.ps1 fires a
              # -ContainerSchedule run at this time. Unset = "disabled" = the
              # watcher-only default, which never backfills the existing library.
              RUN_TIME: "05:00"
            resources:
              requests:
                cpu: 100m
                memory: 4096M
              limits:
                memory: 8192M
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
          # Posterizarr only logs to files, never stdout — tail the backend log
          # (FrontendUI.log is a duplicate of it) for Fluent Bit → VictoriaLogs
          logs:
            image:
              repository: mirror.gcr.io/library/busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - tail -n0 -F /config/UILogs/BackendServer.log
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 64Mi
    service:
      app:
        controller: posterizarr
        ports:
          http:
            port: &port 8000
    route:
      app:
        annotations:
          authentik.home.arpa/forward-auth: "true"
        hostnames: ["posterizarr.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 150
        fsGroup: 150
        supplementalGroups:
          - 140
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        existingClaim: *app
      # Posterizarr's web UI logs have no rotation and grow ~12MB/day, but the
      # app wipes them on every startup anyway — keep them off the config PVC
      # (and out of VolSync backups); durable history lives in VictoriaLogs
      ui-logs:
        type: emptyDir
        globalMounts:
          - path: /config/UILogs
      # Start.ps1's file watcher polls $APP_DATA/watcher (= /config/watcher) —
      # it's hardcoded, so the shared Tautulli-trigger PVC MUST mount there, not
      # at /watcher (that mismatch silently broke recently-added runs, #9f31486d0)
      posterizarr-watcher:
        existingClaim: posterizarr-watcher
        globalMounts:
          - path: /config/watcher
      config-file:
        type: configMap
        defaultMode: 511
        name: posterizarr-configmap
        globalMounts:
          - path: /app/config-file
      assets:
        existingClaim: plex-posters-cephfs
        globalMounts:
          - path: /assets
          # The web UI backend hardcodes /manualassets and /assetsbackup in
          # container mode (it ignores config.json's ManualAssetPath/BackupPath,
          # which only the PowerShell runner reads) and logs a WARNING every
          # scan cycle when they're missing — expose the same share dirs there
          - path: /manualassets
            subPath: manualassets
          - path: /assetsbackup
            subPath: assetsbackup
