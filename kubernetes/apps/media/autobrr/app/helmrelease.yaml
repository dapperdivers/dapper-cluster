---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: autobrr
  annotations:
    # Postgres-init automation — Kyverno generates the init secret + injects the
    # init container that creates the DB/role. Creds come from Infisical.
    postgres-init.home.arpa/enabled: "true"
    postgres-init.home.arpa/user-key: "AUTOBRR_POSTGRES_USER"
    postgres-init.home.arpa/pass-key: "AUTOBRR_POSTGRES_PASSWORD"
    postgres-init.home.arpa/dbname: "autobrr"
    postgres-init.home.arpa/secret-store: "infisical-postgres"
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      autobrr:
        annotations:
          reloader.stakater.com/auto: "true"
        # init-db container injected automatically by Kyverno postgres-init
        containers:
          app:
            image:
              repository: ghcr.io/autobrr/autobrr
              tag: v1.81.0@sha256:491e3e1a81fe5ced6b542621e49985d0dea58d23257684b0b19d881761736303
            env:
              AUTOBRR__CHECK_FOR_UPDATES: "false"
              AUTOBRR__HOST: 0.0.0.0
              AUTOBRR__PORT: &port 80
              AUTOBRR__LOG_LEVEL: INFO
            envFrom:
              - secretRef:
                  name: autobrr-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz/liveness
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: autobrr
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
    persistence:
      tmp:
        type: emptyDir
