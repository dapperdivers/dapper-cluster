---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      nzbget:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/nzbget
              tag: 26.2.0@sha256:fd02970c635c700471c5ba36e6928f3424b2277a3c7ba86e91169fea6cd22f3f
            env:
              TZ: ${TIME_ZONE}
            resources:
              requests:
                cpu: 8000m
              limits:
                memory: 80Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 140
        fsGroup: 150
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["qbittorrent","plex","sabnzbd"]
                topologyKey: kubernetes.io/hostname
    service:
      app:
        controller: nzbget
        ports:
          http:
            port: 6789
    persistence:
      config:
        existingClaim: nzbget
      tmp:
        medium: Memory
        type: emptyDir
        globalMounts:
          - path: /tmp
      media:
        existingClaim: media-cephfs-pvc
        globalMounts:
          - path: /media
