---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wizarr

spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      wizarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository:  ghcr.io/wizarrrr/wizarr
              tag: v2026.7.1@sha256:606f9b88b0303daae11f595e424756b588d9365021c53dcb4d1369f2efc0543c
            env:
              TZ: ${TIME_ZONE}
              APP_URL: https://invite.${SECRET_DOMAIN_MEDIA}

            resources:
              requests:
                cpu: 15m
                memory: 180M
              limits:
                  memory: 300M
    service:
      app:
        controller: wizarr
        ports:
          http:
            port: 5690
    route:
      app:
        hostnames: ["invite.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
    persistence:
      config:
        existingClaim: wizarr
        globalMounts:
          - path: /data/database
