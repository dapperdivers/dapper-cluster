---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app plex
spec:
  interval: 30m
  # Generous timeout: moving Plex between nodes means the ceph-rbd (RWO) config
  # volume must detach from the old node and reattach on the new one, then Plex
  # cold-starts its DB. This exceeds the 5m helm default and was triggering a
  # rollback loop during the GPU->CPU node move.
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      plex:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # The P100 (GP100) has no NVENC encoder, so hardware transcoding is
          # impossible on the GPU node — Plex was stalling on a dead NVENC path.
          # Pin Plex to the high-CPU large nodes (16 cores each) for software
          # transcoding instead.
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - talos-node-large-1
                          - talos-node-large-2
                          - talos-node-large-3
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.3.10828@sha256:0c0b6899339503af17cb190b25af6acf10f0030e2820985e16ee14ef428f49d7
            env:
              TZ: ${TIME_ZONE}
              PLEX_LAN_NETWORKS: 192.168.1.0/24,10.100.0.0/24,10.69.0.0/16
              PLEX_ADVERTISE_URL: https://plex.${SECRET_DOMAIN_MEDIA}:443,http://${PLEX_VIP_GATEWAY}:32400
              PLEX_NO_AUTH_NETWORKS: 192.168.1.0/24,10.69.0.0/16
            envFrom:
              - configMapRef:
                  name: plex-preferences
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 4000m
                memory: 12Gi
              limits:
                # No CPU limit on purpose: few users / few concurrent transcodes,
                # so let a software transcode use the whole 16-core box without
                # CFS throttling (a hard limit stalls realtime playback even with
                # idle cores). Under contention the cpu *request* (+ Mayastor's
                # own requests on these storage nodes) still protects storage.
                # 48Gi so the 15Gi /transcode tmpfs + Plex + buffers fit (node has 128Gi)
                memory: 48Gi
          imagemaid:
            image:
              repository: docker.io/kometateam/imagemaid
              tag: v1.2.0@sha256:94cf9ed79a264238c64cdcbf241822fc3569225cc103de542a6390bfaf393034
            env:
              TZ: ${TIME_ZONE}
            envFrom:
              - configMapRef:
                  name: imagemaid-config
              - secretRef:
                  name: imagemaid-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          # Plex only logs to files, never stdout — tail the main log so
          # Fluent Bit ships it to VictoriaLogs like every other app
          logs:
            image:
              repository: mirror.gcr.io/library/busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - tail -n0 -F "/config/Library/Application Support/Plex Media Server/Logs/Plex Media Server.log"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 150
        fsGroup: 150
        supplementalGroups:
          - 140
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        type: LoadBalancer
        controller: *app
        annotations:
          lbipam.cilium.io/ips: ${PLEX_VIP_GATEWAY}
        ports:
          http:
            port: &port 32400
            primary: true
          dnla-tcp:
            port: 32469
            protocol: TCP
          dnla-udp:
            port: 1900
            protocol: UDP
          bonjour-udp:
            port: 5353
            protocol: UDP
          gdm-1:
            port: 32410
            protocol: UDP
          gdm-2:
            port: 32412
            protocol: UDP
          gdm-3:
            port: 32413
            protocol: UDP
          gdm-4:
            port: 32414
            protocol: UDP
    route:
      app:
        # Plex streams direct over the WAN via the dedicated media gateway, NOT
        # the Cloudflare tunnel. external-dns inherits the record target from the
        # media Gateway (grey-cloud ipv4 -> WAN), so no route-level target here.
        # But the Gateway-level cloudflare-proxied=false is NOT inherited onto
        # route records (external-dns falls back to the global --cloudflare-proxied
        # default), so set it per-route: plex must be grey/DNS-only to bypass the
        # Cloudflare proxy and reach the WAN directly.
        annotations:
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
          gatus.home-operations.com/endpoint: |-
            path: /web/index.html
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: media
            namespace: network
        # Plex needs long-lived connections that blow past Envoy's ~15s default
        # route timeout: transcode-decision can take >15s to spin up, video
        # streams/direct-play run for hours, and /:/eventsource/notifications is
        # an SSE stream held open the whole session. Without this, Envoy returns
        # 504 "upstream request timeout" (UT). 0s disables the timeout.
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: *port
            timeouts:
              request: 0s
              backendRequest: 0s
    persistence:
      config:
        existingClaim: plex
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server
      # Separate PVC for cache to avoid backing up cache files
      cache:
        existingClaim: plex-cache
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Cache
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/Library/Application Support/Plex Media Server/Logs
      tmp:
        type: emptyDir
        medium: Memory
        advancedMounts:
          plex:
            app:
              - path: /tmp
      imagemaid-tmp:
        type: emptyDir
        advancedMounts:
          plex:
            imagemaid:
              - path: /tmp
      imagemaid-config:
        type: emptyDir
        advancedMounts:
          plex:
            imagemaid:
              - path: /config
      transcode:
        medium: Memory
        type: emptyDir
        sizeLimit: 15Gi
        globalMounts:
          - path: /transcode
      media:
        existingClaim: media-cephfs-pvc
        globalMounts:
          - path: /media
