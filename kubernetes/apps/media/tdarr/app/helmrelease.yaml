---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tdarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      tdarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: 2.80.01@sha256:43e0808409011a14a0f8c89d649ef9caebf0a1e7120624ba6d9dbad517f53d98
            env:
              TZ: ${TIME_ZONE}
              PGID: 140
              PUID: 1000
              internalNode: false
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
    service:
      app:
        controller: tdarr
        ports:
          http:
            port: 8265
          server:
            enabled: true
            protocol: TCP
            port: 8266

    route:
      app:
        annotations:
          authentik.home.arpa/forward-auth: "true"
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN_MEDIA}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https-media

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/server
      media:
        existingClaim: media-cephfs-pvc
        globalMounts:
          - path: /media
      transcode:
        type: emptyDir
        medium: Memory
        sizeLimit: 20Gi
        globalMounts:
          - path: /temp
