---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre-web
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      calibre-web:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: crocodilestick/calibre-web-automated
              tag: latest
            env:
              TZ: ${TIME_ZONE}
              PUID: "1000"
              PGID: "150"
            envFrom:
              - secretRef:
                  name: calibre-web-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 512Mi

          shelfmark:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: latest
            env:
              TZ: ${TIME_ZONE}
              PUID: "1000"
              PGID: "150"
              INGEST_DIR: /books
              SEARCH_MODE: universal
            securityContext:
              runAsUser: 0
              runAsGroup: 0
            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        fsGroup: 150
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: calibre-web
        ports:
          http:
            port: 8083

      shelfmark:
        controller: calibre-web
        ports:
          http:
            port: 8084

    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN_MEDIA}"
        className: internal
        hosts:
          - host: &host "books.${SECRET_DOMAIN_MEDIA}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN_MEDIA/./-}-tls

      shelfmark:
        annotations:
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN_MEDIA}"
        className: internal
        hosts:
          - host: &shelfhost "shelfmark.${SECRET_DOMAIN_MEDIA}"
            paths:
              - path: /
                service:
                  identifier: shelfmark
                  port: http
        tls:
          - hosts:
              - *shelfhost
            secretName: ${SECRET_DOMAIN_MEDIA/./-}-tls

    persistence:
      config:
        existingClaim: calibre-web
        advancedMounts:
          calibre-web:
            app:
              - path: /config
            shelfmark:
              - path: /config
                subPath: shelfmark-config

      media:
        existingClaim: media-cephfs-pvc
        globalMounts:
          - path: /media
        advancedMounts:
          calibre-web:
            app:
              - path: /calibre-library
                subPath: books
              - path: /cwa-book-ingest
                subPath: downloads/irc/books
            shelfmark:
              - path: /books
                subPath: downloads/irc/books
      tmp:
        type: emptyDir
        advancedMounts:
          calibre-web:
            app:
              - path: /tmp
            shelfmark:
              - path: /tmp
