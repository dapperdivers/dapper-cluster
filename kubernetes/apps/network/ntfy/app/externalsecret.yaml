---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: ntfy-secret
    template:
      engineVersion: v2
      data:
        # Consumed by the wrapper that provisions the admin user (see helmrelease).
        NTFY_ADMIN_USER: "{{ .NTFY_ADMIN_USER }}"
        NTFY_PASSWORD: "{{ .NTFY_ADMIN_PASSWORD }}"
  dataFrom:
    - find:
        name:
          regexp: ^NTFY_.*
