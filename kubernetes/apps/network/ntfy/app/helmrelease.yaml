---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ntfy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
  values:
    controllers:
      ntfy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/binwiederhier/ntfy
              tag: v2.26.3
            # Provision the admin user idempotently (password piped to the
            # prompt; harmless if NTFY_PASSWORD is already honored), then serve.
            command:
              - /bin/sh
              - -c
              - |
                printf '%s\n%s\n' "$NTFY_PASSWORD" "$NTFY_PASSWORD" \
                  | ntfy user add --role=admin "$NTFY_ADMIN_USER" 2>/dev/null || true
                exec ntfy serve
            env:
              TZ: ${TIME_ZONE}
              NTFY_BASE_URL: https://ntfy.${SECRET_DOMAIN}
              NTFY_LISTEN_HTTP: :8080
              NTFY_BEHIND_PROXY: "true"
              NTFY_AUTH_FILE: /var/lib/ntfy/user.db
              NTFY_AUTH_DEFAULT_ACCESS: deny-all
              NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
              NTFY_CACHE_DURATION: 12h
              # sqlite contention fix: default journal mode serializes writers, and
              # background jobs (delayed sends, token expiry) were locking the DBs
              # long enough that Alertmanager webhook posts got 5xx "database is
              # locked" (~25% of sends failing). WAL + busy_timeout lets readers and
              # writers coexist and makes brief lock waits invisible.
              NTFY_CACHE_STARTUP_QUERIES: |
                pragma journal_mode = WAL;
                pragma synchronous = normal;
                pragma temp_store = memory;
                pragma busy_timeout = 15000;
              NTFY_AUTH_STARTUP_QUERIES: |
                pragma journal_mode = WAL;
                pragma synchronous = normal;
                pragma busy_timeout = 15000;
              # In-cluster senders (alertmanager-ntfy bridge, gatus) connect with
              # their pod IP (no proxy in that path) — exempt the pod CIDR so an
              # alert flood can never rate-limit the alerting pipeline itself.
              NTFY_VISITOR_REQUEST_LIMIT_EXEMPT_HOSTS: 10.69.0.0/16
              NTFY_ENABLE_LOGIN: "true"
            envFrom:
              - secretRef:
                  name: ntfy-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/health
                    port: &port 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        hostnames: ["ntfy.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: network
    persistence:
      data:
        existingClaim: ntfy
        globalMounts:
          - path: /var/lib/ntfy
