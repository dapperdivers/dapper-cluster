---
# Switch management WebUIs, fronted by the internal gateway's valid cert (TLS terminates there).
# No .manor DNS records for these, so EG Backend ip endpoints target the IPs directly.
# Most serve plain HTTP :80; Aruba is HTTPS :4343 (self-signed → insecureSkipVerify).
# Arista (.21) is SSH-only — no WebUI. CSS326 SwOS 303-redirects / -> http://192.168.1.27/index.html
# (absolute IP); browse https://css326.${SECRET_DOMAIN}/index.html directly.
# ---- Aruba S2500-48P (ArubaOS MAS WebUI, :4343) ----
# Factory cert (securelogin.arubanetworks.com) had keyUsage=certSign-only → rejected by Chrome
# (ERR_SSL_KEY_USAGE_INCOMPATIBLE) AND Envoy/BoringSSL (KEY_USAGE_BIT_INCORRECT, not bypassable by
# insecureSkipVerify). Replaced on-switch with a self-signed cert (digitalSignature+keyEncipherment)
# via `web-server switch-cert aruba-web`; insecureSkipVerify stays because the replacement is self-signed.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: aruba-proxy
  namespace: network
spec:
  endpoints:
    - ip: { address: 192.168.1.26, port: 4343 }
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aruba-proxy
  namespace: network
spec:
  parentRefs:
    - { name: internal, namespace: network }
  hostnames: ["aruba.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - { group: gateway.envoyproxy.io, kind: Backend, name: aruba-proxy }
---
