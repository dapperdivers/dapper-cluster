## Athena
---
apiVersion: v1
kind: Service
metadata:
  name: athena-proxy
  namespace: network
spec:
  type: ExternalName
  externalName: athena.manor

---
# Gateway API: Athena (Proxmox) self-signed HTTPS upstream
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: athena-proxy
  namespace: network
spec:
  endpoints:
    - fqdn:
        hostname: athena.manor
        port: 8006
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: athena-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
  hostnames: ["athena.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: athena-proxy
## proxmox (CLUSTER entry — any node manages the whole cluster; PVE tickets are
## cluster-wide so load-balancing across nodes is safe + gives failover)
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: proxmox-proxy
  namespace: network
spec:
  endpoints:
    - fqdn: { hostname: proxmox-01.manor, port: 8006 }
    - fqdn: { hostname: proxmox-02.manor, port: 8006 }
    - fqdn: { hostname: proxmox-03.manor, port: 8006 }
    - fqdn: { hostname: proxmox-04.manor, port: 8006 }
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxmox-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
  hostnames: ["proxmox.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: proxmox-proxy
