## Circe
---
apiVersion: v1
kind: Service
metadata:
  name: circe-proxy
  namespace: network
spec:
  type: ExternalName
  externalName: circe.manor

---
# Gateway API: Circe (Proxmox) self-signed HTTPS upstream
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: circe-proxy
  namespace: network
spec:
  endpoints:
    - fqdn:
        hostname: circe.manor
        port: 8006
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: circe-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["circe.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: circe-proxy
