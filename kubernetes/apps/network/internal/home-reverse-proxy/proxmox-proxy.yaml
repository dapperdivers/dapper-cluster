## Circe
---
apiVersion: v1
kind: Service
metadata:
  name: circe-proxy
  namespace: network
spec:
  type: ExternalName
  externalName: circe.manor

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: &app circe-proxy
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: internal
  tls:
    - hosts:
        - &host "circe.${SECRET_DOMAIN}"
      secretName: ${SECRET_DOMAIN/./-}-tls
  rules:
    - host: *host
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: *app
                port:
                  number: 8006
---
# Gateway API: Circe (Proxmox) self-signed HTTPS upstream
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: circe-proxy
  namespace: network
spec:
  endpoints:
    - fqdn:
        hostname: circe.manor
        port: 8006
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: circe-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["circe.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: circe-proxy
