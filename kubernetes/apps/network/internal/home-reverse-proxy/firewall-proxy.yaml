---
apiVersion: v1
kind: Service
metadata:
  name: firewall-proxy
  namespace: network
spec:
  type: ExternalName
  externalName: firewall.manor

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: &app firewall-proxy
  annotations:
    external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: internal
  tls:
    - hosts:
        - &host "firewall.${SECRET_DOMAIN}"
      secretName: ${SECRET_DOMAIN/./-}-tls
  rules:
    - host: *host
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: *app
                port:
                  number: 8443
---
# Gateway API: route to the self-signed HTTPS upstream via an EG Backend
# (insecureSkipVerify mirrors nginx backend-protocol: HTTPS without verification).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: firewall-proxy
  namespace: network
spec:
  endpoints:
    - fqdn:
        hostname: firewall.manor
        port: 8443
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: firewall-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["firewall.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: firewall-proxy
