---
apiVersion: v1
kind: Service
metadata:
  name: used-nas-proxy
  namespace: network
spec:
  type: ExternalName
  externalName: openmediavault-used.manor

---
# Gateway API: used-nas (OpenMediaVault) plain-HTTP upstream via EG Backend
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: used-nas-proxy
  namespace: network
spec:
  endpoints:
    - fqdn:
        hostname: openmediavault-used.manor
        port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: used-nas-proxy
  namespace: network
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["used.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: used-nas-proxy
