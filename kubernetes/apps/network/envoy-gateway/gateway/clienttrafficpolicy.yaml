---
# Adds HSTS to every response from the external Gateway (restores what the old
# nginx force-ssl-redirect did). Tells browsers to ALWAYS use https for these
# hosts, so they never try http first — fixes the mobile "not a secure
# connection" symptom on vaultwarden and other secure-context apps.
# No "preload" on purpose (preload is a hard-to-undo public-list commitment).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: external-hsts
  namespace: network
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
  headers:
    lateResponseHeaders:
      set:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains"
