---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  namespace: network
spec:
  gatewayClassName: envoy
  infrastructure:
    # Cilium LB-IPAM pins this VIP onto the managed Envoy LoadBalancer Service
    annotations:
      lbipam.cilium.io/ips: "${INTERNAL_VIP_GATEWAY}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-main
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-media
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_MEDIA}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_MEDIA/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-personal
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_PERSONAL}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_PERSONAL/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-diving
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_DIVING}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_DIVING/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-wife
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_WIFE}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_WIFE/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
