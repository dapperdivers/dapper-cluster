---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  namespace: network
  labels:
    # external-dns --gateway-label-filter targets this so only external-Gateway
    # HTTPRoutes are published to public (Cloudflare) DNS.
    external-dns: "true"
  annotations:
    # external-dns (gateway-httproute source) derives the record TARGET from the
    # Gateway, not per-route. Point all external routes at the Cloudflare Tunnel
    # (proxied CNAME) — same endpoint cloudflared serves. A private VIP target is
    # rejected by Cloudflare for proxied records.
    external-dns.alpha.kubernetes.io/target: "${SECRET_CLOUDFLARE_TUNNEL_ID}.cfargotunnel.com"
    # gatus-sidecar base config inherited by every HTTPRoute on this Gateway:
    # a real HTTP probe (200) resolved via Cloudflare, grouped "external".
    gatus.home-operations.com/endpoint: |-
      group: external
      client:
        dns-resolver: tcp://1.1.1.1:53
      alerts:
        - type: pushover
spec:
  gatewayClassName: envoy
  infrastructure:
    # Cilium LB-IPAM pins this VIP onto the managed Envoy LoadBalancer Service.
    # Public traffic actually arrives via cloudflared -> this Gateway's Service;
    # the VIP is for direct LAN access only.
    annotations:
      lbipam.cilium.io/ips: "${EXTERNAL_VIP_GATEWAY}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      # Only the in-namespace https-redirect route attaches here. Restricting to
      # Same prevents app routes (which omit sectionName) from auto-attaching to
      # :80 and bypassing the HTTPS redirect.
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-main
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-media
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_MEDIA}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_MEDIA/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-personal
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_PERSONAL}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_PERSONAL/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-diving
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_DIVING}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_DIVING/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-wife
      protocol: HTTPS
      port: 443
      hostname: "*.${SECRET_DOMAIN_WIFE}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_WIFE/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    # Apex (bare-domain) listeners — wildcard "*.domain" listeners do NOT match the
    # bare apex. Certs carry both the apex and wildcard SANs, so the same secret works.
    - name: https-apex-main
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex-media
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN_MEDIA}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_MEDIA/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex-personal
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN_PERSONAL}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_PERSONAL/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex-diving
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN_DIVING}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_DIVING/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex-wife
      protocol: HTTPS
      port: 443
      hostname: "${SECRET_DOMAIN_WIFE}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN_WIFE/./-}-tls"
      allowedRoutes:
        namespaces:
          from: All
