---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-config
  namespace: network
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        # Required for Cilium L2 announcements (matches the nginx controllers)
        patch:
          type: StrategicMerge
          value:
            spec:
              externalTrafficPolicy: Cluster
