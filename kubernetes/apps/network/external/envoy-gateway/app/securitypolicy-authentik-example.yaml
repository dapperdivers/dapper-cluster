---
# Example SecurityPolicy for Authentik SSO integration
# This is NOT applied by default - add to kustomization.yaml when ready

# Prerequisites:
# 1. Authentik deployed with Envoy outpost
# 2. Authentik outpost service: authentik-outpost.authentik.svc.cluster.local:9000
# 3. Envoy provider configured in Authentik

# Apply SSO to entire external Gateway
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authentik-gateway-sso
  namespace: gateway-system
spec:
  # Apply to the entire external Gateway
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: external-gateway
    namespace: gateway-system
  
  # External authentication via Authentik
  extAuth:
    http:
      # Authentik outpost service
      backendRef:
        name: authentik-outpost
        namespace: authentik
        port: 9000
      
      # Authentik's Envoy-specific endpoint
      path: /outpost.goauthentik.io/auth/envoy
      
      # Headers to send to Authentik (request context)
      headersToBackend:
        - header:
            name: X-Forwarded-Proto
          mode: Append
        - header:
            name: X-Forwarded-Host
          mode: Append
        - header:
            name: X-Forwarded-Uri
          mode: Append
        - header:
            name: X-Forwarded-For
          mode: Append
      
      # Headers to forward from Authentik to backend (user identity)
      headersToDownstream:
        - header:
            name: X-Auth-User
          mode: Override
        - header:
            name: X-Auth-Groups
          mode: Override
        - header:
            name: X-Auth-Email
          mode: Override
      
      # Failure mode: deny access if Authentik is unreachable
      failOpen: false
---
# Alternative: Apply SSO to specific HTTPRoute only
# Useful for protecting specific apps while leaving others public
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authentik-route-sso
  namespace: selfhosted
spec:
  # Target specific HTTPRoute
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: protected-app-route
    namespace: selfhosted
  
  extAuth:
    http:
      backendRef:
        name: authentik-outpost
        namespace: authentik
        port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - header: {name: X-Forwarded-Proto}
          mode: Append
        - header: {name: X-Forwarded-Host}
          mode: Append
      headersToDownstream:
        - header: {name: X-Auth-User}
          mode: Override
---
# Override: Disable auth for public routes
# When Gateway has SSO enabled, but specific routes should be public
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: public-route-no-auth
  namespace: selfhosted
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: resume-site  # Public resume site, no auth needed
    namespace: selfhosted
  
  # Empty extAuth disables authentication for this route
  extAuth: {}
---
# Additional SecurityPolicy features: CORS
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: api-cors-policy
  namespace: apps
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: api-route
  
  cors:
    allowOrigins:
      - "https://app.${SECRET_DOMAIN_PERSONAL}"
      - "https://www.${SECRET_DOMAIN_PERSONAL}"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
    allowHeaders:
      - "Content-Type"
      - "Authorization"
    exposeHeaders:
      - "X-Custom-Header"
    maxAge: 86400
