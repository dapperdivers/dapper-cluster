---
# HTTPRoute for derekmackley.com resume site
# Replaces the existing Ingress resource
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: resume-site
  namespace: selfhosted
  annotations:
    # external-dns will create DNS records for these hostnames
    external-dns.alpha.kubernetes.io/hostname: "${SECRET_DOMAIN_PERSONAL},www.${SECRET_DOMAIN_PERSONAL},resume.${SECRET_DOMAIN_PERSONAL}"
spec:
  # Attach to the external gateway's HTTPS listener
  parentRefs:
    - name: external-gateway
      namespace: gateway-system
      sectionName: https
  
  # Handle multiple hostnames (apex, www, resume subdomain)
  hostnames:
    - "${SECRET_DOMAIN_PERSONAL}"
    - "www.${SECRET_DOMAIN_PERSONAL}"
    - "resume.${SECRET_DOMAIN_PERSONAL}"
  
  rules:
    # Route all paths to the resume service
    - matches:
        - path:
            type: PathPrefix
            value: /
      
      backendRefs:
        - name: resume
          namespace: selfhosted
          port: 8080
      
      # Optional: Add security headers
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: X-Frame-Options
                value: DENY
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Referrer-Policy
                value: strict-origin-when-cross-origin
