---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  # Force reconciliation after rollback stall (2026-02-20)
  suspend: false
  values:
    fullnameOverride: *app
    provider: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-secret
            key: api-token
    interval: 5m
    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --cloudflare-proxied
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --events
      - --ignore-ingress-tls-spec
      - --ingress-class=external
      # Only publish HTTPRoutes attached to the external Gateway (labeled
      # external-dns=true); internal-Gateway routes stay off public DNS.
      - --gateway-label-filter=external-dns=true
    policy: sync
    # Dual-source during cutover: ingress (legacy) + gateway-httproute (new).
    # Once external apps' ingress blocks are removed, drop "ingress".
    sources: ["crd", "ingress", "gateway-httproute"]
    txtPrefix: k8s.
    txtOwnerId: default
    domainFilters: ["${SECRET_DOMAIN}","${SECRET_DOMAIN_MEDIA}","${SECRET_DOMAIN_PERSONAL}","${SECRET_DOMAIN_DIVING}","${SECRET_DOMAIN_WIFE}"]
    serviceMonitor:
      enabled: true
    podAnnotations:
      reloader.stakater.com/auto: "true"
