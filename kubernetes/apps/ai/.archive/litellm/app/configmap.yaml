---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Local-only: routes all requests to Ollama Qwen3 30B MoE
    # No database — static config, no spend tracking

    model_list:
      # Primary local model - Qwen3 30B MoE (3B active per token)
      - model_name: local/qwen3-30b
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Local Qwen3 30B MoE - reasoning + coding + general"
          max_tokens: 32768

      # Aliased routing — catch common model names
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434

      - model_name: gpt-4
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434

      # Anthropic-compatible aliases (for pi-knight SDK)
      - model_name: claude-3-5-sonnet-20241022
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434

      - model_name: claude-sonnet-4-20250514
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434

      # Pi-knight custom model fallback (openai-completions API)
      - model_name: local-qwen3-30b
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 120
      retry_after: 5

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    litellm_settings:
      set_verbose: false
      json_logs: true
      request_timeout: 600
      drop_params: true
      cache: true
      cache_params:
        type: redis
        host: dragonfly.database.svc.cluster.local
        port: 6379
