---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app speaches
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: storage
    - name: nvidia-device-plugin
      namespace: kube-system
  values:
    controllers:
      speaches:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/speaches-ai/speaches
              tag: 0.8.3-cuda-12.6.3
            env:
              TZ: ${TIME_ZONE}
              # Use default to let CTranslate2 choose the best compute type for the GPU
              WHISPER__COMPUTE_TYPE: default
              WHISPER__INFERENCE_DEVICE: cuda
              # Keep whisper model loaded in memory indefinitely (-1 = never unload)
              WHISPER__TTL: "-1"
              # Preload STT (Whisper) and TTS (Kokoro) models at startup
              PRELOAD_MODELS: '["deepdml/faster-whisper-large-v3-turbo-ct2", "speaches-ai/Kokoro-82M-v1.0-ONNX"]'
              # Disable UI to reduce overhead
              ENABLE_UI: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                memory: 8Gi
                nvidia.com/gpu: 1
    defaultPodOptions:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.feature.node.kubernetes.io/gpu: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.feature.node.kubernetes.io/gpu
                    operator: In
                    values:
                      - "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["speaches.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
        # STT transcription of longer audio can run well past Envoy's ~15s
        # default route timeout, which otherwise returns "upstream request
        # timeout" mid-request.
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
            timeouts:
              request: 300s
              backendRequest: 300s
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /home/ubuntu/.cache/huggingface/hub
      cache:
        type: emptyDir
        globalMounts:
          - path: /.cache
