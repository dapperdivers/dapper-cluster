---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: litellm-secret
    template:
      engineVersion: v2
      data:
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        REDIS_URL: redis://dragonfly.database.svc.cluster.local
  dataFrom:
    - find:
        name:
          regexp: ^LITELLM_MASTER_KEY$
---
# Postgres secret — uses infisical-postgres store which reads from /Infrastructure/Postgres
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-postgres
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-postgres
  target:
    name: litellm-postgres-secret
    template:
      engineVersion: v2
      data:
        INIT_POSTGRES_HOST: "{{ .POSTGRES_SUPER_HOST_RW }}.database.svc.cluster.local"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_DBNAME: litellm
        INIT_POSTGRES_USER: "{{ .LITELLM_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .LITELLM_POSTGRES_PASSWORD }}"
        DATABASE_URL: postgresql://{{ .LITELLM_POSTGRES_USER }}:{{ .LITELLM_POSTGRES_PASSWORD }}@{{ .POSTGRES_SUPER_HOST_RW }}.database.svc.cluster.local/litellm
  dataFrom:
    - find:
        name:
          regexp: ^LITELLM.*
    - find:
        name:
          regexp: ^POSTGRES_SUPER.*
