---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Local-only: routes all requests to Ollama Qwen3 30B MoE

    model_list:
      # Primary local model - Qwen3 30B MoE (3B active per token)
      - model_name: local/qwen3-30b
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Local Qwen3 30B MoE - reasoning + coding + general"
          max_tokens: 32768

      # Aliased routing — catch common model names
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Alias → local Qwen3 30B MoE"

      - model_name: gpt-4
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Alias → local Qwen3 30B MoE"

      # Anthropic-compatible aliases (for pi-knight SDK)
      - model_name: claude-3-5-sonnet-20241022
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Alias → local Qwen3 30B MoE"

      - model_name: claude-sonnet-4-20250514
        litellm_params:
          model: ollama/qwen3:30b
          api_base: http://ollama.ai.svc.cluster.local:11434
        model_info:
          description: "Alias → local Qwen3 30B MoE"

    # Router settings
    router_settings:
      routing_strategy: least-busy
      enable_pre_call_checks: true
      num_retries: 2
      timeout: 120
      retry_after: 5

    # General settings
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    # Logging
    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      service_callback: ["prometheus"]
      cache: true
      cache_params:
        type: redis
        host: dragonfly.database.svc.cluster.local
        port: 6379
