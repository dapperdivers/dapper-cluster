---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Tiered routing: local Ollama → cheap cloud → premium Anthropic
    # No database — static config, Redis caching only

    model_list:
      # ── Tier 1: Local (Free) ──────────────────────────────────────
      # Gemma 4 26B A4B MoE — primary local model on 2x P100
      - model_name: local/gemma4-26b
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 600
          extra_body:
            think: false
        model_info:
          description: "Local Gemma 4 26B A4B MoE — 3x P100 GPUs, 256K context"

      # Gemma 4 E4B — fast local fallback for simple tasks
      - model_name: local/gemma4-e4b
        litellm_params:
          model: ollama/gemma4:e4b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 120
          extra_body:
            think: false
        model_info:
          description: "Local Gemma 4 E4B — lightweight, single GPU"

      # ── Tier 2: Catch-all aliases → local ─────────────────────────
      # Route common model names to local Gemma for cost savings
      - model_name: gpt-3.5-turbo
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 300
          extra_body:
            think: false

      - model_name: gpt-4
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 300
          extra_body:
            think: false

      # Pi-knight SDK model aliases
      - model_name: claude-3-5-sonnet-20241022
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 300
          extra_body:
            think: false

      - model_name: claude-sonnet-4-20250514
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 300
          extra_body:
            think: false

      # ── Tier 3: Anthropic Cloud (Paid) ────────────────────────────
      # Real Anthropic models for production use via LiteLLM tracking
      - model_name: anthropic/claude-sonnet-4-5
        litellm_params:
          model: anthropic/claude-sonnet-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600
        model_info:
          mode: chat
          supports_vision: true
          supports_function_calling: true

      - model_name: anthropic/claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600
        model_info:
          mode: chat
          supports_vision: true
          supports_function_calling: true

      - model_name: anthropic/claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 300
        model_info:
          mode: chat
          supports_function_calling: true

      # Short aliases for common use
      - model_name: sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600

      - model_name: opus
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600

      - model_name: haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 300

      # ── Squire Model Aliases ──────────────────────────────────────
      # Used by Squire for escalation paths
      - model_name: gemma-local
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 600
          extra_body:
            think: false
        model_info:
          description: "Squire alias for local Gemma"

      - model_name: openai/gemma-local
        litellm_params:
          model: ollama/gemma4:26b
          api_base: http://ollama.ai.svc.cluster.local:11434
          timeout: 600
          extra_body:
            think: false
        model_info:
          description: "OpenAI-compatible alias for local Gemma"

      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 300
        model_info:
          mode: chat
          supports_function_calling: true

      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600
        model_info:
          mode: chat
          supports_vision: true
          supports_function_calling: true

      - model_name: claude-opus
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          timeout: 600
        model_info:
          mode: chat
          supports_vision: true
          supports_function_calling: true

      # ── Smart Router Models ──────────────────────────────────────────────────
      # Cost-optimized routing with automatic fallbacks

      # Smart: General purpose (knights)
      # Tier 1: Gemma (free) → Tier 2: Haiku ($1/$5) → Tier 3: Sonnet ($3/$15)
      # DISABLED: LiteLLM v1.82.3 has bug with router models - crashes after loading
      # TODO: Re-enable after LiteLLM upgrade or use simple alias instead
      # - model_name: smart
      #   litellm_params:
      #     model_list:
      #       - model_name: ollama/gemma4:26b
      #         litellm_params:
      #           model: ollama/gemma4:26b
      #           api_base: http://ollama.ai.svc.cluster.local:11434
      #           timeout: 120
      #       - model_name: anthropic/claude-haiku-4-5
      #         litellm_params:
      #           model: anthropic/claude-haiku-4-5
      #           api_key: os.environ/ANTHROPIC_API_KEY
      #           timeout: 300
      #       - model_name: anthropic/claude-sonnet-4-5
      #         litellm_params:
      #           model: anthropic/claude-sonnet-4-5
      #           api_key: os.environ/ANTHROPIC_API_KEY
      #           timeout: 600
      #   router_settings:
      #     routing_strategy: cost-based-routing
      #     num_retries: 2
      #     timeout: 600
      #     allowed_fails: 2
      #   model_info:
      #     description: "Smart router: Gemma (free) → Haiku (cheap) → Sonnet (premium)"

      # Tim: OpenClaw assistant (more aggressive, starts at Haiku)
      # Tier 1: Haiku ($1/$5) → Tier 2: Sonnet ($3/$15) → Tier 3: Opus ($15/$75)
      # DISABLED: LiteLLM v1.82.3 crashes on router models as last item in list
      # TODO: Re-enable after LiteLLM upgrade or move before 'smart'
      # - model_name: tim
      #   litellm_params:
      #     model_list:
      #       - model_name: anthropic/claude-haiku-4-5
      #         litellm_params:
      #           model: anthropic/claude-haiku-4-5
      #           api_key: os.environ/ANTHROPIC_API_KEY
      #           timeout: 300
      #       - model_name: anthropic/claude-sonnet-4-5
      #         litellm_params:
      #           model: anthropic/claude-sonnet-4-5
      #           api_key: os.environ/ANTHROPIC_API_KEY
      #           timeout: 600
      #       - model_name: anthropic/claude-opus-4-6
      #         litellm_params:
      #           model: anthropic/claude-opus-4-6
      #           api_key: os.environ/ANTHROPIC_API_KEY
      #           timeout: 600
      #   router_settings:
      #     routing_strategy: cost-based-routing
      #     num_retries: 2
      #     timeout: 600
      #     allowed_fails: 2
      #   model_info:
      #     description: "Tim router: Haiku (fast) → Sonnet (balanced) → Opus (big guns)"

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 300
      retry_after: 5

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    litellm_settings:
      set_verbose: false
      json_logs: true
      request_timeout: 600
      drop_params: true
      cache: true
      cache_params:
        type: redis
        host: dragonfly.database.svc.cluster.local
        port: 6379
