---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cliproxy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      cliproxy:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        initContainers:
          inject-tokens:
            image:
              repository: docker.io/library/busybox
              tag: "1.37.0"
            command:
              - /bin/sh
              - -c
              - |
                inject() {
                  local fname
                  fname=$(printenv "CLIPROXY_${1}_FILENAME" 2>/dev/null || true)
                  if [ -n "$fname" ]; then
                    printenv "CLIPROXY_${1}_TOKEN" > "/auth/$fname"
                    echo "Injected $1 token as $fname"
                  fi
                }
                inject CLAUDE
                inject CODEX
                inject GEMINI
            envFrom:
              - secretRef:
                  name: cliproxy-secret
        containers:
          app:
            image:
              repository: docker.io/eceasy/cli-proxy-api
              tag: "latest"
            ports:
              - name: http
                containerPort: &port 8317
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: cliproxy
        ports:
          http:
            port: *port

    ingress:
      app:
        className: internal
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hosts:
          - host: &host cliproxy.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ${SECRET_DOMAIN/./-}-tls

    persistence:
      config:
        type: secret
        name: cliproxy-secret
        advancedMounts:
          cliproxy:
            app:
              - path: /CLIProxyAPI/config.yaml
                subPath: config.yaml
                readOnly: true
      auth:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          cliproxy:
            inject-tokens:
              - path: /auth
            app:
              - path: /auth
