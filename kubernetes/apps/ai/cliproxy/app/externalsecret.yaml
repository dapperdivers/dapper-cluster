---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cliproxy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cliproxy-secret
    template:
      engineVersion: v2
      data:
        # Full config.yaml — sensitive fields baked in from Infisical.
        # Non-sensitive settings live here in plain sight; only api-keys and
        # remote-management.secret-key need to come from secrets.
        config.yaml: |
          host: ""
          port: 8317
          auth-dir: "/auth"
          debug: false
          api-keys:
            - "{{ .CLIPROXY_API_KEY }}"
          remote-management:
            allow-remote: true
            secret-key: "{{ .CLIPROXY_MANAGEMENT_KEY }}"
          routing:
            strategy: round-robin
          request-retry: 3

        # ── OAuth token injection ──────────────────────────────────────────
        # These are written to the auth PVC at pod startup by the init container.
        # Populate in Infisical after running the login command for each provider.
        #
        # HOW TO GET THESE VALUES:
        #
        # 1. On your desktop, auth via a throw-away Docker container:
        #
        #      mkdir -p ~/.cliproxy-auth
        #      docker run -it --rm \
        #        -v "$HOME/.cliproxy-auth:/root/.cli-proxy-api" \
        #        --entrypoint /bin/sh \
        #        eceasy/cli-proxy-api:latest
        #
        # 2. Inside the container, trigger OAuth for each provider:
        #      /CLIProxyAPI/CLIProxyAPI login claude    # Claude Max
        #      /CLIProxyAPI/CLIProxyAPI login codex     # ChatGPT Plus
        #      /CLIProxyAPI/CLIProxyAPI login gemini    # Gemini Pro
        #    Each prints a browser URL — complete OAuth in your browser.
        #
        # 3. Token files appear in ~/.cliproxy-auth/ on your desktop:
        #      ls ~/.cliproxy-auth/
        #      # claude-you@example.com.json
        #      # codex-you@example.com-plus.json
        #      # gemini-you@example.com.json
        #
        # 4. Add to Infisical (repeat for CODEX and GEMINI):
        #      CLIPROXY_CLAUDE_TOKEN    = <full content of claude-*.json>
        #      CLIPROXY_CLAUDE_FILENAME = claude-you@example.com.json
        #
        # 5. Restart the pod to re-run the init container:
        #      kubectl rollout restart -n ai deployment/cliproxy
        #
        # TOKEN EXPIRY:
        #   Claude Max  — ~7 days; re-auth and update Infisical when expired
        #   Gemini      — ~1h access token, auto-refreshed while running;
        #                 the refresh token in the file is long-lived
        #   Codex/ChatGPT — varies; re-auth when 401s appear in pod logs
        CLIPROXY_CLAUDE_TOKEN: '{{ index . "CLIPROXY_CLAUDE_TOKEN" | default "" }}'
        CLIPROXY_CLAUDE_FILENAME: '{{ index . "CLIPROXY_CLAUDE_FILENAME" | default "" }}'
        CLIPROXY_CODEX_TOKEN: '{{ index . "CLIPROXY_CODEX_TOKEN" | default "" }}'
        CLIPROXY_CODEX_FILENAME: '{{ index . "CLIPROXY_CODEX_FILENAME" | default "" }}'
        CLIPROXY_GEMINI_TOKEN: '{{ index . "CLIPROXY_GEMINI_TOKEN" | default "" }}'
        CLIPROXY_GEMINI_FILENAME: '{{ index . "CLIPROXY_GEMINI_FILENAME" | default "" }}'
  dataFrom:
    - find:
        name:
          regexp: ^CLIPROXY_
