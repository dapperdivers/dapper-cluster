---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cliproxy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cliproxy-secret
    template:
      engineVersion: v2
      data:
        # Keys injected as env vars into the init container for envsubst
        CLIPROXY_API_KEY: "{{ .CLIPROXY_API_KEY }}"
        CLIPROXY_MANAGEMENT_KEY: "{{ .CLIPROXY_MANAGEMENT_KEY }}"
        # Token file injection — populated in Infisical after first auth.
        # CLIPROXY_*_TOKEN: raw JSON content of the token file from ~/.cli-proxy-api/
        # CLIPROXY_*_FILENAME: exact filename (e.g. claude-user@example.com.json)
        CLIPROXY_CLAUDE_TOKEN: "{{ .CLIPROXY_CLAUDE_TOKEN | default \"\" }}"
        CLIPROXY_CLAUDE_FILENAME: "{{ .CLIPROXY_CLAUDE_FILENAME | default \"\" }}"
        CLIPROXY_CODEX_TOKEN: "{{ .CLIPROXY_CODEX_TOKEN | default \"\" }}"
        CLIPROXY_CODEX_FILENAME: "{{ .CLIPROXY_CODEX_FILENAME | default \"\" }}"
        CLIPROXY_GEMINI_TOKEN: "{{ .CLIPROXY_GEMINI_TOKEN | default \"\" }}"
        CLIPROXY_GEMINI_FILENAME: "{{ .CLIPROXY_GEMINI_FILENAME | default \"\" }}"
  dataFrom:
    - find:
        name:
          regexp: ^CLIPROXY_
