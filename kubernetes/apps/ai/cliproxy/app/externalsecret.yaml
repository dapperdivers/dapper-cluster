---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cliproxy
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: cliproxy-secret
    template:
      engineVersion: v2
      data:
        # ── Static credentials ─────────────────────────────────────────────
        # CLIPROXY_API_KEY: any string — used by TensorZero to authenticate
        #   to CLIProxyAPI. Set the same value in TensorZero's Infisical secret.
        CLIPROXY_API_KEY: "{{ .CLIPROXY_API_KEY }}"

        # CLIPROXY_MANAGEMENT_KEY: any string — password for the management
        #   web UI at cliproxy.${SECRET_DOMAIN}/v0/management.
        CLIPROXY_MANAGEMENT_KEY: "{{ .CLIPROXY_MANAGEMENT_KEY }}"

        # ── OAuth token injection ──────────────────────────────────────────
        # Each provider needs two Infisical secrets:
        #
        #   CLIPROXY_{PROVIDER}_TOKEN    — full JSON content of the token file
        #   CLIPROXY_{PROVIDER}_FILENAME — exact filename CLIProxyAPI uses
        #
        # HOW TO GET THESE VALUES:
        #
        # 1. On your desktop, run CLIProxyAPI in a throw-away Docker container
        #    with a volume for the auth directory:
        #
        #      docker run -it --rm \
        #        -v "$HOME/.cliproxy-auth:/root/.cli-proxy-api" \
        #        --entrypoint /bin/sh \
        #        eceasy/cli-proxy-api:latest
        #
        # 2. Inside the container, start the server once so it registers its
        #    OAuth endpoints, then trigger the login for each provider:
        #      For Claude Max:      /CLIProxyAPI/CLIProxyAPI login claude
        #      For ChatGPT (Codex): /CLIProxyAPI/CLIProxyAPI login codex
        #      For Gemini:          /CLIProxyAPI/CLIProxyAPI login gemini
        #    Each opens a browser OAuth URL — complete the login in your browser.
        #
        # 3. After auth, token files appear in $HOME/.cliproxy-auth/ on your
        #    desktop (the mounted volume). List them:
        #      ls $HOME/.cliproxy-auth/
        #    You'll see files like:
        #      claude-user@example.com.json
        #      codex-user@example.com-plus.json
        #      gemini-user@example.com.json
        #
        # 4. For each file, store in Infisical:
        #      CLIPROXY_CLAUDE_TOKEN    = $(cat $HOME/.cliproxy-auth/claude-*.json)
        #      CLIPROXY_CLAUDE_FILENAME = claude-user@example.com.json
        #    (repeat for CODEX and GEMINI)
        #
        # 5. Bounce the cliproxy pod to re-run the init container:
        #      kubectl rollout restart -n ai deployment/cliproxy
        #
        # TOKEN EXPIRY:
        #   Claude Max: ~7 days — re-auth and update Infisical when expired
        #   Gemini:     ~1 hour access token, auto-refreshed while pod is running;
        #               on pod restart the refresh token in the file is used to
        #               get a new access token automatically
        #   Codex/ChatGPT: varies — re-auth when you see 401s in cliproxy logs

        CLIPROXY_CLAUDE_TOKEN: '{{ index . "CLIPROXY_CLAUDE_TOKEN" | default "" }}'
        CLIPROXY_CLAUDE_FILENAME: '{{ index . "CLIPROXY_CLAUDE_FILENAME" | default "" }}'
        CLIPROXY_CODEX_TOKEN: '{{ index . "CLIPROXY_CODEX_TOKEN" | default "" }}'
        CLIPROXY_CODEX_FILENAME: '{{ index . "CLIPROXY_CODEX_FILENAME" | default "" }}'
        CLIPROXY_GEMINI_TOKEN: '{{ index . "CLIPROXY_GEMINI_TOKEN" | default "" }}'
        CLIPROXY_GEMINI_FILENAME: '{{ index . "CLIPROXY_GEMINI_FILENAME" | default "" }}'
  dataFrom:
    - find:
        name:
          regexp: ^CLIPROXY_
