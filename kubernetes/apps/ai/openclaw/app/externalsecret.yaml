---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: molt
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: molt-secret
    template:
      engineVersion: v2
      data:
        # Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ANTHROPIC_API_KEY: "{{ .OPENCLAW_ANTHROPIC_API_KEY }}"
        # Home Assistant token for ha-mcp sidecar
        HOMEASSISTANT_TOKEN: "{{ .MOLT_HOMEASSISTANT_TOKEN }}"
        # Chelonian Labs GitHub access
        GH_TOKEN_CHELONIANLABS: "{{ .CHELONIANLABS_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^OPENCLAW.*
    - find:
        name:
          regexp: ^MOLT.*
    - find:
        name:
          regexp: ^CHELONIANLABS.*
