# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: molt
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: molt-secret
    template:
      engineVersion: v2
      data:
        # Gateway token for authentication
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ANTHROPIC_API_KEY: "{{ .OPENCLAW_ANTHROPIC_API_KEY }}"
        # OpenRouter key — read natively by the bundled openrouter provider plugin
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        # Home Assistant token for ha-mcp sidecar
        HOMEASSISTANT_TOKEN: "{{ .MOLT_HOMEASSISTANT_TOKEN }}"
        # Chelonian Labs GitHub access
        GH_TOKEN_CHELONIANLABS: "{{ .CHELONIANLABS_GITHUB_TOKEN }}"
        GH_TOKEN_PROJECTS: "{{ .MOLT_PROJECTS_GITHUB_TOKEN }}"
        GH_TOKEN_ROUNDTABLE: "{{ .MOLT_ROUNDTABLE_GITHUB_TOKEN }}"
        # Discord bot token (openclaw reads DISCORD_BOT_TOKEN natively)
        DISCORD_BOT_TOKEN: "{{ .MOLT_DISCORD_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^OPENCLAW.*
    - find:
        name:
          regexp: ^MOLT.*
    - find:
        name:
          regexp: ^CHELONIANLABS.*
    - find:
        name:
          regexp: ^OPENROUTER.*
