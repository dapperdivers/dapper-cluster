---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: molt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      molt:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-tools:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /home/node/.local/bin /home/node/.local/go

                echo "Starting tool installation..."

                # Install gh CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /home/node/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                # Install Go if not present on PVC
                if [ ! -f /home/node/.local/go/bin/go ] || ! /home/node/.local/go/bin/go version 2>/dev/null | grep -q "go1.24"; then
                  echo "Installing Go 1.24.1..."
                  rm -rf /home/node/.local/go
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.24.1.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz -C /home/node/.local/
                  rm -rf go.tar.gz
                fi

                # Install Homebrew if not present on PVC
                if [ ! -f /home/node/.local/homebrew/bin/brew ]; then
                  echo "Installing Homebrew..."
                  export HOMEBREW_PREFIX=/home/node/.local/homebrew
                  export HOMEBREW_CELLAR=/home/node/.local/homebrew/Cellar
                  export HOMEBREW_REPOSITORY=/home/node/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  cd /tmp
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                # Check if pip is available (either standalone or via python3 -m pip)
                set +e  # Don't fail on pip errors
                if command -v pip3 >/dev/null 2>&1 || command -v pip >/dev/null 2>&1 || python3 -m pip --version >/dev/null 2>&1; then
                  echo "pip is available"
                else
                  echo "Installing pip..."
                  cd /tmp
                  curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
                  python3 get-pip.py --user --no-warn-script-location --break-system-packages || \
                  python3 get-pip.py --user --no-warn-script-location || \
                  echo "pip install skipped (use python3 -m pip instead)"
                  rm -f get-pip.py
                fi
                set -e  # Re-enable error checking

                # Install bun if not present on PVC
                if [ ! -f /home/node/.local/bin/bun ]; then
                  echo "Installing bun..."
                  curl -fsSL https://bun.sh/install | BUN_INSTALL=/home/node/.local bash
                fi

                # Install QMD if not present on PVC
                if [ ! -f /home/node/.local/bin/qmd ]; then
                  echo "Installing QMD..."
                  /home/node/.local/bin/bun install -g @tobilu/qmd
                fi

                # Pre-pull QMD's GGUF models (embed + reranker + 1.7B query-expansion,
                # ~2.3GB total) into the shared cache. The 'qmd query' pipeline that
                # backs memory_search downloads these on first use; on a fresh PVC that
                # download blows past the 15s search timeout and trips the active-memory
                # circuit breaker. Pre-pulling here makes memory search work immediately.
                # Guarded on the reranker file so it's a no-op once the cache is warm.
                if [ ! -f /home/node/.cache/qmd/models/hf_ggml-org_qwen3-reranker-0.6b-q8_0.gguf ]; then
                  echo "Pre-pulling QMD models..."
                  node -e "import('/home/node/.local/node_modules/@tobilu/qmd/dist/llm.js').then(async m => { const r = await m.pullModels([m.DEFAULT_EMBED_MODEL_URI, m.DEFAULT_RERANK_MODEL_URI, m.DEFAULT_GENERATE_MODEL_URI], {}); console.log('QMD models ready:', r.map(x => x.path).join(', ')); }).catch(e => { console.error('QMD model pre-pull failed (non-fatal):', e && e.message); })" || echo "QMD pre-pull skipped"
                fi

                # Install Claude CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/claude ]; then
                  echo "Installing Claude CLI..."
                  npm install --prefix /home/node/.local @anthropic-ai/claude-code
                  ln -sf /home/node/.local/node_modules/.bin/claude /home/node/.local/bin/claude
                fi

                ln -sf /app/openclaw.mjs /home/node/.local/bin/openclaw
                mkdir -p /home/node/.openclaw

                # Register the Discord channel plugin on EVERY boot. openclaw
                # needs an install record even for image-bundled plugins; raw
                # @openclaw/* specs resolve to the bundled copy (no npm fetch).
                # Running unconditionally (no marker guard) re-syncs the plugin
                # to each new image's bundled version — a once-guarded install
                # left a stale 2026.5.20 copy shadowing the 2026.6.5 core,
                # which broke Discord delivery.
                set +e
                openclaw plugins install @openclaw/discord
                # install alone does NOT re-sync an npm-installed copy to the
                # bundled version (drifted to 2026.6.5 against a 2026.6.11
                # gateway) — update does.
                openclaw plugins update discord
                # web search: tools.web.search.provider=searxng is set on the
                # PVC config, but since ~2026.6 searxng is an external plugin;
                # without it web_search silently falls back.
                openclaw plugins install @openclaw/searxng-plugin
                set -e

                echo "Tool installation complete"
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi
            env:
              HOME: /home/node
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              BUN_INSTALL: /home/node/.local
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.7.1@sha256:6a31d44b2944e7adcd2b582bf6fb463111264ebca97a0201795b799135bd102c
            command:
              - /bin/sh
              - -c
              - |
                # Let OpenClaw own the evolving base config, then apply a thin patch layer.
                # This avoids a stale fully-managed config as OpenClaw versions change.
                if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                  openclaw onboard --help >/dev/null 2>&1 || true
                fi

                node -e "
                  const fs = require('fs');
                  const p = '/home/node/.openclaw/openclaw.json';
                  const c = fs.existsSync(p) ? JSON.parse(fs.readFileSync(p)) : {};

                  c.gateway = c.gateway || {};
                  c.gateway.controlUi = c.gateway.controlUi || {};
                  c.gateway.controlUi.allowedOrigins = ['https://molt.${SECRET_DOMAIN}'];

                  c.auth = c.auth || {};
                  c.auth.profiles = c.auth.profiles || {};
                  delete c.auth.profiles['anthropic:default'];
                  delete c.auth.profiles['anthropic:manual'];
                  c.auth.profiles['openai-codex:default'] = {provider:'openai-codex',mode:'oauth'};
                  c.auth.profiles['openai-codex:manual'] = {provider:'openai-codex',mode:'oauth'};

                  c.memory = c.memory || {};
                  c.memory.backend = 'qmd';
                  c.memory.qmd = c.memory.qmd || {};
                  c.memory.qmd.includeDefaultMemory = true;
                  c.memory.qmd.update = c.memory.qmd.update || {};
                  c.memory.qmd.update.embedTimeoutMs = 600000;
                  c.memory.qmd.paths = c.memory.qmd.paths || [];
                  const vaultPath = '/home/node/obsidian-vault';
                  if (!c.memory.qmd.paths.some(p2 => p2.path === vaultPath)) {
                    c.memory.qmd.paths.push({path: vaultPath, name: 'vault'});
                  }

                  // active-memory runs a blocking memory sub-agent before replies.
                  // Its search timeout defaults to 15s; on CPU, QMD's query pipeline
                  // cold-loads 3 GGUF models (embed + reranker + 1.7B expansion) and
                  // reranks candidates — a cold run can take well over a minute. After
                  // 3 consecutive timeouts a circuit breaker DISABLES memory search
                  // entirely ('Memory search is disabled/unavailable'). Raise the
                  // timeout to the 120s max and give the breaker more tolerance so a
                  // cold warm-up after a restart doesn't permanently trip it. The real
                  // latency fix is running QMD on GPU (blocked: Pascal P100 + the
                  // node-llama-cpp CUDA 13 build that dropped sm_60 — see ollama notes).
                  c.plugins = c.plugins || {};
                  c.plugins.entries = c.plugins.entries || {};
                  // plugins.allow is a non-empty exclusive allowlist on the PVC;
                  // configuring active-memory without allowlisting it left the
                  // plugin silently disabled and this whole block inert.
                  c.plugins.allow = Array.isArray(c.plugins.allow) ? c.plugins.allow : [];
                  if (!c.plugins.allow.includes('active-memory')) c.plugins.allow.push('active-memory');
                  c.plugins.entries['active-memory'] = c.plugins.entries['active-memory'] || { enabled: true, config: {} };
                  c.plugins.entries['active-memory'].config = c.plugins.entries['active-memory'].config || {};
                  c.plugins.entries['active-memory'].config.timeoutMs = 120000;
                  c.plugins.entries['active-memory'].config.circuitBreakerMaxTimeouts = 5;

                  c.models = c.models || {};
                  c.models.providers = c.models.providers || {};
                  c.models.providers.ollama = c.models.providers.ollama || {
                    baseUrl: 'http://ollama.ai.svc.cluster.local:11434',
                    apiKey: 'ollama-local',
                    api: 'ollama',
                    models: []
                  };
                  // Single 16GB P100 (time-sliced, shared with Plex), ollama pinned to
                  // one card — one model at a time, must fit 16GB. Drop gemma4:26b (17GB,
                  // no longer fits). Context matches the server-side
                  // OLLAMA_CONTEXT_LENGTH=32768 (ollama helmreleases); 8192 was a stale
                  // client-side cap that wedged the 2h heartbeat (~28.6k-token prompt
                  // -> context-overflow loop, livenessState=blocked).
                  const models = c.models.providers.ollama.models =
                    (c.models.providers.ollama.models || []).filter(m => m.id !== 'gemma4:26b');
                  const LOCAL_CTX = 32768, LOCAL_MAXTOK = 2048;
                  const ensureModel = (id, name, reasoning) => {
                    let m = models.find(x => x.id === id);
                    if (!m) {
                      m = {
                        id,
                        name,
                        input: ['text'],
                        cost: {input: 0, output: 0, cacheRead: 0, cacheWrite: 0}
                      };
                      models.push(m);
                    }
                    m.reasoning = !!reasoning;
                    m.contextWindow = LOCAL_CTX;
                    m.maxTokens = LOCAL_MAXTOK;
                  };
                  // gpt-oss:20b (MoE ~13GB) is the free local workhorse; e4b a tiny option.
                  ensureModel('gpt-oss:20b', 'GPT-OSS 20B (Local, free)', true);
                  ensureModel('gemma4:e4b', 'Gemma 4 E4B (Local Fast)', false);

                  c.agents = c.agents || {};
                  c.agents.defaults = c.agents.defaults || {};
                  // Derek wants the main assistant to prefer his OAuth-backed
                  // OpenAI/Codex lane first, with DeepSeek as the cheaper
                  // fallback if OpenAI is unavailable. Use the allowlisted
                  // openai/gpt-5.4 model id (runtime: codex), not an
                  // openai-codex/* model string.
                  c.agents.defaults.model = {
                    primary: 'openai/gpt-5.4',
                    fallbacks: ['openrouter/deepseek/deepseek-v4-pro']
                  };
                  c.agents.defaults.subagents = c.agents.defaults.subagents || {};
                  // Keep subagents on the cheaper OpenRouter path where
                  // OpenClaw respects this override. There is a known bug where
                  // subagents can still inherit the parent primary
                  // (issues #10963/#51854), so this is best-effort rather than
                  // a hard guarantee.
                  c.agents.defaults.subagents.model = {
                    primary: 'openrouter/moonshotai/kimi-k2.6:exacto',
                    fallbacks: ['openrouter/deepseek/deepseek-v4-pro']
                  };
                  // NOTE: agents.defaults.models (the /model allowlist) is intentionally
                  // NOT managed from this patch. Setting it here clobbered live edits and
                  // the gateway reverted the patch-written version on load. It lives on the
                  // PVC and is maintained live + hot-reloaded via:
                  //   openclaw config set agents.defaults.models '{"openrouter/*":{}, ...}' --strict-json --merge
                  // Current live allowlist: openrouter/*, ollama/* wildcards + haiku/sonnet/gptoss aliases.
                  // Image/PDF tasks defaulted to openai/gpt-5.4 on the PVC — pin the
                  // cheap vision model (matches the roundtable knights) instead.
                  c.agents.defaults.imageModel = { primary: 'openrouter/google/gemini-2.5-flash' };
                  c.agents.defaults.pdfModel = { primary: 'openrouter/google/gemini-2.5-flash' };
                  // Restore the always-on typing indicator. Since ~2026.6,
                  // unmentioned group-chat turns default to typingMode
                  // 'message' (typing only once reply text starts streaming),
                  // so the indicator barely flashes. 'instant' starts typing
                  // when the turn begins (pre-2026.6 behaviour). Heartbeats
                  // are forced to 'never' regardless of this setting.
                  c.agents.defaults.typingMode = 'instant';
                  // Heartbeat runs on the FREE local model (gpt-oss:20b on the P100)
                  // every 2h — zero API cost for background check-ins. That keeps
                  // gpt-oss warm on the GPU for on-demand /model use while chat
                  // traffic uses the cloud provider chain above.
                  c.agents.defaults.heartbeat = c.agents.defaults.heartbeat || {};
                  c.agents.defaults.heartbeat.every = '2h';
                  c.agents.defaults.heartbeat.model = 'ollama/gpt-oss:20b';
                  // Named sub-agents were pinned to openai/gpt-5.4 as bare strings,
                  // which clobbers structured fallback objects. Strip that legacy pin
                  // so they inherit the default chains above instead of a single
                  // hard-coded model.
                  const orInheritAgents = ['sentinel','herald','squire','scribe','steward','artificer'];
                  if (Array.isArray(c.agents.list)) {
                    for (const a of c.agents.list) {
                      if (a && orInheritAgents.includes(a.id)) delete a.model;
                    }
                  }

                  c.agents.defaults.cliBackends = c.agents.defaults.cliBackends || {};
                  c.agents.defaults.cliBackends['claude-cli'] = {
                    command: '/home/node/.local/bin/claude'
                  };

                  c.mcp = c.mcp || {};
                  c.mcp.servers = c.mcp.servers || {};
                  c.mcp.servers['ha-mcp'] = {
                    url: 'http://localhost:8086/mcp',
                    transport: 'streamable-http'
                  };

                  // Remove secrets from config file — provided via env vars instead
                  if (c.channels && c.channels.discord) {
                    delete c.channels.discord.token;
                    // Was allowlist with an empty groupAllowFrom -> all group/server
                    // messages were silently dropped. Open group messaging.
                    c.channels.discord.groupPolicy = 'open';
                  }

                  // Remove stale whatsapp config — plugin not used
                  if (c.channels) delete c.channels.whatsapp;
                  if (c.plugins) {
                    c.plugins.allow = (c.plugins.allow || []).filter(p => p !== 'whatsapp');
                    if (c.plugins.entries) delete c.plugins.entries.whatsapp;
                  }
                  // Gateway webhooks — receiving end of the roundtable operator's
                  // completion notifications (operator posts roundtable.notify/v1
                  // to /hooks/roundtable; the mapping wakes the main session so
                  // Tim relays the result in chat). Header-only bearer auth.
                  if (process.env.MOLT_HOOKS_TOKEN) {
                    c.hooks = c.hooks || {};
                    c.hooks.enabled = true;
                    c.hooks.token = process.env.MOLT_HOOKS_TOKEN;
                    c.hooks.path = '/hooks';
                    c.hooks.mappings = Array.isArray(c.hooks.mappings) ? c.hooks.mappings : [];
                    const rtMapping = {
                      id: 'roundtable',
                      match: { path: 'roundtable' },
                      action: 'wake',
                      wakeMode: 'now',
                      textTemplate: 'Round Table {{ payload.kind }} \"{{ payload.name }}\" finished with phase {{ payload.phase }} (requested by {{ payload.context.requestedBy }}, session {{ payload.context.sessionKey }}). Output: {{ payload.output }} — full output in NATS KV if truncated. Relay the outcome to Derek in the originating conversation.'
                    };
                    const rtIdx = c.hooks.mappings.findIndex(m => m && m.id === 'roundtable');
                    if (rtIdx >= 0) c.hooks.mappings[rtIdx] = rtMapping; else c.hooks.mappings.push(rtMapping);
                  }
                  if (process.env.MOLT_GOOGLE_PLACES_API_KEY) {
                    c.skills = c.skills || {};
                    c.skills.entries = c.skills.entries || {};
                    c.skills.entries.goplaces = c.skills.entries.goplaces || {};
                    c.skills.entries.goplaces.apiKey = process.env.MOLT_GOOGLE_PLACES_API_KEY;
                    c.skills.entries['local-places'] = c.skills.entries['local-places'] || {};
                    c.skills.entries['local-places'].apiKey = process.env.MOLT_GOOGLE_PLACES_API_KEY;
                  }

                  fs.mkdirSync('/home/node/.openclaw', {recursive: true});
                  fs.writeFileSync(p, JSON.stringify(c, null, 2));
                "

                exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 2000m
                # QMD memory_search loads 3 GGUF models on CPU (embed 300M +
                # reranker 600M + 1.7B query-expansion, ~2.3GB) on top of the
                # openclaw process (~1.5GB). At 6Gi the container OOMKilled during
                # searches. Bumped to give headroom until QMD runs on GPU (blocked
                # on Pascal P100 + node-llama-cpp's CUDA 13 build — see ollama notes).
                memory: 12Gi
            env:
              TZ: ${TIME_ZONE}
              HOME: /home/node
              TERM: xterm-256color
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              GOPATH: /home/node/go
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
            envFrom:
              - secretRef:
                  name: molt-secret
          ha-mcp:
            image:
              repository: ghcr.io/homeassistant-ai/ha-mcp
              tag: 7.14.2
            args:
              - fastmcp
              - run
              - fastmcp-http.json
            env:
              TZ: ${TIME_ZONE}
              UV_NO_CACHE: "1"
              HOME: /tmp
              HOMEASSISTANT_URL: "http://home-assistant.home-automation.svc.cluster.local:8123"
              HOMEASSISTANT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: molt-secret
                    key: HOMEASSISTANT_TOKEN
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          chrome:
            image:
              repository: zenika/alpine-chrome
              tag: with-node
            command:
              - chromium-browser
              - --headless=new
              - --disable-gpu
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --no-sandbox
              - --disable-dev-shm-usage
              # Stealth flags to reduce bot detection
              - --disable-blink-features=AutomationControlled
              - --user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
            env:
              TZ: ${TIME_ZONE}
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
      syncthing:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/syncthing
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: ${TIME_ZONE}
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
        pod:
          shareProcessNamespace: false
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    defaultPodOptions:
      shareProcessNamespace: true
      # Mount the SA token so Tim's kubectl can reach the API (roundtable
      # Chains/Missions). app-template 5.x runs the pod as the auto-created
      # 'molt' SA with automount off by default; without this the token is
      # absent and kubectl falls back to localhost:8080. Pairs with the RBAC
      # bindings repointed to the 'molt' SA (rbac.yaml, molt-rbac.yaml).
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: molt
        ports:
          http:
            port: 18789
      syncthing:
        controller: syncthing
        ports:
          http:
            port: 8384
          sync:
            port: 22000
            protocol: TCP
      syncthing-lb:
        controller: syncthing
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: "10.100.0.30"
        ports:
          sync:
            port: 22000
            protocol: TCP
    route:
      app:
        hostnames: ["molt.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
      syncthing:
        hostnames: ["molt-syncthing.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: syncthing
                port: http
    persistence:
      config:
        enabled: true
        existingClaim: molt
        advancedMounts:
          molt:
            install-tools:
              - path: /home/node
            app:
              - path: /home/node
      vault:
        enabled: true
        existingClaim: molt-vault
        advancedMounts:
          molt:
            app:
              - path: /home/node/obsidian-vault
          syncthing:
            app:
              - path: /data/vault
      syncthing-config:
        enabled: true
        existingClaim: molt-syncthing-config
        advancedMounts:
          syncthing:
            app:
              - path: /config
      voice-recordings:
        enabled: true
        existingClaim: molt-voice-recordings
        advancedMounts:
          molt:
            app:
              - path: /home/node/voice-recordings
          syncthing:
            app:
              - path: /data/voice_recordings
