---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama-1
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      ollama-1:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.32.3
            env:
              TZ: ${TIME_ZONE}
              # Roundtable-knight pool member pinned to GPU 1 (by UUID).
              # One ollama per P100 because splitting a model across Pascal cards
              # crashes llama.cpp (GGML_SCHED_MAX_SPLIT_INPUTS) — see the ollama
              # (GPU 0, openclaw/molt) release for the full story. Models must
              # fit one 16GB card. Knights reach the pool members through the
              # ollama-pool Service (service.yaml), never this instance directly.
              NVIDIA_VISIBLE_DEVICES: GPU-79e61e98-91b9-7c6c-261a-ba1b8bafe6a6
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
              # Store models on PVC — critical for persistence across restarts
              OLLAMA_MODELS: /models
              # Listen on all interfaces
              OLLAMA_HOST: 0.0.0.0:11434
              # Keep models loaded — daily briefing chain, minimize cold starts
              OLLAMA_KEEP_ALIVE: 24h
              # Flash attention for faster inference (KV cache optimization)
              OLLAMA_FLASH_ATTENTION: "1"
              # KV cache quantization — Q8_0 saves ~50% KV VRAM with minimal quality loss
              OLLAMA_KV_CACHE_TYPE: q8_0
              # Parallel request handling — 1 concurrent; pooled knight requests queue FIFO
              OLLAMA_NUM_PARALLEL: "1"
              # Max loaded models — keep 1 to maximize VRAM for the primary model
              OLLAMA_MAX_LOADED_MODELS: "1"
              # Context window — knights are pi coding agents with skills/tools, so
              # their prompts run fatter than molt's chat traffic on GPU 0 (8K).
              # qwen3.5:9b is only ~5.9GB resident (256K-native hybrid attention),
              # so 32K fits with VRAM to spare on a 16GB card. Keep in sync with
              # the knights' MODEL_CONTEXT_WINDOW env and the other pool member.
              # (gpt-oss:20b, the proven fallback, stays pulled but tops out
              # around 24K here — drop this back if rolling back the model.)
              # NOTE: the env ollama actually reads is OLLAMA_CONTEXT_LENGTH —
              # OLLAMA_NUM_CTX is ignored (absent from the server config dump)
              # and the server silently falls back to its 4096 default.
              OLLAMA_CONTEXT_LENGTH: "32768"
              # No output token limit — let the model decide
              OLLAMA_NUM_PREDICT: "-1"
            ports:
              - name: http
                containerPort: &port 11434
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                # GPU-bound server — reserve only 1 core so it always fits on the
                # CPU-tight GPU node. Memory request is 16Gi (not 32Gi like the
                # GPU 0 instance): three 32Gi requests would push the node to
                # ~98% reserved. Inference lives in VRAM; host RAM can still
                # burst to the limit during model load/repack.
                cpu: 1
                memory: 16Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 16
                memory: 32Gi
                nvidia.com/gpu: 1

    defaultPodOptions:
      runtimeClassName: nvidia
      # Membership label for the ollama-pool Service (service.yaml) — the pool
      # load-balances knight traffic across all pods carrying this label.
      labels:
        ollama-pool: member
      nodeSelector:
        nvidia.feature.node.kubernetes.io/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        # Ollama requires root for NVIDIA GPU access
        runAsNonRoot: false
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: ollama-1
        ports:
          http:
            port: *port

    persistence:
      models:
        existingClaim: ollama-models-1
        globalMounts:
          - path: /models
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
