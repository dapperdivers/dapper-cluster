---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.10
            env:
              TZ: ${TIME_ZONE}
              # Pin ollama to ONE P100 (by UUID). Splitting a model across multiple
              # cards crashes llama.cpp on Pascal during the pre-load graph fit
              # (GGML_ASSERT n_inputs < GGML_SCHED_MAX_SPLIT_INPUTS) — and ollama spreads
              # across every visible GPU by default, so we expose just one. A model must
              # fit in one 16GB card. GPU 1/GPU 2 host ollama-1/ollama-2; all three
              # instances are ollama-pool members (see service.yaml) serving the
              # roundtable knights. molt stopped using local inference, so this
              # card no longer needs to be reserved for openclaw.
              NVIDIA_VISIBLE_DEVICES: GPU-093a9684-9b6e-111e-a37e-6bc4995bb37f
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
              # Store models on PVC — critical for persistence across restarts
              OLLAMA_MODELS: /models
              # Listen on all interfaces
              OLLAMA_HOST: 0.0.0.0:11434
              # Keep models loaded — single-user homelab, minimize cold starts
              OLLAMA_KEEP_ALIVE: 24h
              # Flash attention for faster inference (KV cache optimization)
              OLLAMA_FLASH_ATTENTION: "1"
              # KV cache quantization — Q8_0 saves ~50% KV VRAM with minimal quality loss
              OLLAMA_KV_CACHE_TYPE: q8_0
              # Parallel request handling — 1 concurrent (single P100 via MPS)
              OLLAMA_NUM_PARALLEL: "1"
              # Max loaded models — keep 1 to maximize VRAM for the primary model
              OLLAMA_MAX_LOADED_MODELS: "1"
              # Context window — must match the other pool members (knights send
              # 32K-window requests and any member may serve them). qwen3.5:9b is
              # ~5.9GB resident so 32K KV fits easily. Do NOT exceed VRAM: 131072
              # once forced the KV cache past 16GB and models loaded on CPU.
              # NOTE: renamed from OLLAMA_NUM_CTX, which ollama 0.30.x silently
              # ignores (absent from the server config dump) — the server was
              # actually running its 4096 default while the config said 8192.
              OLLAMA_CONTEXT_LENGTH: "32768"
              # No output token limit — let the model decide
              OLLAMA_NUM_PREDICT: "-1"
              # NOTE: OLLAMA_LLM_LIBRARY=cuda_v12 was removed — in ollama 0.30.2 this
              # legacy override suppressed GPU autodiscovery (logs showed only
              # library=cpu), forcing CPU-only inference. The image bundles both
              # cuda_v12 and cuda_v13 runners; autodiscovery picks cuda_v12 for the
              # Pascal P100 (sm_60). If a future bump regresses Pascal support, pin an
              # older ollama image that ships only CUDA 12 instead of re-adding this.
            ports:
              - name: http
                containerPort: &port 11434
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/tags
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                # GPU-bound server — reserve only 1 core so it always fits on the
                # CPU-tight GPU node (a 4-core request let jobs like kometa evict it).
                # It can still burst to the limit during model load/repack.
                cpu: 1
                memory: 32Gi
                nvidia.com/gpu: 1
              limits:
                cpu: 16
                memory: 32Gi
                nvidia.com/gpu: 1

    defaultPodOptions:
      runtimeClassName: nvidia
      # Membership label for the ollama-pool Service (service.yaml).
      labels:
        ollama-pool: member
      nodeSelector:
        nvidia.feature.node.kubernetes.io/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        # Ollama requires root for NVIDIA GPU access
        runAsNonRoot: false
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: ollama
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["ollama.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https-main

    persistence:
      models:
        existingClaim: ollama-models
        globalMounts:
          - path: /models
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
