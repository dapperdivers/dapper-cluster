# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: hermes-secret
    template:
      engineVersion: v2
      data:
        # Reuses molt's Discord bot token. CAUTION: two gateways on one
        # token both answer every message — keep this commented (hermes
        # runs Discord-less: dashboard + CLI via kubectl exec) until
        # cutover, then uncomment and scale molt down.
        # DISCORD_BOT_TOKEN: "{{ .MOLT_DISCORD_TOKEN }}"
        # OpenRouter key — same key molt uses
        OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        # Home Assistant token for the ha-mcp sidecar
        HOMEASSISTANT_TOKEN: "{{ .MOLT_HOMEASSISTANT_TOKEN }}"
        # GitHub access (carried over from molt)
        GH_TOKEN_CHELONIANLABS: "{{ .CHELONIANLABS_GITHUB_TOKEN }}"
        GH_TOKEN_PROJECTS: "{{ .MOLT_PROJECTS_GITHUB_TOKEN }}"
        GH_TOKEN_ROUNDTABLE: "{{ .MOLT_ROUNDTABLE_GITHUB_TOKEN }}"
  dataFrom:
    - find:
        name:
          regexp: ^MOLT.*
    - find:
        name:
          regexp: ^CHELONIANLABS.*
    - find:
        name:
          regexp: ^OPENROUTER.*
