---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: squire
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  
  values:
    controllers:
      squire:
        replicas: 2
        strategy: RollingUpdate
        
        containers:
          app:
            image:
              repository: ghcr.io/dapperdivers/squire
              tag: master
              pullPolicy: Always
            
            env:
              NODE_ENV: production
              SQUIRE_CONFIG: /etc/squire/squire.yaml
              LITELLM_API_KEY:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
            
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 4001
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 4001
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
    
    service:
      app:
        controller: squire
        ports:
          http:
            port: 4001
          metrics:
            port: 9090
    
    persistence:
      config:
        type: configMap
        name: squire-config
        globalMounts:
          - path: /etc/squire
            readOnly: true
      
      logs:
        type: emptyDir
        globalMounts:
          - path: /var/log/squire
