---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: squire
  namespace: ai
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      automountServiceAccountToken: false
    
    controllers:
      squire:
        replicas: 2
        strategy: RollingUpdate
        
        annotations:
          reloader.stakater.com/auto: "true"
        
        containers:
          app:
            image:
              repository: ghcr.io/dapperdivers/squire
              tag: sha-54915bb
              pullPolicy: IfNotPresent
            
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            
            env:
              NODE_ENV: production
              SQUIRE_CONFIG: /etc/squire/squire.yaml
              LITELLM_API_KEY:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
            
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 4001
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 4001
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
    
    service:
      app:
        controller: squire
        ports:
          http:
            port: 4001
          metrics:
            port: 9090
    
    persistence:
      config:
        type: configMap
        name: squire-config
        globalMounts:
          - path: /etc/squire
            readOnly: true
      
      logs:
        type: emptyDir
        globalMounts:
          - path: /var/log/squire
