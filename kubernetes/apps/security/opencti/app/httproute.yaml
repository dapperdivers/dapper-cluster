---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencti
  namespace: security
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https-main
  hostnames: ["opencti.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: opencti-server
          port: 80
