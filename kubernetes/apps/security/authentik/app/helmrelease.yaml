---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: 2026.5.3
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
      interval: 10m
  values:
    # Declarative Authentik config delivered to the worker. Keys ending in .yaml
    # inside this ConfigMap are discovered + applied as blueprints.
    blueprints:
      configMaps:
        - authentik-blueprints # forward-auth proxy providers + apps + outpost
        - authentik-oidc # native-OIDC providers + apps
    global:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      deploymentStrategy:
        type: RollingUpdate
      envFrom:
        - secretRef:
            name: &secret authentik-secret
        - secretRef:
            name: &secret-postgres authentik-postgres-secret
      volumes:
        - name: authentik-media
          persistentVolumeClaim:
            claimName: authentik-media-cephfs
    geoip:
      enabled: false
      existingSecret:
        secretName: geoip-secret
        accountId: maxmindAccountId
        licenseKey: maxmindLicenseKey
    authentik:
      email:
        host: smtp-relay.network.svc.cluster.local
        from: authentik@${SECRET_DOMAIN}
        port: 25
        use_tls: false
      redis:
        host: dragonfly.database.svc.cluster.local
        db: 1
        port: 6379
    server:
      # HA: a single replica made every gunicorn worker-recycle / slow boot a
      # user-visible stall — Envoy "upstream request timeout" + flaky OIDC 401s
      # (a ~60s auth code expiring mid-stall). Two replicas + a PDB keep sso up
      # through recycles, rollouts, and node drains.
      replicas: 2
      pdb:
        enabled: true
        minAvailable: 1
      resources:
        requests:
          cpu: 200m
          memory: 768Mi
        # memory cap only — NO cpu limit on purpose: a cpu limit would reintroduce
        # throttling during slow boots/bursts (the very stalls we're fixing).
        limits:
          memory: 1536Mi
      # gunicorn server boot has been observed up to ~60s; tolerate slow starts
      # (~240s) so a fresh replica isn't killed mid-boot into a crashloop.
      startupProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 24
      podSecurityContext:
        fsGroup: 150
      securityContext:
        runAsUser: 1000
        runAsGroup: 150
      volumeMounts:
        - mountPath: /media
          name: authentik-media
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
          envFrom:
            - secretRef:
                name: *secret-postgres
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    worker:
      replicas: 1
      # Increase probe timeouts - worker takes ~90s to start
      livenessProbe:
        initialDelaySeconds: 120
        periodSeconds: 30
        timeoutSeconds: 30
        failureThreshold: 5
      readinessProbe:
        initialDelaySeconds: 120
        periodSeconds: 30
        timeoutSeconds: 30
        failureThreshold: 5
      startupProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 30
        failureThreshold: 30
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 750m
          memory: 1Gi
    postgresql:
      enabled: false
    redis:
      enabled: false
    prometheus:
      rules:
        enabled: true #
