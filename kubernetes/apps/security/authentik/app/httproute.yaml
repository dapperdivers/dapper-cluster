---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-server
  namespace: security
spec:
  parentRefs:
    - name: internal
      namespace: network
  hostnames: ["sso.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
