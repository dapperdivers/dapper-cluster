---
# Native-OIDC apps (the app is the OAuth client; NO forward-auth annotation on the route).
# Separate ConfigMap from forward-auth — added to the chart's blueprints.configMaps list.
#
# Adoption model: identifiers match the existing provider name / app slug, taking over in
# place. client_id/client_secret are intentionally OMITTED so adoption PRESERVES the live
# credentials (which already match each app's Infisical value, so logins never break). The
# blueprint owns all non-secret config. DR caveat: re-enter the 3 client secrets once on a
# from-scratch rebuild (or wire !Env later).
#
# More DR caveats:
# - `!Find [authentik_core.user, [username, mackleyder]]` group entries fail on a
#   from-scratch rebuild until that account exists — create the user first, then re-apply.
# - Group `users:` lists here are AUTHORITATIVE: members added via the UI are removed on
#   the next blueprint apply. Grant membership in git, not clickops (kubernetes-viewers
#   deliberately has no attrs, so UI-added members there survive).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-oidc
  namespace: security
data:
  oidc.yaml: |
    version: 1
    metadata:
      name: oidc-apps
    context:
      oidc_defaults: &oidc
        client_type: confidential
        # Blueprint-created oauth2 providers default grant_types to [] (rejects all
        # grants -> "Invalid grant_type"). Must set it explicitly.
        grant_types: [authorization_code, refresh_token]
        sub_mode: hashed_user_id
        include_claims_in_id_token: true
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
    entries:
      # actual — client_id/secret preserved (omitted); managed: redirects, scopes, flows, signing key.
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Actual Budget OIDC }
        id: actual-oidc
        attrs:
          <<: *oidc
          redirect_uris:
            - { matching_mode: strict, url: "https://actual.${SECRET_DOMAIN}/openid/callback", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: actual }
        attrs: { name: Actual Budget, group: home, provider: !KeyOf actual-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/actual-budget.svg", meta_launch_url: "https://actual.${SECRET_DOMAIN}" }
      # open-webui
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Provider for Open-WebUI }
        id: openwebui-oidc
        attrs:
          <<: *oidc
          redirect_uris:
            - { matching_mode: strict, url: "https://chat.${SECRET_DOMAIN}/oauth/oidc/callback", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: chat }
        attrs: { name: Open WebUI, group: public, provider: !KeyOf openwebui-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/open-webui.svg", meta_launch_url: "https://chat.${SECRET_DOMAIN}" }
      # proxmox — redirect URIs match the URLs users browse to: the cluster proxy
      # (proxmox.${SECRET_DOMAIN}, LB across proxmox-01..04) + the standalone athena node.
      # PVE builds redirect_uri from the request Host, so both proxied hosts must be listed.
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Provider for Proxmox }
        id: proxmox-oidc
        attrs:
          <<: *oidc
          redirect_uris:
            - { matching_mode: strict, url: "https://proxmox.${SECRET_DOMAIN}", redirect_uri_type: authorization }
            - { matching_mode: strict, url: "https://athena.${SECRET_DOMAIN}", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: proxmox }
        attrs: { name: Proxmox, group: internal-proxmox, provider: !KeyOf proxmox-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/proxmox.svg", meta_launch_url: "https://proxmox.${SECRET_DOMAIN}" }
      # proxmox-admins — the PVE `authentik` realm syncs this (via the groups claim) to a
      # PVE group named `proxmox-admins-authentik`, which holds Administrator on / (ACL set
      # on the PVE side; /etc/pve/domains.cfg is not GitOps-managed). Membership is declared here.
      - model: authentik_core.group
        identifiers: { name: proxmox-admins }
        attrs:
          users:
            - !Find [authentik_core.user, [username, mackleyder]]
      # home-assistant (hass-oidc-auth component) — NEW provider; Authentik generates
      # client_id/secret on first apply (read them out for HA's configuration.yaml).
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Home Assistant OIDC }
        id: hass-oidc
        attrs:
          <<: *oidc
          redirect_uris:
            - { matching_mode: strict, url: "https://hass.${SECRET_DOMAIN}/auth/oidc/callback", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: home-assistant }
        attrs: { name: Home Assistant, group: home, provider: !KeyOf hass-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/home-assistant.svg", meta_launch_url: "https://hass.${SECRET_DOMAIN}" }
      # grafana (generic_oauth) — NEW provider; Authentik generates client_id/secret
      # on first apply (read them out into Infisical GRAFANA_OIDC_CLIENT_ID/_SECRET).
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Grafana OIDC }
        id: grafana-oidc
        attrs:
          <<: *oidc
          redirect_uris:
            - { matching_mode: strict, url: "https://grafana.${SECRET_DOMAIN}/login/generic_oauth", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: grafana }
        attrs: { name: Grafana, group: internal, provider: !KeyOf grafana-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/grafana.svg", meta_launch_url: "https://grafana.${SECRET_DOMAIN}" }
      # Grafana Admins — members get Grafana role Admin via the groups claim
      # (role_attribute_path in the Grafana CR). Others land as Viewer.
      - model: authentik_core.group
        identifiers: { name: Grafana Admins }
        attrs:
          users:
            - !Find [authentik_core.user, [username, mackleyder]]
      # kubectl — native k8s apiserver OIDC. Deliberately NOT the &oidc anchor:
      # a CLI has no safe place for a client_secret, so this is a PUBLIC (PKCE)
      # client with a PINNED client_id (Talos apiserver oidc-client-id references
      # it verbatim, avoiding the auto-generated-id chicken-and-egg). Adds the
      # offline_access scope so kubelogin can silently refresh. Redirect URIs are
      # kubelogin's loopback listener. Issuer: https://sso.${SECRET_DOMAIN}/application/o/kubectl/
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Kubernetes OIDC }
        id: kubectl-oidc
        attrs:
          client_type: public
          client_id: kubectl
          grant_types: [authorization_code, refresh_token]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
          redirect_uris:
            - { matching_mode: strict, url: "http://localhost:8000", redirect_uri_type: authorization }
            - { matching_mode: strict, url: "http://localhost:18000", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: kubectl }
        id: kubectl-app
        attrs: { name: Kubernetes (kubectl), group: internal, provider: !KeyOf kubectl-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/kubernetes.svg" }
      # kubernetes-admins → cluster-admin, kubernetes-viewers → view (bound by the
      # oidc-rbac ClusterRoleBindings). Membership here drives cluster access via
      # the groups claim (apiserver oidc-groups-claim). viewers starts empty.
      - model: authentik_core.group
        identifiers: { name: kubernetes-admins }
        attrs:
          users:
            - !Find [authentik_core.user, [username, mackleyder]]
      - model: authentik_core.group
        identifiers: { name: kubernetes-viewers }
      # Headlamp (web k8s dashboard) — confidential OIDC client, per-user RBAC via
      # token pass-through (Headlamp forwards the user's id_token to the apiserver;
      # the apiserver trusts this issuer directly via the structured multi-issuer auth
      # config, see talos patches/controller/apiserver-oidc.yaml — no audience tricks
      # needed). offline_access gives Headlamp a refresh token so sessions renew
      # silently instead of bouncing to Sign In at every token expiry.
      - model: authentik_providers_oauth2.oauth2provider
        identifiers: { name: Headlamp OIDC }
        id: headlamp-oidc
        attrs:
          <<: *oidc
          client_id: headlamp   # pinned; Authentik still generates the client_secret (→ Infisical HEADLAMP_OIDC_CLIENT_SECRET)
          property_mappings:     # re-list the anchor's 3 + offline_access (override replaces the whole list)
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
          redirect_uris:
            - { matching_mode: strict, url: "https://headlamp.${SECRET_DOMAIN}/oidc-callback", redirect_uri_type: authorization }
      - model: authentik_core.application
        identifiers: { slug: headlamp }
        id: headlamp-app
        attrs: { name: Headlamp, group: internal, provider: !KeyOf headlamp-oidc, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/headlamp.svg", meta_launch_url: "https://headlamp.${SECRET_DOMAIN}" }
      # Access gate: only kubernetes-admins / kubernetes-viewers members may complete
      # OIDC against the cluster apps. Without these, ANY Authentik account (e.g. a
      # future guest/media user) could mint a token the apiserver authenticates (RBAC
      # would still deny real access, but token issuance should be membership-gated).
      # Application policy_engine_mode defaults to "any" -> member of EITHER group passes.
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          target: !KeyOf kubectl-app
        attrs:
          group: !Find [authentik_core.group, [name, kubernetes-admins]]
          enabled: true
      - model: authentik_policies.policybinding
        identifiers:
          order: 10
          target: !KeyOf kubectl-app
        attrs:
          group: !Find [authentik_core.group, [name, kubernetes-viewers]]
          enabled: true
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          target: !KeyOf headlamp-app
        attrs:
          group: !Find [authentik_core.group, [name, kubernetes-admins]]
          enabled: true
      - model: authentik_policies.policybinding
        identifiers:
          order: 10
          target: !KeyOf headlamp-app
        attrs:
          group: !Find [authentik_core.group, [name, kubernetes-viewers]]
          enabled: true
