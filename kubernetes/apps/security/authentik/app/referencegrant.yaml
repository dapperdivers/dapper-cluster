---
# Allow Envoy Gateway SecurityPolicies in app namespaces to use the Authentik
# embedded outpost as their ext-auth backend (forward-auth).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: securitypolicy-to-outpost
  namespace: security
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: media
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: selfhosted
  to:
    - group: ""
      kind: Service
      name: ak-outpost-authentik-embedded-outpost
