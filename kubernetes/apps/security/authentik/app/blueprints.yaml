---
# Authentik blueprints delivered to the worker via the chart's blueprints.configMaps.
# Only keys ending in `.yaml` are discovered + applied. GitOps source of truth for
# Authentik proxy providers, applications, and the embedded-outpost assignment list.
#
# Adoption model: each entry matches an EXISTING object by `identifiers` (provider name /
# app slug / outpost managed-id), taking over in place — no duplicates. Fields not listed
# are left as-is (provider internal client_id/secret).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: security
data:
  # One blueprint = all forward-auth apps + the outpost. Shared proxy config is the
  # &proxy anchor; each app merges it (<<: *proxy) and overrides host/name/slug/icon/group.
  # GENERATED once from live state; hand-maintained going forward (add app = ~7 lines + 1 !KeyOf).
  forward-auth.yaml: |
    version: 1
    metadata:
      name: forward-auth-apps
    context:
      proxy_defaults: &proxy
        mode: forward_single
        authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
        invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
        access_token_validity: hours=24
        refresh_token_validity: days=30
        intercept_header_auth: true
        basic_auth_enabled: false
        property_mappings:
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
          - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]
    entries:
      # 4kradarr
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for 4k-Radarr }
        id: 4kradarr-provider
        attrs: { <<: *proxy, external_host: "https://4kradarr.${SECRET_DOMAIN_MEDIA}", skip_path_regex: "^/api([/?].*)?$" }
      - model: authentik_core.application
        identifiers: { slug: 4kradarr }
        attrs: { name: 4k-Radarr, group: media_internal, provider: !KeyOf 4kradarr-provider, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/radarr.svg", meta_launch_url: "https://4kradarr.${SECRET_DOMAIN_MEDIA}" }
      # prowlarr
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for Prowlarr }
        id: prowlarr-provider
        attrs: { <<: *proxy, external_host: "https://prowlarr.${SECRET_DOMAIN_MEDIA}", skip_path_regex: "^/api([/?].*)?$" }
      - model: authentik_core.application
        identifiers: { slug: prowlarr }
        attrs: { name: Prowlarr, group: media_internal, provider: !KeyOf prowlarr-provider, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/prowlarr.svg", meta_launch_url: "https://prowlarr.${SECRET_DOMAIN_MEDIA}" }
      # 4ksonarr
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for 4k-Sonarr }
        id: 4ksonarr-provider
        attrs: { <<: *proxy, external_host: "https://4ksonarr.${SECRET_DOMAIN_MEDIA}", skip_path_regex: "^/api([/?].*)?$" }
      - model: authentik_core.application
        identifiers: { slug: 4ksonarr }
        attrs: { name: 4k-Sonarr, group: media_internal, provider: !KeyOf 4ksonarr-provider, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/sonarr.svg", meta_launch_url: "https://4ksonarr.${SECRET_DOMAIN_MEDIA}" }
      # tautulli
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for Tautulli }
        id: tautulli-provider
        attrs: { <<: *proxy, external_host: "https://tautulli.${SECRET_DOMAIN_MEDIA}", skip_path_regex: "^/api([/?].*)?$" }
      - model: authentik_core.application
        identifiers: { slug: tautulli }
        attrs: { name: Tautulli, group: media_internal, provider: !KeyOf tautulli-provider, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/tautulli.svg", meta_launch_url: "https://tautulli.${SECRET_DOMAIN_MEDIA}" }
      # radarr
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for Radarr }
        id: radarr-provider
        attrs: { <<: *proxy, external_host: "https://radarr.${SECRET_DOMAIN_MEDIA}", skip_path_regex: "^/api([/?].*)?$" }
      - model: authentik_core.application
        identifiers: { slug: radarr }
        attrs: { name: Radarr, group: media_internal, provider: !KeyOf radarr-provider, meta_icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/radarr.svg", meta_launch_url: "https://radarr.${SECRET_DOMAIN_MEDIA}" }
      # sonarr
      - model: authentik_providers_proxy.proxyprovider
        identifiers: { name: Provider for Sonarr }
        id: sonarr-provider
