---
# Authentik blueprints delivered to the worker via the chart's blueprints.configMaps.
# Only keys ending in `.yaml` are discovered + applied. This is the GitOps entry point
# for declarative Authentik config (providers/apps/outposts).
#
# Adoption model: each entry matches an EXISTING object by `identifiers` (provider name /
# app slug), so applying takes over management in place — no duplicates, no disruption.
# Fields not listed are left as-is (e.g. the provider's internal client_id/secret, and the
# embedded outpost's `providers` assignment list, which we deliberately never touch here).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: security
data:
  # Stop the embedded outpost reconciling a Kubernetes Ingress (forward-auth uses the
  # outpost Service:9000, not an Ingress). `providers` omitted to preserve assignments.
  embedded-outpost.yaml: |
    version: 1
    metadata:
      name: embedded-outpost-config
    entries:
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          managed: goauthentik.io/outposts/embedded
        attrs:
          config:
            log_level: info
            docker_labels: null
            authentik_host: https://sso.${SECRET_DOMAIN}
            docker_network: null
            container_image: null
            docker_map_ports: true
            refresh_interval: minutes=5
            kubernetes_replicas: 1
            kubernetes_namespace: security
            authentik_host_browser: ""
            object_naming_template: ak-outpost-%(name)s
            authentik_host_insecure: false
            kubernetes_json_patches: null
            kubernetes_service_type: ClusterIP
            kubernetes_image_pull_secrets: []
            kubernetes_ingress_class_name: internal
            kubernetes_disabled_components:
              - ingress
            kubernetes_ingress_annotations: {}
            kubernetes_ingress_secret_name: ${SECRET_DOMAIN_MEDIA/./-}-tls

  # Forward-auth (proxy provider) for Sonarr — adopts the live "Provider for Sonarr"
  # + "sonarr" application. Template for the rest of the forward-auth apps.
  sonarr.yaml: |
    version: 1
    metadata:
      name: app-sonarr
    entries:
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers:
          name: Provider for Sonarr
        id: sonarr-provider
        attrs:
          mode: forward_single
          external_host: https://sonarr.${SECRET_DOMAIN_MEDIA}
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          access_token_validity: hours=24
          refresh_token_validity: days=30
          intercept_header_auth: true
          basic_auth_enabled: false
          skip_path_regex: |-
            ^/api([/?].*)$
            ^/identity.*$
            ^/triggers.*$
            ^/meshagents.*$
            ^/meshsettings.*$
            ^/agent.*$
            ^/control.*$
            ^/meshrelay.*$
            ^/wl.*$
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-entitlements]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/proxy/scope-proxy]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: sonarr
        attrs:
          name: Sonarr
          provider: !KeyOf sonarr-provider
          meta_launch_url: https://sonarr.${SECRET_DOMAIN_MEDIA}
          meta_icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/sonarr.svg
          policy_engine_mode: any
          group: media_internal
