---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vcluster-dev
spec:
  interval: 1h
  chart:
    spec:
      chart: vcluster
      version: 0.32.1
      sourceRef:
        kind: HelmRepository
        name: loft-sh
        namespace: flux-system
  values:
    # Sync StorageClasses from host so CephFS/RBD are available
    sync:
      toHost:
        ingresses:
          enabled: true
      fromHost:
        storageClasses:
          enabled: true

    controlPlane:
      distro:
        k3s:
          enabled: true
      backingStore:
        database:
          embedded:
            enabled: true
      statefulSet:
        security:
          podSecurityContext:
            runAsUser: 0
            runAsNonRoot: false
          containerSecurityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
        pod:
          automountServiceAccountToken: true
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi

    # Resource limits for the dev vCluster namespace
    policies:
      resourceQuota:
        enabled: true
        quota:
          requests.cpu: "4"
          requests.memory: 8Gi
          requests.storage: 50Gi
          count/persistentvolumeclaims: "20"

    exportKubeConfig:
      context: vcluster-dev
