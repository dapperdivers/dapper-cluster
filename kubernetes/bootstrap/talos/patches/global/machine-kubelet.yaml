machine:
  kubelet:
    nodeIP:
      validSubnets:
        - 10.100.0.0/24
    extraArgs:
      # Conservative but safe kubelet settings
      max-pods: "250"
      # Aggressive image GC to prevent disk pressure on image-heavy nodes
      image-gc-high-threshold: "75"
      image-gc-low-threshold: "65"
