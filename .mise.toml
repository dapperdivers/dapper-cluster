[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBERNETES_DIR = '{{config_root}}/kubernetes'
FLATE_PATH = '{{config_root}}/kubernetes/flux/cluster'
KUBECONFIG = "{{env.HOME}}/.kube/config"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/kubernetes/bootstrap/talos/clusterconfig/talosconfig"

[tasks.deps]
description = "Install dependencies"
run = "uv pip install -r requirements.txt"

[hooks]
postinstall = "lefthook install"

[tools]
# Template tools
python = "3.14.6"
uv = "latest"
# Operations tools
"aqua:budimanjojo/talhelper" = "3.1.12"
"aqua:cloudflare/cloudflared" = "2026.6.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.0"
"github:home-operations/flate" = "v0.4.10"
"aqua:getsops/sops" = "3.13.2"
"aqua:helm/helm" = "4.2.2"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.5"
"aqua:yannh/kubeconform" = "0.8.0"
"ubi:BeryJu/korb" = "latest"
"aqua:evilmartians/lefthook" = "2.1.9"
# Formatting & linting (run via lefthook git hooks)
oxfmt = "0.57.0"
gitleaks = "8.30.1"
zizmor = "1.26.1"
helmfile = "latest"
kubectl = "latest"
task = "latest"
